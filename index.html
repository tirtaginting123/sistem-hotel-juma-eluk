<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hotel Terminal Juma Eluk - Luxury PMS</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #0a192f; --gold: #c5a059; --bg: #f4f7f6;
            --white: #ffffff; --green: #27ae60; --red: #e74c3c;
            --orange: #f39c12; --text: #333;
        }
        body { background-color: var(--bg); color: var(--text); font-family: 'Montserrat', sans-serif; margin: 0; padding: 0; line-height: 1.6; }
        .navbar { background-color: #000; color: #fff; padding: 20px 25px; border-bottom: 4px solid var(--gold); display: flex; align-items: center; justify-content: center; }
        .navbar-brand { display: flex; flex-direction: column; align-items: center; gap: 10px; text-align: center; }
        .nav-logo-box { background-color: #fff; width: 70px; height: 70px; padding: 5px; display: flex; justify-content: center; align-items: center; border-radius: 2px; }
        .nav-logo-box img { max-width: 100%; max-height: 100%; object-fit: contain; }
        .header-info h1 { font-family: 'Playfair Display', serif; margin: 0; font-size: 24px; text-transform: uppercase; color: #fff; }
        .header-info p { font-size: 10px; margin: 2px 0 0; color: #fff; line-height: 1.3; }
        .container { max-width: 600px; margin: 0 auto; padding: 20px 15px 50px; }
        #topSearchArea { margin-bottom: 25px; }
        .search-top { width: 100%; padding: 15px 25px; border-radius: 50px; border: 1px solid #ddd; font-size: 16px; outline: none; box-shadow: 0 5px 15px rgba(0,0,0,0.05); box-sizing: border-box; }
        .card { background: var(--white); border-radius: 15px; padding: 20px; margin-bottom: 20px; box-shadow: 0 8px 25px rgba(0,0,0,0.05); border-top: 5px solid var(--gold); }
        .section-title { font-weight: 700; color: var(--primary); margin-bottom: 15px; border-bottom: 1px solid #eee; padding-bottom: 10px; display: block; font-size: 13px; text-transform: uppercase; letter-spacing: 1px; }
        .btn-mewah { background: #fff; color: var(--primary); border: 1px solid #eee; padding: 16px; border-radius: 12px; margin-bottom: 12px; cursor: pointer; font-weight: 600; display: flex; align-items: center; justify-content: space-between; transition: 0.2s; }
        .btn-submit { background: var(--gold); color: white; border: none; padding: 16px; border-radius: 12px; margin-top: 15px; cursor: pointer; font-weight: 700; display: block; width: 100%; text-align: center; font-size: 16px; }
        .form-group { margin-bottom: 15px; text-align: left; }
        .form-label { display: block; font-size: 12px; font-weight: 700; color: var(--primary); margin-bottom: 5px; text-transform: uppercase; }
        .form-control { width: 100%; padding: 14px 15px; border-radius: 8px; border: 1px solid #ddd; font-size: 15px; box-sizing: border-box; background: #fafafa; }
        .room-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
        .room-box { padding: 20px 0; border-radius: 10px; text-align: center; font-weight: 700; color: white; cursor: pointer; }
        .status-green { background: var(--green); }
        .status-red { background: var(--red); }
        .status-orange { background: var(--orange); }
        #loadingBar { background: var(--gold); color: white; padding: 5px; text-align: center; font-size: 11px; display: none; }
        
        /* DESAIN CETAK KHUSUS THERMAL PRINTER 80mm */
        @media print {
            @page { margin: 0; size: 80mm auto; } 
            body { background: white; color: black; font-size: 11px; margin: 0; padding: 0; font-family: 'Courier New', Courier, monospace; }
            #screen, #topSearchArea, #loadingBar, .navbar, .container { display: none !important; }
            #printArea { display: block !important; width: 80mm; padding: 4mm; box-sizing: border-box; }
            .invoice-box { width: 100%; border: none; padding: 0; }
            .header-inv { text-align: center; border-bottom: 1px dashed #000; padding-bottom: 8px; margin-bottom: 8px; display: block; }
            .print-logo-box { display: flex; justify-content: center; margin-bottom: 5px; }
            .print-logo-box img { width: 45px; height: 45px; filter: grayscale(100%); }
            .header-text h1 { margin: 0; font-size: 15px; font-weight: bold; }
            .header-text p { margin: 2px 0 0; font-size: 9px; }
            .invoice-title { text-align: center; font-weight: bold; font-size: 12px; margin-bottom: 4px; }
            .no-inv { text-align: center; font-size: 10px; margin-bottom: 10px; }
            .struk-row { display: flex; justify-content: space-between; margin-bottom: 4px; font-size: 10px; }
            .struk-row.bold { font-weight: bold; font-size: 12px; margin-top: 5px; border-top: 1px dashed #000; padding-top: 5px; }
            .ttd-box { text-align: center; margin-top: 20px; font-size: 10px; }
            .ttd-line { border-bottom: 1px dashed #000; width: 60%; margin: 25px auto 5px; }
        }
    </style>
</head>
<body>
    <div id="loadingBar">>>> CONNECTING TO CLOUD...</div>
    <div class="navbar">
        <div class="navbar-brand">
            <div class="nav-logo-box"><img src="logo.jpg" alt="Logo JE"></div>
            <div class="header-info">
                <h1>Hotel Juma Eluk</h1>
                <p>Jl. Letjen Jamin Ginting Sumber Mufakat Kabanjahe Tanah Karo</p>
                <p>HP: 0821 6848 9514</p>
            </div>
        </div>
    </div>
    <div class="container" id="mainContainer">
        <div id="topSearchArea"><input type="text" id="topSearch" class="search-top" placeholder="🔍 Cari Kamar, Tipe, atau Tamu..." autocomplete="off" oninput="liveSearch(this.value)"></div>
        <div id="screen"></div>
    </div>
    <div id="printArea"></div>

<script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-database-compat.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script>
    const firebaseConfig = {
      apiKey: "AIzaSyAvCTnP9xmMYdtzbItnG9s-jzJ2LP143S8",
      authDomain: "juma-elok.firebaseapp.com",
      databaseURL: "https://juma-elok-default-rtdb.firebaseio.com",
      projectId: "juma-elok",
      storageBucket: "juma-elok.firebasestorage.app",
      messagingSenderId: "703237300210",
      appId: "1:703237300210:web:e21f5bdea56000359a156b"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const dataRef = db.ref('hotel_data');

    const dataHotel = [
        {tipe: "Single", kelas: "Standard", nomor: ["2a","3a","4a","5a","6a","7a","8a","9a","10a","11a","11b"], harga: 300000},
        {tipe: "Twin", kelas: "Standard", nomor: ["2b","3b","4b","5b","6b","7b","8b","9b","10b"], harga: 300000},
        {tipe: "Single", kelas: "Deluxe", nomor: ["1","12a","13a","14a","15a","15","12b","14b"], harga: 350000},
        {tipe: "Twin", kelas: "Deluxe", nomor: ["1b","13b","15b"], harga: 350000},
        {tipe: "Single", kelas: "Suite", nomor: ["4av","5av","6av","7av","8av","9av","10av","11av","6bv","7bv","8bv","9bv"], harga: 400000},
        {tipe: "Twin", kelas: "Suite", nomor: ["4bv","5bv"], harga: 400000},
        {tipe: "Single", kelas: "VIP", nomor: ["2av", "3av", "2bv"], harga: 600000},
        {tipe: "Twin", kelas: "VIP", nomor: ["3bv"], harga: 600000}
    ];

    let tamuIn = [], tamuOut = [], kamarRusak = [], lastInv = 0, riwayatHarian = [];
    let bukuKas = { harian: { tgl: "", uang: 0, uangCash: 0, uangTransfer: 0, uangDebit: 0, keluar: 0, rincianKeluar: [], kamar: 0 }, bulanan: { bln: "", uang: 0, kamar: 0, keluar: 0, uangCash: 0, uangTransfer: 0, uangDebit: 0 } };
    let state = "MENU", tempBed="", tempKelas="", tempRoom="", tempCari="";
    let d = { nama:"", alamat:"", warga:"", ktp:"", hp:"", malam:"", extrabed:"", bayar:"", tgl:"", inv:"", shift:"" };
    let cryptoChart;

    const screen = document.getElementById('screen');
    const loadingBar = document.getElementById('loadingBar');
    const printArea = document.getElementById('printArea');

    dataRef.on('value', (snapshot) => {
        const cloudData = snapshot.val();
        loadingBar.style.display = "none";
        if (cloudData) {
            tamuIn = cloudData.checkin || []; tamuOut = cloudData.checkout || []; kamarRusak = cloudData.maintenance || []; 
            lastInv = cloudData.last_inv || 0; riwayatHarian = cloudData.riwayatHarian || [];
            let dbKas = cloudData.bukuKas || {};
            bukuKas = { 
                harian: { 
                    tgl: getTanggalHarian(), uang: dbKas.harian?.uang || 0, uangCash: dbKas.harian?.uangCash || 0, 
                    uangTransfer: dbKas.harian?.uangTransfer || 0, uangDebit: dbKas.harian?.uangDebit || 0,
                    keluar: dbKas.harian?.keluar || 0, rincianKeluar: dbKas.harian?.rincianKeluar || [], kamar: dbKas.harian?.kamar || 0 
                }, 
                bulanan: { 
                    bln: getTanggalBulanan(), uang: dbKas.bulanan?.uang || 0, kamar: dbKas.bulanan?.kamar || 0, keluar: dbKas.bulanan?.keluar || 0,
                    uangCash: dbKas.bulanan?.uangCash || 0, uangTransfer: dbKas.bulanan?.uangTransfer || 0, uangDebit: dbKas.bulanan?.uangDebit || 0
                } 
            };
        }
        renderScreen();
    });

    function simpanKeCloud() { loadingBar.style.display = "block"; dataRef.set({ checkin: tamuIn, checkout: tamuOut, maintenance: kamarRusak, last_inv: lastInv, bukuKas: bukuKas, riwayatHarian: riwayatHarian }).then(() => loadingBar.style.display = "none"); }
    function getHarga(noKmr) { for (let k of dataHotel) { if (k.nomor.includes(noKmr)) return k.harga; } return 0; }
    function formatRp(angka) { return new Intl.NumberFormat('id-ID').format(angka); }
    function getTanggalSekarang() { return new Date().toLocaleDateString('id-ID', { day: '2-digit', month: 'short', year: 'numeric', hour: '2-digit', minute:'2-digit' }); }
    function getTanggalHarian() { return new Date().toLocaleDateString('id-ID', { day: '2-digit', month: 'short', year: 'numeric' }); }
    function getTanggalBulanan() { return new Date().toLocaleDateString('id-ID', { month: 'long', year: 'numeric' }); }

    function pindahHalaman(newState) { state = newState; history.pushState({ page: newState }, "", ""); renderScreen(); }

    window.prosesCheckOut = function(index) { tamuOut.push(tamuIn[index]); tamuIn.splice(index, 1); simpanKeCloud(); renderScreen(); };
    window.hapusRiwayat = function(index) { tamuOut.splice(index, 1); simpanKeCloud(); renderScreen(); };
    window.liveSearch = function(val) { tempCari = val.trim().toLowerCase(); state = tempCari !== "" ? "HASIL_CARI" : "MENU"; renderScreen(); };

    window.tandaiDeposit = function(index) { if(confirm("Tandai deposit Rp 100.000 sudah kembali?")) { tamuIn[index].deposit_kembali = true; simpanKeCloud(); renderScreen(); } };
    window.tandaiDepositOut = function(index) { if(confirm("Tandai deposit Rp 100.000 sudah kembali?")) { tamuOut[index].deposit_kembali = true; simpanKeCloud(); renderScreen(); } };

    window.editPembayaran = function(index) {
        let t = tamuIn[index]; let opsiBaru = prompt(`Ketik 'CASH', 'TRANSFER', atau 'DEBIT':`, t.bayar);
        if (opsiBaru !== null) {
            opsiBaru = opsiBaru.toUpperCase().trim();
            if (opsiBaru === "CASH" || opsiBaru === "TRANSFER" || opsiBaru === "DEBIT") {
                if (opsiBaru !== t.bayar) {
                    let sub = (getHarga(t.room) * (parseInt(t.malam)||1)) + ((parseInt(t.extrabed)||0)*150000);
                    
                    if (t.bayar === "CASH") { bukuKas.harian.uangCash -= sub; bukuKas.bulanan.uangCash = (bukuKas.bulanan.uangCash || 0) - sub; }
                    else if (t.bayar === "TRANSFER") { bukuKas.harian.uangTransfer -= sub; bukuKas.bulanan.uangTransfer = (bukuKas.bulanan.uangTransfer || 0) - sub; }
                    else if (t.bayar === "DEBIT") { bukuKas.harian.uangDebit -= sub; bukuKas.bulanan.uangDebit = (bukuKas.bulanan.uangDebit || 0) - sub; }
                    
                    if (opsiBaru === "CASH") { bukuKas.harian.uangCash = (bukuKas.harian.uangCash || 0) + sub; bukuKas.bulanan.uangCash = (bukuKas.bulanan.uangCash || 0) + sub; }
                    else if (opsiBaru === "TRANSFER") { bukuKas.harian.uangTransfer = (bukuKas.harian.uangTransfer || 0) + sub; bukuKas.bulanan.uangTransfer = (bukuKas.bulanan.uangTransfer || 0) + sub; }
                    else if (opsiBaru === "DEBIT") { bukuKas.harian.uangDebit = (bukuKas.harian.uangDebit || 0) + sub; bukuKas.bulanan.uangDebit = (bukuKas.bulanan.uangDebit || 0) + sub; }
                    
                    tamuIn[index].bayar = opsiBaru; simpanKeCloud(); renderScreen();
                }
            } else { alert("❌ Gagal: Mohon ketik 'CASH', 'TRANSFER', atau 'DEBIT' saja."); }
        }
    };

    window.prosesPengeluaran = function() {
        let deskripsi = document.getElementById('p_item').value || "Lain-lain";
        let harga = parseInt(document.getElementById('p_harga').value) || 0;
        if(harga > 0) {
            bukuKas.harian.keluar = (bukuKas.harian.keluar || 0) + harga;
            bukuKas.bulanan.keluar = (bukuKas.bulanan.keluar || 0) + harga;
            bukuKas.harian.rincianKeluar.push({ ket: deskripsi, nominal: harga });
            simpanKeCloud(); alert("✅ Pengeluaran dicatat!"); pindahHalaman("TUTUP_BUKU");
        }
    };

    window.siapkanInvoice = function() {
        let hargaKamar = getHarga(tempRoom); let mlm = parseInt(d.malam) || 1; let eb = parseInt(d.extrabed) || 0;
        let total = (hargaKamar * mlm) + (eb * 150000); 
        printArea.innerHTML = `
            <div class="invoice-box">
                <div class="header-inv">
                    <div class="print-logo-box"><img src="logo.jpg"></div>
                    <div class="header-text">
                        <h1>HOTEL JUMA ELUK</h1>
                        <p>Jl. Letjen Jamin Ginting Sumber Mufakat</p>
                        <p>Kabanjahe - HP: 082168489514</p>
                    </div>
                </div>
                <div class="invoice-title">INVOICE CHECK-IN</div>
                <div class="no-inv">NO: ${d.inv}</div>
                
                <div style="border-bottom: 1px dashed #000; padding-bottom:5px; margin-bottom:5px;">
                    <div class="struk-row"><span>Nama:</span><span>${d.nama}</span></div>
                    <div class="struk-row"><span>Kamar:</span><span>${tempRoom} (${tempKelas})</span></div>
                    <div class="struk-row"><span>Cek-In:</span><span>${d.tgl}</span></div>
                    <div class="struk-row"><span>Durasi:</span><span>${mlm} Malam</span></div>
                    <div class="struk-row"><span>Extra Bed:</span><span>${d.extrabed}</span></div>
                    <div class="struk-row"><span>Bayar:</span><span>${d.bayar}</span></div>
                </div>
                
                <div class="struk-row"><span>Tarif Kamar:</span><span>Rp ${formatRp(hargaKamar)}</span></div>
                <div class="struk-row"><span>Tarif E.Bed:</span><span>Rp ${formatRp(eb * 150000)}</span></div>
                <div class="struk-row bold"><span>TOTAL:</span><span>Rp ${formatRp(total)}</span></div>
                
                <div class="ttd-box">
                    <div>RECEPTIONIST</div>
                    <div class="ttd-line"></div>
                </div>
                <div style="text-align:center; font-size:8px; margin-top:10px;">Terima Kasih Atas Kunjungan Anda</div>
            </div>
        `;
    }

    function renderScreen() {
        let out = ""; document.getElementById('topSearchArea').style.display = (state === "MENU" || state === "HASIL_CARI") ? "block" : "none";
        
        if (state === "MENU") {
            out += `<div class="card"><span class="section-title">🏠 Reception Dashboard</span>
                <div class="btn-mewah" onclick="pindahHalaman('PILIH_KELAS')"><span>🛏️ 1. Booking Kamar Baru</span><span>➔</span></div>
                <div class="btn-mewah" onclick="pindahHalaman('DAFTAR_TAMU')"><span>👥 2. Monitoring & Check-Out</span><span>➔</span></div>
                <div class="btn-mewah" onclick="pindahHalaman('TUTUP_BUKU')"><span>💰 3a. Laporan Keuangan</span><span>➔</span></div>
                <div class="btn-mewah" onclick="pindahHalaman('FORM_PENGELUARAN')" style="border-left: 4px solid var(--red);"><span>📉 3b. Catat Pengeluaran</span><span>➔</span></div>
                <div class="btn-mewah" onclick="pindahHalaman('GRAFIK')" style="border-left: 4px solid #3498db;"><span>📈 5. Grafik Tren Pendapatan</span><span>➔</span></div>
                <div class="btn-mewah" onclick="pindahHalaman('RINGKASAN_KAMAR')" style="border-left: 4px solid var(--green);"><span>📊 6. Status & Ringkasan Kamar</span><span>➔</span></div>
                <div class="btn-mewah" onclick="pindahHalaman('TOTAL_KAMAR')" style="border-left: 4px solid #8e44ad;"><span>🧮 7. Rekap Kamar Terjual (Bulan Ini)</span><span>➔</span></div>
                <div class="btn-mewah" onclick="pindahHalaman('ALL_INFO')" style="border-left: 4px solid #1abc9c; background:#1abc9c; color:white;"><span>🌐 8. ALL INFO (Ringkasan Total)</span><span>➔</span></div></div>`;
        } 
        else if (state === "ALL_INFO") {
            let b_kamar = bukuKas.bulanan.kamar || 0; 
            let isi = tamuIn.length;
            
            let h_masuk = bukuKas.harian.uang || 0; 
            let h_keluar = bukuKas.harian.keluar || 0; 
            let h_total = h_masuk - h_keluar;
            
            // Variabel metode pembayaran HARIAN
            let h_cash = bukuKas.harian.uangCash || 0;
            let h_trans = bukuKas.harian.uangTransfer || 0;
            let h_debit = bukuKas.harian.uangDebit || 0;

            let b_uang = bukuKas.bulanan.uang || 0;
            let b_keluar = bukuKas.bulanan.keluar || 0;
            
            // Variabel metode pembayaran BULANAN
            let b_cash = bukuKas.bulanan.uangCash || 0;
            let b_trans = bukuKas.bulanan.uangTransfer || 0;
            let b_debit = bukuKas.bulanan.uangDebit || 0;

            let rincianHTML = "";
            if(bukuKas.harian.rincianKeluar && bukuKas.harian.rincianKeluar.length > 0) {
                bukuKas.harian.rincianKeluar.forEach(r => {
                    rincianHTML += `<div style="font-size:13px; font-weight:600; color:#555; padding:3px 0;">• ${r.ket}: Rp ${formatRp(r.nominal)}</div>`;
                });
            } else {
                rincianHTML = `<div style="font-size:12px; font-style:italic; color:#999;">Belum ada pengeluaran hari ini.</div>`;
            }

            out += `<div class="card"><span class="section-title" style="color:#1abc9c;">🌐 ALL INFO - Ringkasan Total</span>
                    
                    <div class="form-group"><label class="form-label">Total Kamar Laku (Bulan Ini)</label><input type="text" class="form-control" value="${b_kamar} Kamar" readonly style="background:#eee; font-weight:700;"></div>
                    <div class="form-group"><label class="form-label">Kamar Terisi Saat Ini</label><input type="text" class="form-control" value="${isi} Kamar" readonly style="background:#eee; font-weight:700; color:var(--red);"></div>
                    
                    <hr style="border:0; border-top:1px dashed #ccc; margin:20px 0;">
                    
                    <div class="form-group"><label class="form-label">Uang Hari Ini (Laba Kotor)</label><input type="text" class="form-control" value="Rp ${formatRp(h_masuk)}" readonly style="background:#eee; font-weight:700; color:var(--green);"></div>
                    
                    <div class="form-group"><label class="form-label">Total Cash (Hari Ini)</label><input type="text" class="form-control" value="Rp ${formatRp(h_cash)}" readonly style="background:#fafafa; font-weight:600; font-size:14px; color:var(--green);"></div>
                    <div class="form-group"><label class="form-label">Total Transfer (Hari Ini)</label><input type="text" class="form-control" value="Rp ${formatRp(h_trans)}" readonly style="background:#fafafa; font-weight:600; font-size:14px; color:#2980b9;"></div>
                    <div class="form-group"><label class="form-label">Total Debit (Hari Ini)</label><input type="text" class="form-control" value="Rp ${formatRp(h_debit)}" readonly style="background:#fafafa; font-weight:600; font-size:14px; color:#8e44ad;"></div>

                    <div class="form-group"><label class="form-label">Pengeluaran Hari Ini</label><input type="text" class="form-control" value="Rp ${formatRp(h_keluar)}" readonly style="background:#eee; font-weight:700; color:var(--red);"></div>
                    <div class="form-group"><label class="form-label">Total Pengeluaran Bulanan</label><input type="text" class="form-control" value="Rp ${formatRp(b_keluar)}" readonly style="background:#fcebe9; border:1px solid var(--red); font-weight:700; color:var(--red);"></div>

                    <div class="form-group" style="background:#fff; border:1px solid #ddd; padding:12px; border-radius:8px;">
                        <label class="form-label" style="border-bottom:1px solid #eee; padding-bottom:5px; margin-bottom:5px;">Rincian Pengeluaran Harian:</label>
                        ${rincianHTML}
                    </div>
                    
                    <div class="form-group"><label class="form-label">Laba Bersih Hari Ini</label><input type="text" class="form-control" value="Rp ${formatRp(h_total)}" readonly style="background:#eafaf1; border-color:var(--green); font-weight:700; color:var(--primary); font-size:18px;"></div>
                    
                    <hr style="border:0; border-top:1px dashed #ccc; margin:20px 0;">
                    
                    <div class="form-group"><label class="form-label">Total Uang Bulanan</label><input type="text" class="form-control" value="Rp ${formatRp(b_uang)}" readonly style="background:#fef5e7; border-color:var(--orange); font-weight:700; color:var(--orange); font-size:16px;"></div>
                    
                    <div class="form-group"><label class="form-label">Total Cash (Bulanan)</label><input type="text" class="form-control" value="Rp ${formatRp(b_cash)}" readonly style="background:#fafafa; font-weight:600; font-size:14px; color:var(--green);"></div>
                    <div class="form-group"><label class="form-label">Total Transfer (Bulanan)</label><input type="text" class="form-control" value="Rp ${formatRp(b_trans)}" readonly style="background:#fafafa; font-weight:600; font-size:14px; color:#2980b9;"></div>

    window.klikMenu = function(val) {
        if (val.startsWith("KLS_")) { tempKelas = (val==="KLS_1"?"Standard":val==="KLS_2"?"Deluxe":val==="KLS_3"?"Suite":"VIP"); pindahHalaman("PILIH_BED"); }
        else if (val.startsWith("BED_")) { tempBed = (val==="BED_1"?"Single":"Twin"); pindahHalaman("PILIH_KAMAR"); }
        else if (val.startsWith("ROOM_")) { tempRoom = val.replace("ROOM_", ""); pindahHalaman("OPSI_KAMAR_HIJAU"); }
        else if (val === "AKSI_RUSAK") { kamarRusak.push(tempRoom); simpanKeCloud(); pindahHalaman("MENU"); }
        else if (val === "AKSI_SELESAI_RUSAK") { kamarRusak = kamarRusak.filter(r => r !== tempRoom); simpanKeCloud(); pindahHalaman("MENU"); }
        else if (val === "RESET_HARIAN") { 
            let s = prompt("Sandi:"); 
            if(s && s.trim() === "jumaeluk1234") { 
                if(bukuKas.harian.uang > 0) { riwayatHarian.push({ tgl: bukuKas.harian.tgl, uang: bukuKas.harian.uang }); if(riwayatHarian.length > 30) riwayatHarian.shift(); }
                bukuKas.harian = {tgl:getTanggalHarian(), uang:0, uangCash:0, uangTransfer:0, uangDebit:0, keluar:0, rincianKeluar: [], kamar:0}; 
                simpanKeCloud(); renderScreen(); 
            } else if(s !== null) { alert("❌ Sandi Salah!"); }
        }
        else if (val === "RESET_BULANAN") { 
            let s = prompt("Sandi untuk Tutup Buku Keuangan:"); 
            if(s && s.trim() === "vipjumaeluk1234") { 
                bukuKas.bulanan.uang = 0; 
                bukuKas.bulanan.keluar = 0; 
                bukuKas.bulanan.uangCash = 0;
                bukuKas.bulanan.uangTransfer = 0;
                bukuKas.bulanan.uangDebit = 0;
                simpanKeCloud(); 
                renderScreen(); 
                alert("✅ Pendapatan & Pengeluaran Bulanan berhasil di-reset!"); 
            } else if(s !== null) { alert("❌ Sandi Salah!"); }
        }
        else if (val === "RESET_KAMAR") { 
            let s = prompt("Sandi untuk Reset Rekap Kamar:"); if(s && s.trim() === "vipjumaeluk1234") { bukuKas.bulanan.kamar = 0; simpanKeCloud(); renderScreen(); alert("✅ Rekap Total Kamar berhasil di-reset ke Nol!"); } else if(s !== null) { alert("❌ Sandi Salah!"); }
        }
        else if (val === "RESET_ALL_INFO") { 
            let s = prompt("⚠️ SANDI MASTER: Masukkan sandi untuk me-reset SEMUA data di halaman ini (Harian & Bulanan):"); 
            if(s && s.trim() === "vipjumaeluk1234") { 
                // Mengosongkan semua data harian
                bukuKas.harian = {tgl:getTanggalHarian(), uang:0, uangCash:0, uangTransfer:0, uangDebit:0, keluar:0, rincianKeluar: [], kamar:0}; 
                // Mengosongkan semua data bulanan
                bukuKas.bulanan = {bln:getTanggalBulanan(), uang:0, kamar:0, keluar:0, uangCash:0, uangTransfer:0, uangDebit:0};
                
                simpanKeCloud(); 
                renderScreen(); 
                alert("✅ BOOM! Seluruh Laporan (Harian & Bulanan) telah dibersihkan menjadi Nol!"); 
            } else if(s !== null) { 
                alert("❌ Sandi Salah! Akses Ditolak."); 
            }
        }
        else if (val === "SINKRON_UANG") {
            let c = 0, t = 0, db = 0; 
            tamuIn.concat(tamuOut).forEach(x => { 
                let sub = (getHarga(x.room)*(parseInt(x.malam)||1)) + ((parseInt(x.extrabed)||0)*150000); 
                if(x.bayar === "CASH") c += sub; else if(x.bayar === "TRANSFER") t += sub; else if(x.bayar === "DEBIT") db += sub; 
            });
            bukuKas.harian.uangCash = c; bukuKas.harian.uangTransfer = t; bukuKas.harian.uangDebit = db; 
            bukuKas.bulanan.uangCash = c; bukuKas.bulanan.uangTransfer = t; bukuKas.bulanan.uangDebit = db; 
            simpanKeCloud(); alert("✅ Sinkronisasi Selesai!"); renderScreen();
        }
    };

    window.prosesFormCheckIn = function() {
        d.nama = document.getElementById('f_nama').value || "-"; d.hp = document.getElementById('f_hp').value || "-";
        d.ktp = document.getElementById('f_ktp').value || "-"; d.alamat = document.getElementById('f_alamat').value || "-";
        d.warga = document.getElementById('f_warga').value || "WNI";
        d.malam = document.getElementById('f_malam').value || "1"; d.extrabed = document.getElementById('f_extrabed').value || "0"; d.bayar = document.getElementById('f_bayar').value || "CASH";
        let jam = new Date().getHours(); d.shift = (jam >= 7 && jam < 17) ? "Pagi" : "Malam";
        d.tgl = getTanggalSekarang(); lastInv++; d.inv = String(lastInv).padStart(4, '0');
        
        let sub = (getHarga(tempRoom) * parseInt(d.malam)) + (parseInt(d.extrabed)*150000);
        bukuKas.harian.uang += sub; bukuKas.bulanan.uang += sub;
        bukuKas.bulanan.kamar = (bukuKas.bulanan.kamar || 0) + 1;

        if(d.bayar === "CASH") { bukuKas.harian.uangCash = (bukuKas.harian.uangCash || 0) + sub; bukuKas.bulanan.uangCash = (bukuKas.bulanan.uangCash || 0) + sub; }
        else if(d.bayar === "TRANSFER") { bukuKas.harian.uangTransfer = (bukuKas.harian.uangTransfer || 0) + sub; bukuKas.bulanan.uangTransfer = (bukuKas.bulanan.uangTransfer || 0) + sub; }
        else if(d.bayar === "DEBIT") { bukuKas.harian.uangDebit = (bukuKas.harian.uangDebit || 0) + sub; bukuKas.bulanan.uangDebit = (bukuKas.bulanan.uangDebit || 0) + sub; }
        
        tamuIn.push({ ...d, room: tempRoom }); simpanKeCloud(); pindahHalaman("PESAN_SUKSES");
    }

    window.onpopstate = function(e) { state = (e.state && e.state.page) ? e.state.page : "MENU"; renderScreen(); };
    window.onload = function() { history.replaceState({ page: "MENU" }, "", ""); renderScreen(); };
