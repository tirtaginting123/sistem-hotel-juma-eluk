<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hotel Terminal Juma Eluk - Luxury PMS</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #0a192f; --gold: #c5a059; --bg: #f4f7f6;
            --white: #ffffff; --green: #27ae60; --red: #e74c3c;
            --orange: #f39c12; --blue: #3498db; --text: #333;
        }
        body { background-color: var(--bg); color: var(--text); font-family: 'Montserrat', sans-serif; margin: 0; padding: 0; line-height: 1.6; }
        .navbar { background-color: #000; color: #fff; padding: 20px 25px; border-bottom: 4px solid var(--gold); display: flex; align-items: center; justify-content: center; }
        .navbar-brand { display: flex; flex-direction: column; align-items: center; gap: 10px; text-align: center; }
        .nav-logo-box { background-color: #fff; width: 70px; height: 70px; padding: 5px; display: flex; justify-content: center; align-items: center; border-radius: 2px; }
        .nav-logo-box img { max-width: 100%; max-height: 100%; object-fit: contain; }
        .header-info h1 { font-family: 'Playfair Display', serif; margin: 0; font-size: 24px; text-transform: uppercase; color: #fff; }
        .header-info p { font-size: 10px; margin: 2px 0 0; color: #fff; line-height: 1.3; }
        .container { max-width: 600px; margin: 0 auto; padding: 20px 15px 50px; }
        #topSearchArea { margin-bottom: 25px; }
        .search-top { width: 100%; padding: 15px 25px; border-radius: 50px; border: 1px solid #ddd; font-size: 16px; outline: none; box-shadow: 0 5px 15px rgba(0,0,0,0.05); box-sizing: border-box; }
        .card { background: var(--white); border-radius: 15px; padding: 20px; margin-bottom: 20px; box-shadow: 0 8px 25px rgba(0,0,0,0.05); border-top: 5px solid var(--gold); }
        .section-title { font-weight: 700; color: var(--primary); margin-bottom: 15px; border-bottom: 1px solid #eee; padding-bottom: 10px; display: block; font-size: 13px; text-transform: uppercase; letter-spacing: 1px; }
        .btn-mewah { background: #fff; color: var(--primary); border: 1px solid #eee; padding: 16px; border-radius: 12px; margin-bottom: 12px; cursor: pointer; font-weight: 600; display: flex; align-items: center; justify-content: space-between; transition: 0.2s; }
        .btn-submit { background: var(--gold); color: white; border: none; padding: 16px; border-radius: 12px; margin-top: 15px; cursor: pointer; font-weight: 700; display: block; width: 100%; text-align: center; font-size: 16px; }
        .form-group { margin-bottom: 15px; text-align: left; }
        .form-label { display: block; font-size: 12px; font-weight: 700; color: var(--primary); margin-bottom: 5px; text-transform: uppercase; }
        .form-control { width: 100%; padding: 14px 15px; border-radius: 8px; border: 1px solid #ddd; font-size: 15px; box-sizing: border-box; background: #fafafa; }
        .room-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
        .room-box { padding: 20px 0; border-radius: 10px; text-align: center; font-weight: 700; color: white; cursor: pointer; }
        .status-green { background: var(--green); }
        .status-red { background: var(--red); }
        .status-orange { background: var(--orange); }
        .status-blue { background: var(--blue); }
        #loadingBar { background: var(--gold); color: white; padding: 5px; text-align: center; font-size: 11px; display: none; }
        
        /* TABLE ARSIP */
        .arsip-table th, .arsip-table td { border: 1px solid #ddd; padding: 8px; font-size: 11px; }
        .arsip-table th { background-color: var(--primary); color: white; }

        /* SEMBUNYIKAN STRUK DI LAYAR HP/LAPTOP */
        #printArea { display: none; }
        
        /* DESAIN CETAK KHUSUS DOT MATRIX 24x14 CM (LANDSCAPE) */
        @media print {
            @page { margin: 0; size: 240mm 140mm; } 
            body { background: white; color: black; font-family: Arial, Helvetica, sans-serif; margin: 0; padding: 0; }
            #screen, #topSearchArea, #loadingBar, .navbar, .container { display: none !important; }
            #printArea { 
                display: block !important; 
                width: 240mm; 
                height: 140mm; 
                box-sizing: border-box; 
                overflow: hidden; 
                page-break-after: avoid; 
                padding: 5mm; 
            }
            table { border-collapse: collapse; }
        }
    </style>
</head>
<body>
    <div id="loadingBar">>>> CONNECTING TO CLOUD...</div>
    <div class="navbar">
        <div class="navbar-brand">
            <div class="nav-logo-box"><img src="logo.jpg" alt="Logo JE"></div>
            <div class="header-info">
                <h1>Hotel Juma Eluk</h1>
                <p>Jl. Letjen Jamin Ginting Sumber Mufakat Kabanjahe Tanah Karo</p>
                <p>HP: 0821 6848 9514</p>
            </div>
        </div>
    </div>
    <div class="container" id="mainContainer">
        <div id="topSearchArea"><input type="text" id="topSearch" class="search-top" placeholder="🔍 Cari Kamar, Tipe, atau Tamu..." autocomplete="off" oninput="liveSearch(this.value)"></div>
        <div id="screen"></div>
    </div>
    <div id="printArea"></div>

<script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-database-compat.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script>
    const firebaseConfig = {
      apiKey: "AIzaSyAvCTnP9xmMYdtzbItnG9s-jzJ2LP143S8",
      authDomain: "juma-elok.firebaseapp.com",
      databaseURL: "https://juma-elok-default-rtdb.firebaseio.com",
      projectId: "juma-elok",
      storageBucket: "juma-elok.firebasestorage.app",
      messagingSenderId: "703237300210",
      appId: "1:703237300210:web:e21f5bdea56000359a156b"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const dataRef = db.ref('hotel_data');

    const dataHotel = [
        {tipe: "Single", kelas: "Standard", nomor: ["2a","3a","4a","5a","6a","7a","8a","9a","10a","11a","11b"], harga: 300000},
        {tipe: "Twin", kelas: "Standard", nomor: ["2b","3b","4b","5b","6b","7b","8b","9b","10b"], harga: 300000},
        {tipe: "Single", kelas: "Deluxe", nomor: ["1","12a","13a","14a","15a","15","12b","14b"], harga: 350000},
        {tipe: "Twin", kelas: "Deluxe", nomor: ["1b","13b","15b"], harga: 350000},
        {tipe: "Single", kelas: "Suite", nomor: ["4av","5av","6av","7av","8av","9av","10av","11av","6bv","7bv","8bv","9bv"], harga: 400000},
        {tipe: "Twin", kelas: "Suite", nomor: ["4bv","5bv"], harga: 400000},
        {tipe: "Single", kelas: "VIP", nomor: ["2av", "3av", "2bv"], harga: 600000},
        {tipe: "Twin", kelas: "VIP", nomor: ["3bv"], harga: 600000}
    ];

    let tamuIn = [], tamuOut = [], tamuPending = [], kamarRusak = [], arsipTamu = [], lastInv = 0, riwayatHarian = [];
    let catatanHotel = "";
    let isPendingMode = false;
    let isJualBillMode = false; 
    let bukuKas = { 
        harian: { tgl: "", uang: 0, uangCash: 0, uangTransfer: 0, uangDebit: 0, keluar: 0, rincianKeluar: [], kamar: 0, billPagi: {awal:null, akhir:null, count:0}, billMalam: {awal:null, akhir:null, count:0}, jualBill: [], last_reset: 0 }, 
        bulanan: { bln: "", uang: 0, kamar: 0, keluar: 0, uangCash: 0, uangTransfer: 0, uangDebit: 0 } 
    };
    let state = "MENU", tempBed="", tempKelas="", tempRoom="", tempCari="";
    let d = { nama:"", alamat:"", warga:"", ktp:"", hp:"", malam:"", extrabed:"", bayar:"", tgl:"", tgl_out:"", inv:"", shift:"" };
    let cryptoChart;

    const screen = document.getElementById('screen');
    const loadingBar = document.getElementById('loadingBar');
    const printArea = document.getElementById('printArea');

    dataRef.on('value', (snapshot) => {
        const cloudData = snapshot.val();
        loadingBar.style.display = "none";
        if (cloudData) {
            tamuIn = cloudData.checkin || []; tamuOut = cloudData.checkout || []; 
            tamuPending = cloudData.pending || []; kamarRusak = cloudData.maintenance || []; 
            arsipTamu = cloudData.arsip || [];
            lastInv = cloudData.last_inv || 0; riwayatHarian = cloudData.riwayatHarian || [];
            catatanHotel = cloudData.catatan || "";
            
            let dbKas = cloudData.bukuKas || {};
            bukuKas = { 
                harian: { 
                    tgl: getTanggalHarian(), uang: dbKas.harian?.uang || 0, uangCash: dbKas.harian?.uangCash || 0, 
                    uangTransfer: dbKas.harian?.uangTransfer || 0, uangDebit: dbKas.harian?.uangDebit || 0,
                    keluar: dbKas.harian?.keluar || 0, rincianKeluar: dbKas.harian?.rincianKeluar || [], kamar: dbKas.harian?.kamar || 0,
                    billPagi: dbKas.harian?.billPagi || {awal:null, akhir:null, count:0},
                    billMalam: dbKas.harian?.billMalam || {awal:null, akhir:null, count:0},
                    jualBill: dbKas.harian?.jualBill || [],
                    last_reset: dbKas.harian?.last_reset || new Date().getTime()
                }, 
                bulanan: { 
                    bln: getTanggalBulanan(), uang: dbKas.bulanan?.uang || 0, kamar: dbKas.bulanan?.kamar || 0, keluar: dbKas.bulanan?.keluar || 0,
                    uangCash: dbKas.bulanan?.uangCash || 0, uangTransfer: dbKas.bulanan?.uangTransfer || 0, uangDebit: dbKas.bulanan?.uangDebit || 0
                } 
            };

            let now = new Date().getTime();
            if (now - bukuKas.harian.last_reset > (25 * 60 * 60 * 1000)) {
                bukuKas.harian.billPagi = {awal:null, akhir:null, count:0};
                bukuKas.harian.billMalam = {awal:null, akhir:null, count:0};
                bukuKas.harian.last_reset = now;
                simpanKeCloud();
            }
        }
        renderScreen();
    });

    function simpanKeCloud() { loadingBar.style.display = "block"; dataRef.set({ checkin: tamuIn, checkout: tamuOut, pending: tamuPending, maintenance: kamarRusak, arsip: arsipTamu, last_inv: lastInv, bukuKas: bukuKas, riwayatHarian: riwayatHarian, catatan: catatanHotel }).then(() => loadingBar.style.display = "none"); }
    function getHarga(noKmr) { for (let k of dataHotel) { if (k.nomor.includes(noKmr)) return k.harga; } return 0; }
    function formatRp(angka) { return new Intl.NumberFormat('id-ID').format(angka); }
    function getTanggalSekarang() { return new Date().toLocaleDateString('id-ID', { day: '2-digit', month: 'short', year: 'numeric', hour: '2-digit', minute:'2-digit' }); }
    function getTanggalHarian() { return new Date().toLocaleDateString('id-ID', { day: '2-digit', month: 'short', year: 'numeric' }); }
    function getTanggalBulanan() { return new Date().toLocaleDateString('id-ID', { month: 'long', year: 'numeric' }); }

    function pindahHalaman(newState) { state = newState; history.pushState({ page: newState }, "", ""); renderScreen(); }

    window.prosesCheckOut = function(index) {
        let cItemBox = document.getElementById('charge_item_' + index);
        let cHargaBox = document.getElementById('charge_harga_' + index);
        let cBayarBox = document.getElementById('charge_bayar_' + index);

        let cItem = cItemBox ? cItemBox.value.trim() : "";
        let cHarga = cHargaBox ? parseInt(cHargaBox.value) || 0 : 0;
        let cBayar = cBayarBox ? cBayarBox.value : "CASH";

        let sisaVit = prompt("Berapa sisa botol air Vit di kamar saat tamu keluar?\n- Ketik 2 (Utuh/Tidak diminum)\n- Ketik 1 (Sisa 1 botol)\n- Ketik 0 (Habis diminum semua)", "0");
        if(sisaVit !== null) {
            sisaVit = sisaVit.trim();
            if(sisaVit === "0" || sisaVit === "1" || sisaVit === "2") {
                
                if (cHarga > 0) {
                    bukuKas.harian.uang += cHarga; bukuKas.bulanan.uang += cHarga;
                    if (cBayar === "CASH") { bukuKas.harian.uangCash += cHarga; bukuKas.bulanan.uangCash += cHarga; }
                    else if (cBayar === "TRANSFER") { bukuKas.harian.uangTransfer += cHarga; bukuKas.bulanan.uangTransfer += cHarga; }
                    else if (cBayar === "DEBIT") { bukuKas.harian.uangDebit += cHarga; bukuKas.bulanan.uangDebit += cHarga; }
                    tamuIn[index].charge = `${cItem} (Rp ${formatRp(cHarga)} via ${cBayar})`;
                } else if (cItem !== "") { tamuIn[index].charge = cItem; } 
                else { tamuIn[index].charge = "-"; }

                tamuIn[index].vit = "vit " + sisaVit; 
                tamuIn[index].jam_out_aktual = getTanggalSekarang();
                
                arsipTamu.push({
                    nama: tamuIn[index].nama,
                    inv: tamuIn[index].inv,
                    jam_in: tamuIn[index].tgl,
                    jam_out: tamuIn[index].jam_out_aktual,
                    vit: sisaVit,
                    charge: tamuIn[index].charge
                });

                tamuOut.push(tamuIn[index]); 
                tamuIn.splice(index, 1); 
                simpanKeCloud(); 
                renderScreen();
            } else { alert("❌ Gagal: Masukkan angka 2, 1, atau 0 saja untuk sisa Vit."); }
        }
    };

    window.hapusRiwayat = function(index) { tamuOut.splice(index, 1); simpanKeCloud(); renderScreen(); };
    window.liveSearch = function(val) { tempCari = val.trim().toLowerCase(); state = tempCari !== "" ? "HASIL_CARI" : "MENU"; renderScreen(); };

    window.tandaiDeposit = function(index) { if(confirm("Tandai deposit Rp 100.000 sudah kembali?")) { tamuIn[index].deposit_kembali = true; simpanKeCloud(); renderScreen(); } };
    window.tandaiDepositOut = function(index) { if(confirm("Tandai deposit Rp 100.000 sudah kembali?")) { tamuOut[index].deposit_kembali = true; simpanKeCloud(); renderScreen(); } };

    window.editPembayaran = function(index) {
        let t = tamuIn[index]; let opsiBaru = prompt(`Ketik 'CASH', 'TRANSFER', atau 'DEBIT':`, t.bayar);
        if (opsiBaru !== null) {
            opsiBaru = opsiBaru.toUpperCase().trim();
            if (opsiBaru === "CASH" || opsiBaru === "TRANSFER" || opsiBaru === "DEBIT") {
                if (opsiBaru !== t.bayar) {
                    let sub = (getHarga(t.room) * (parseInt(t.malam)||1)) + ((parseInt(t.extrabed)||0)*150000);
                    
                    if (t.bayar === "CASH") { bukuKas.harian.uangCash -= sub; bukuKas.bulanan.uangCash -= sub; }
                    else if (t.bayar === "TRANSFER") { bukuKas.harian.uangTransfer -= sub; bukuKas.bulanan.uangTransfer -= sub; }
                    else if (t.bayar === "DEBIT") { bukuKas.harian.uangDebit -= sub; bukuKas.bulanan.uangDebit -= sub; }
                    
                    if (opsiBaru === "CASH") { bukuKas.harian.uangCash += sub; bukuKas.bulanan.uangCash += sub; }
                    else if (opsiBaru === "TRANSFER") { bukuKas.harian.uangTransfer += sub; bukuKas.bulanan.uangTransfer += sub; }
                    else if (opsiBaru === "DEBIT") { bukuKas.harian.uangDebit += sub; bukuKas.bulanan.uangDebit += sub; }
                    
                    tamuIn[index].bayar = opsiBaru; simpanKeCloud(); renderScreen();
                }
            } else { alert("❌ Gagal: Mohon ketik 'CASH', 'TRANSFER', atau 'DEBIT' saja."); }
        }
    };

    window.prosesPengeluaran = function() {
        let deskripsi = document.getElementById('p_item').value || "Lain-lain";
        let harga = parseInt(document.getElementById('p_harga').value) || 0;
        if(harga > 0) {
            bukuKas.harian.keluar += harga; bukuKas.bulanan.keluar += harga;
            bukuKas.harian.rincianKeluar.push({ ket: deskripsi, nominal: harga });
            simpanKeCloud(); alert("✅ Pengeluaran dicatat!"); pindahHalaman("TUTUP_BUKU");
        }
    };

    window.simpanCatatan = function() { catatanHotel = document.getElementById('txt_catatan').value; simpanKeCloud(); alert("✅ Catatan berhasil disimpan!"); pindahHalaman('MENU'); };

    window.siapkanInvoice = function() {
        let cetakKelas = tempKelas; let cetakBed = tempBed;
        for (let k of dataHotel) { if (k.nomor.includes(tempRoom)) { cetakKelas = k.kelas; cetakBed = k.tipe; break; } }
        let hargaKamar = getHarga(tempRoom); let total = (hargaKamar * (parseInt(d.malam)||1)) + ((parseInt(d.extrabed)||0) * 150000); 
        
        printArea.innerHTML = `
            <div style="width:100%; height:100%; box-sizing:border-box;">
                <div style="display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:5px;">
                    <div style="display:flex; align-items:center;">
                        <div style="border: 2px solid #000; border-radius: 50%; width: 45px; height: 45px; display:flex; justify-content:center; align-items:center; margin-right:10px; font-weight:bold; font-size:18px;">JE</div>
                        <div>
                            <div style="font-size:16px; font-weight:bold;">JUMA ELUK HOTEL</div>
                            <div style="font-size:11px; line-height:1.2; margin-top:3px;">JL. LETJEND JAMIN GINTING, KABANJAHE<br>TANAH KARO - SUMATERA UTARA<br>HP. 0821 6848 9514</div>
                        </div>
                    </div>
                    <div style="font-weight:bold; font-size:16px; margin-top:8px;">INVOICE FORM</div>
                </div>
                <div style="font-size:14px; font-weight:bold; margin-bottom: 8px;">NO : ${d.inv}</div>
                <table style="width:100%; border-collapse:collapse; font-size:12px; border:2px solid #000;">
                    <tr>
                        <td style="border:2px solid #000; padding:6px 8px;"><b>NAME</b><br>${d.nama}</td>
                        <td style="border:2px solid #000; padding:6px 8px;"><b>ADDRESS</b><br>${d.alamat}</td>
                        <td style="border:2px solid #000; padding:6px 8px;"><b>NATIONALITY</b><br>${d.warga}</td>
                        <td style="border:2px solid #000; padding:6px 8px;"><b>ID NUMBER</b><br>${d.ktp}</td>
                    </tr>
                    <tr>
                        <td style="border:2px solid #000; padding:6px 8px;"><b>TYPE OF ROOM :</b><br>${cetakKelas} ${cetakBed} (${tempRoom})</td>
                        <td colspan="2" style="border:2px solid #000; padding:6px 8px;"><b>EXTRA BED :</b><br>${d.extrabed} Kasur</td>
                        <td style="border:2px solid #000; padding:6px 8px;"><b>PRICE :</b><br>Rp ${formatRp(hargaKamar)}</td>
                    </tr>
                    <tr>
                        <td style="border:2px solid #000; padding:6px 8px;"><b>CHECK IN DATE :</b><br>${d.tgl}</td>
                        <td colspan="2" style="border:2px solid #000; padding:6px 8px;"><b>CHECK OUT DATE :</b><br>${d.tgl_out}</td>
                        <td rowspan="3" style="border:2px solid #000; padding:6px 8px; vertical-align:top;">
                            <b>TYPE OF TRIP</b><br>
                            <div style="display:flex; justify-content:space-between; margin-top:3px; font-size:10px; line-height:1.5;">
                                <div>&#9634; Meeting<br>&#9634; Invitation<br>&#9634; Exhibition</div>
                                <div>&#9634; Leisure<br>&#9634; Convention<br>&#9634; Travelling</div>
                            </div>
                        </td>
                    </tr>
                    <tr>
                        <td style="border:2px solid #000; padding:6px 8px;"><b>TRANFORTATION BY :</b><br>-</td>
                        <td colspan="2" style="border:2px solid #000; padding:6px 8px;"><b>TYPE OF PAYMENT :</b><br>${d.bayar}</td>
                    </tr>
                    <tr>
                        <td colspan="3" style="border:2px solid #000; padding:6px 8px;"><b>MOBILE NUMBER :</b><br>${d.hp}</td>
                    </tr>
                    <tr>
                        <td colspan="2" style="border:2px solid #000; padding:6px 8px; height:45px; vertical-align:bottom; text-align:center;"><b>GUEST SIGNATURE</b></td>
                        <td colspan="2" style="border:2px solid #000; padding:6px 8px; vertical-align:top;">
                            <div style="display:flex; justify-content:space-between; width:100%;">
                                <div><b>TOTAL ACCOUNT :</b><br><b style="font-size:16px;">Rp ${formatRp(total)}</b></div>
                                <div style="text-align:right; margin-top:15px;">..................................<br>RECEPTION INCHARGE</div>
                            </div>
                        </td>
                    </tr>
                </table>
            </div>
        `;
    }

    function renderScreen() {
        let out = ""; document.getElementById('topSearchArea').style.display = (state === "MENU" || state === "HASIL_CARI") ? "block" : "none";
        
        if (state === "MENU") {
            out += `<div class="card"><span class="section-title">🏠 Reception Dashboard</span>
                <div class="btn-mewah" onclick="isPendingMode=false; isJualBillMode=false; pindahHalaman('PILIH_KELAS')"><span>🛏️ 1. Booking Kamar Baru</span><span>➔</span></div>
                <div class="btn-mewah" onclick="isPendingMode=true; isJualBillMode=false; pindahHalaman('PILIH_KELAS')" style="border-left: 4px solid var(--blue);"><span>⏳ #. Pending Bookingan</span><span>➔</span></div>
                <div class="btn-mewah" onclick="pindahHalaman('DAFTAR_TAMU')"><span>👥 2. Monitoring & Check-Out</span><span>➔</span></div>
                <div class="btn-mewah" onclick="pindahHalaman('TUTUP_BUKU')"><span>💰 3a. Laporan Keuangan</span><span>➔</span></div>
                <div class="btn-mewah" onclick="pindahHalaman('FORM_PENGELUARAN')" style="border-left: 4px solid var(--red);"><span>📉 3b. Catat Pengeluaran</span><span>➔</span></div>
                <div class="btn-mewah" onclick="pindahHalaman('GRAFIK')" style="border-left: 4px solid #3498db;"><span>📈 5. Grafik Tren Pendapatan</span><span>➔</span></div>
                <div class="btn-mewah" onclick="pindahHalaman('RINGKASAN_KAMAR')" style="border-left: 4px solid var(--green);"><span>📊 6. Status & Ringkasan Kamar</span><span>➔</span></div>

            }
            else if (state === "GRAFIK") {
                out += `<div class="card"><span class="section-title">📈 Tren Pendapatan Harian</span><div style="position: relative; height:35vh; width:100%; margin-top:20px;"><canvas id="cryptoChart"></canvas></div><div class="btn-mewah" onclick="pindahHalaman('MENU')" style="margin-top:20px; justify-content:center;">🔙 Kembali</div></div>`;
            }
            else if (state === "PILIH_KELAS") {
                out += `<div class="card"><span class="section-title">🏨 Pilih Kelas Kamar</span>`;
                ["Standard", "Deluxe", "Suite", "VIP"].forEach((c, i) => { out += `<div class="btn-mewah" onclick="isJualBillMode=false; klikMenu('KLS_${i+1}')">💎 ${c}</div>`; });
                
                out += `<div class="btn-mewah" onclick="isJualBillMode=true; alert('✅ MODE JUAL BILL AKTIF!\\nHarga akan dikunci menjadi Rp 100.000 untuk Laporan Kas.\\n\\nSilakan lanjut pilih kelas kamar di atas agar tampilan di struk Dot Matrix tetap sesuai.'); this.style.background='#e74c3c'; this.style.color='#fff';" style="background:#f1c40f; color:#000; font-weight:800; text-align:center; justify-content:center;">🏷️ Beli Bill (Set Harga 100k)</div>`;

                out += `<div class="btn-mewah" onclick="isJualBillMode=false; pindahHalaman('MENU')" style="color:var(--red); justify-content:center;">🔙 Batal</div></div>`;
            }
            else if (state === "PILIH_BED") {
                out += `<div class="card"><span class="section-title">🛏️ Pilih Tipe Kasur</span><div class="btn-mewah" onclick="klikMenu('BED_1')">👤 Single Bed</div><div class="btn-mewah" onclick="klikMenu('BED_2')">👥 Twin Bed</div><div class="btn-mewah" onclick="pindahHalaman('PILIH_KELAS')" style="justify-content:center;">🔙 Kembali</div></div>`;
            }
            else if (state === "PILIH_KAMAR") {
                out += `<div class="card"><span class="section-title">🔑 Pilih Nomor Kamar</span><div class="room-grid">`;
                let cur = []; for (let k of dataHotel) { if (k.tipe === tempBed && k.kelas === tempKelas) { cur = k.nomor; break; } }
                cur.forEach(no => { 
                    let s = tamuIn.some(t => t.room === no) ? "status-red" : (kamarRusak.includes(no) ? "status-orange" : (tamuPending.some(t => t.room === no) ? "status-blue" : "status-green")); 
                    out += `<div class="room-box ${s}" onclick="klikMenu('ROOM_${no}')">${no}</div>`; 
                });
                out += `</div><br><div class="btn-mewah" onclick="pindahHalaman('MENU')" style="justify-content:center;">🔙 Batal</div></div>`;
            }
            else if (state === "OPSI_KAMAR_HIJAU") {
                let adaPending = tamuPending.find(t => t.room === tempRoom);
                out += `<div class="card"><span class="section-title">⚙️ Opsi Kamar ${tempRoom}</span>`;
                if (kamarRusak.includes(tempRoom)) { 
                    out += `<div class="btn-mewah" onclick="klikMenu('AKSI_SELESAI_RUSAK')" style="color:var(--green);">✔️ Selesai Diperbaiki</div>`; 
                } else if (adaPending) {
                    out += `<div style="background:#eaf2f8; padding:12px; border-radius:8px; margin-bottom:15px; font-size:12px; border:1px solid var(--blue);">
                            <b>Kamar ini sedang PENDING (Booked):</b><br>👤 ${adaPending.nama} (${adaPending.hp})<br>🗓️ Rencana Masuk: ${adaPending.tgl_in}<br>💰 Status: ${adaPending.lunas} (Masuk Rp ${formatRp(adaPending.dp)})</div>`;
                    out += `<div class="btn-mewah" onclick="pindahHalaman('FORM_CHECKIN')">📝 Check-In Tamu Pending Ini</div>`;
                    out += `<div class="btn-mewah" onclick="klikMenu('BATAL_PENDING')" style="color:var(--red);">❌ Batalkan Bookingan</div>`;
                } else { 
                    if(isPendingMode) {
                        out += `<div class="btn-mewah" onclick="pindahHalaman('FORM_PENDING')">⏳ Isi Form Pending Booking</div>`;
                    } else {
                        out += `<div class="btn-mewah" onclick="pindahHalaman('FORM_CHECKIN')">📝 Lakukan Check-In Normal</div>`; 
                    }
                    out += `<div class="btn-mewah" onclick="klikMenu('AKSI_RUSAK')" style="color:var(--orange);">🛠️ Tandai Sedang Diperbaiki</div>`; 
                }
                out += `<div class="btn-mewah" onclick="pindahHalaman('MENU')" style="justify-content:center;">🔙 Batal</div></div>`;
            }
            else if (state === "FORM_PENDING") {
                out += `<div class="card"><span class="section-title" style="color:var(--blue);">⏳ Form Pending Booking - Kamar ${tempRoom}</span>
                    <div class="form-group"><label class="form-label">Nama Pemesan</label><input type="text" id="p_nama" class="form-control"></div>
                    <div class="form-group"><label class="form-label">Nomor HP</label><input type="tel" id="p_hp" class="form-control"></div>
                    <div class="form-group"><label class="form-label">Tgl Check-In Nanti</label><input type="text" id="p_tgl_in" class="form-control" placeholder="Contoh: 19 April"></div>
                    <div class="form-group"><label class="form-label">Status Lunas?</label>
                        <select id="p_lunas" class="form-control" onchange="document.getElementById('box_dp').style.display = this.value === 'Belum Lunas' ? 'block' : 'none'">
                            <option value="Belum Lunas">Belum Lunas (Bayar DP)</option>
                            <option value="Sudah Lunas">Sudah Lunas (Bayar Penuh)</option>
                        </select>
                    </div>
                    <div id="box_dp" class="form-group"><label class="form-label">Jumlah DP (Ketik Angka)</label><input type="tel" id="p_dp" class="form-control" placeholder="0"></div>
                    <div class="form-group"><label class="form-label">Pembayaran DP/Lunas via</label>
                        <select id="p_bayar" class="form-control"><option value="CASH">CASH</option><option value="TRANSFER">TRANSFER</option><option value="DEBIT">DEBIT</option></select>
                    </div>
                    <button class="btn-submit" style="background:var(--blue);" onclick="prosesFormPending()">💾 Simpan Bookingan</button>
                    <div class="btn-mewah" onclick="pindahHalaman('MENU')" style="margin-top:10px; justify-content:center;">🔙 Batal</div></div>`;
            }
            else if (state === "FORM_CHECKIN") {
                let pdg = tamuPending.find(t => t.room === tempRoom);
                let defNama = pdg ? pdg.nama : "";
                let defHp = pdg ? pdg.hp : "";
                let infoDP = pdg && pdg.dp > 0 ? `<div style="background:#eafaf1; border:1px solid var(--green); padding:10px; border-radius:8px; margin-bottom:15px; font-size:12px; color:var(--green); font-weight:bold;">✅ Tamu ini sudah membayar Rp ${formatRp(pdg.dp)} saat booking. Sistem akan otomatis memotong tagihan check-in.</div>` : "";
                let infoJualBill = isJualBillMode ? `<div style="background:#fff9e6; border:1px solid #f1c40f; padding:10px; border-radius:8px; margin-bottom:15px; font-size:12px; font-weight:bold; text-align:center;">🏷️ MODE JUAL BILL AKTIF (KASIR = Rp 100.000)</div>` : "";

                out += `<div class="card"><span class="section-title">📝 Formulir Check-In - Kamar ${tempRoom}</span>
                    ${infoJualBill}
                    ${infoDP}
                    <div class="form-group"><label class="form-label">Nama Lengkap</label><input type="text" id="f_nama" class="form-control" value="${defNama}"></div>
                    <div class="form-group"><label class="form-label">Alamat</label><input type="text" id="f_alamat" class="form-control"></div>
                    <div class="form-group"><label class="form-label">Kebangsaan</label><input type="text" id="f_warga" class="form-control" value="WNI"></div>
                    <div class="form-group"><label class="form-label">No KTP/ID</label><input type="tel" id="f_ktp" class="form-control"></div>
                    <div class="form-group"><label class="form-label">HP</label><input type="tel" id="f_hp" class="form-control" value="${defHp}"></div>
                    <div class="form-group"><label class="form-label">Malam</label><input type="tel" id="f_malam" class="form-control" value="1"></div>
                    <div class="form-group"><label class="form-label">Extra Bed</label><select id="f_extrabed" class="form-control"><option value="0">0</option><option value="1">1</option><option value="2">2</option></select></div>
                    <div class="form-group"><label class="form-label">${pdg ? "Bayar Kekurangan (Sisa) via" : "Pembayaran via"}</label><select id="f_bayar" class="form-control"><option value="CASH">CASH</option><option value="TRANSFER">TRANSFER</option><option value="DEBIT">DEBIT</option></select></div>
                    <button class="btn-submit" onclick="prosesFormCheckIn()">✔️ Selesaikan Check-In</button></div>`;
            }
            else if (state === "HASIL_CARI") {
                out += `<div class="card"><span class="section-title">🔍 Hasil Cari: "${tempCari}"</span><div class="room-grid">`;
                let ada = false; dataHotel.forEach(k => k.nomor.forEach(no => { let tamu = tamuIn.find(t => t.room === no); let radar = `${no} ${k.kelas} ${k.tipe} ${tamu ? tamu.nama : ""}`.toLowerCase(); if (radar.includes(tempCari)) { ada = true; let s = tamu ? "status-red" : (kamarRusak.includes(no) ? "status-orange" : (tamuPending.some(p => p.room === no) ? "status-blue" : "status-green")); out += `<div class="room-box ${s}" onclick="klikMenu('ROOM_${no}')" style="padding:10px 5px; line-height:1.2;"><div style="font-size:16px;">${no}</div><div style="font-size:9px;">${k.kelas} ${k.tipe}</div>${tamu ? '<div style="font-size:8px;">👤 '+tamu.nama+'</div>' : ''}</div>`; } }));
                if(!ada) out += `<p style="grid-column:span 3; text-align:center; opacity:0.5;">❌ Tidak ditemukan</p>`;
                out += `</div><br><div class="btn-mewah" onclick="pindahHalaman('MENU')" style="justify-content:center;">🔙 Kembali</div></div>`;
            }
            else if (state === "PESAN_SUKSES") {
                out += `<div class="card" style="text-align:center"><h2>✅ Check-In Berhasil!</h2>
                    <div class="btn-mewah" style="justify-content:center" onclick="window.siapkanInvoice(); setTimeout(() => { window.print(); }, 500);">🖨️ Cetak Invoice (Dot Matrix)</div>
                    <div class="btn-mewah" style="justify-content:center" onclick="pindahHalaman('MENU')">🏠 Ke Dashboard</div></div>`;
            }
        }
        screen.innerHTML = out;

        if (state === "GRAFIK") {
            setTimeout(() => {
                const ctx = document.getElementById('cryptoChart'); if(!ctx) return;
                let labels = riwayatHarian.map(r => r.tgl).slice(-10); let dataUang = riwayatHarian.map(r => r.uang).slice(-10);
                labels.push("Hari Ini"); dataUang.push(bukuKas.harian.uang);
                if(cryptoChart) cryptoChart.destroy();
                cryptoChart = new Chart(ctx, { type: 'line', data: { labels: labels, datasets: [{ label: 'Rp', data: dataUang, borderColor: '#27ae60', backgroundColor: 'rgba(39, 174, 96, 0.2)', borderWidth: 3, tension: 0.4, fill: true }] }, options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { y: { beginAtZero: true, ticks: { callback: function(value) { return value/1000 + 'k'; } } } } } });
            }, 100);
        }
    }

    window.klikMenu = function(val) {
        if (val.startsWith("KLS_")) { tempKelas = (val==="KLS_1"?"Standard":val==="KLS_2"?"Deluxe":val==="KLS_3"?"Suite":"VIP"); pindahHalaman("PILIH_BED"); }
        else if (val.startsWith("BED_")) { tempBed = (val==="BED_1"?"Single":"Twin"); pindahHalaman("PILIH_KAMAR"); }
        else if (val.startsWith("ROOM_")) { tempRoom = val.replace("ROOM_", ""); pindahHalaman("OPSI_KAMAR_HIJAU"); }
        else if (val === "AKSI_RUSAK") { kamarRusak.push(tempRoom); simpanKeCloud(); pindahHalaman("MENU"); }
        else if (val === "AKSI_SELESAI_RUSAK") { kamarRusak = kamarRusak.filter(r => r !== tempRoom); simpanKeCloud(); pindahHalaman("MENU"); }
        else if (val === "BATAL_PENDING") {
            if(confirm("Batalkan bookingan kamar ini? (Catatan: Uang DP/Booking yang sudah dicatat tidak akan otomatis ditarik dari kas harian, harap catat sebagai Pengeluaran jika dilakukan refund/kembali uang)")) {
                tamuPending = tamuPending.filter(t => t.room !== tempRoom); simpanKeCloud(); pindahHalaman("MENU");
            }
        }
        else if (val === "RESET_HARIAN") { 
            let s = prompt("Sandi:"); 
            if(s && s.trim() === "jumaeluk1234") { 
                if(bukuKas.harian.uang > 0) { riwayatHarian.push({ tgl: bukuKas.harian.tgl, uang: bukuKas.harian.uang }); if(riwayatHarian.length > 30) riwayatHarian.shift(); }
                bukuKas.harian = {
                    tgl: getTanggalHarian(), uang:0, uangCash:0, uangTransfer:0, uangDebit:0, keluar:0, rincianKeluar: [], kamar:0,
                    billPagi: {awal:null, akhir:null, count:0}, billMalam: {awal:null, akhir:null, count:0}, jualBill: [], last_reset: new Date().getTime()
                }; 
                simpanKeCloud(); renderScreen(); 
            } else if(s !== null) { alert("❌ Sandi Salah!"); }
        }
        else if (val === "RESET_BULANAN") { 
            let s = prompt("Sandi untuk Tutup Buku Keuangan:"); 
            if(s && s.trim() === "vipjumaeluk1234") { 
                bukuKas.bulanan.uang = 0; bukuKas.bulanan.keluar = 0; bukuKas.bulanan.uangCash = 0; bukuKas.bulanan.uangTransfer = 0; bukuKas.bulanan.uangDebit = 0;
                simpanKeCloud(); renderScreen(); alert("✅ Pendapatan & Pengeluaran Bulanan berhasil di-reset!"); 
            } else if(s !== null) { alert("❌ Sandi Salah!"); }
        }
        else if (val === "RESET_KAMAR") { 
            let s = prompt("Sandi untuk Reset Rekap Kamar:"); if(s && s.trim() === "vipjumaeluk1234") { bukuKas.bulanan.kamar = 0; simpanKeCloud(); renderScreen(); alert("✅ Rekap Total Kamar berhasil di-reset ke Nol!"); } else if(s !== null) { alert("❌ Sandi Salah!"); }
        }
        else if (val === "RESET_ALL_INFO") { 
            let s = prompt("⚠️ SANDI MASTER: Masukkan sandi untuk me-reset SEMUA data (Harian & Bulanan):"); 
            if(s && s.trim() === "vipjumaeluk1234") { 
                bukuKas.harian = {tgl:getTanggalHarian(), uang:0, uangCash:0, uangTransfer:0, uangDebit:0, keluar:0, rincianKeluar: [], kamar:0, billPagi: {awal:null, akhir:null, count:0}, billMalam: {awal:null, akhir:null, count:0}, jualBill: [], last_reset: new Date().getTime()}; 
                bukuKas.bulanan = {bln:getTanggalBulanan(), uang:0, kamar:0, keluar:0, uangCash:0, uangTransfer:0, uangDebit:0};
                simpanKeCloud(); renderScreen(); alert("✅ BOOM! Seluruh Laporan Kasir telah dibersihkan menjadi Nol!"); 
            } else if(s !== null) { alert("❌ Sandi Salah! Akses Ditolak."); }
        }
        else if (val === "SINKRON_UANG") {
            let c = 0, t = 0, db = 0; 
            tamuIn.concat(tamuOut).forEach(x => { 
                let sub = (getHarga(x.room)*(parseInt(x.malam)||1)) + ((parseInt(x.extrabed)||0)*150000); 
                if(x.bayar === "CASH") c += sub; else if(x.bayar === "TRANSFER") t += sub; else if(x.bayar === "DEBIT") db += sub; 
            });
            bukuKas.harian.uangCash = c; bukuKas.harian.uangTransfer = t; bukuKas.harian.uangDebit = db; 
            bukuKas.bulanan.uangCash = c; bukuKas.bulanan.uangTransfer = t; bukuKas.bulanan.uangDebit = db; 
            simpanKeCloud(); alert("✅ Sinkronisasi Selesai!"); renderScreen();
        }
    };

    window.prosesFormPending = function() {
        let lunasOpt = document.getElementById('p_lunas').value;
        let dpValue = lunasOpt === "Sudah Lunas" ? getHarga(tempRoom) : (parseInt(document.getElementById('p_dp').value) || 0);
        let byr = document.getElementById('p_bayar').value;

        let p = {
            nama: document.getElementById('p_nama').value || "-", hp: document.getElementById('p_hp').value || "-", tgl_in: document.getElementById('p_tgl_in').value || "-",
            lunas: lunasOpt, dp: dpValue, bayar: byr, room: tempRoom
        };
        
        if(dpValue > 0) {
            bukuKas.harian.uang += dpValue; bukuKas.bulanan.uang += dpValue;
            if(byr === "CASH") { bukuKas.harian.uangCash += dpValue; bukuKas.bulanan.uangCash += dpValue; }
            else if(byr === "TRANSFER") { bukuKas.harian.uangTransfer += dpValue; bukuKas.bulanan.uangTransfer += dpValue; }
            else if(byr === "DEBIT") { bukuKas.harian.uangDebit += dpValue; bukuKas.bulanan.uangDebit += dpValue; }
        }
        tamuPending.push(p); simpanKeCloud(); alert("✅ Kamar berhasil di-Booking (Pending)!"); pindahHalaman("MENU");
    };

    window.prosesFormCheckIn = function() {
        d.nama = document.getElementById('f_nama').value || "-"; d.hp = document.getElementById('f_hp').value || "-";
        d.ktp = document.getElementById('f_ktp').value || "-"; d.alamat = document.getElementById('f_alamat').value || "-";
        d.warga = document.getElementById('f_warga').value || "WNI";
        d.malam = document.getElementById('f_malam').value || "1"; d.extrabed = document.getElementById('f_extrabed').value || "0"; d.bayar = document.getElementById('f_bayar').value || "CASH";
        
        let jam = new Date().getHours(); d.shift = (jam >= 7 && jam < 17) ? "Pagi" : "Malam";
        d.tgl = getTanggalSekarang(); lastInv++; d.inv = String(lastInv).padStart(4, '0');
        
        let dateOut = new Date();
        dateOut.setDate(dateOut.getDate() + parseInt(d.malam));
        d.tgl_out = dateOut.toLocaleDateString('id-ID', { day: '2-digit', month: 'short', year: 'numeric' });
        
        if(d.shift === "Pagi") {
            if(!bukuKas.harian.billPagi.awal) bukuKas.harian.billPagi.awal = d.inv;
            bukuKas.harian.billPagi.akhir = d.inv; bukuKas.harian.billPagi.count++;
        } else {
            if(!bukuKas.harian.billMalam.awal) bukuKas.harian.billMalam.awal = d.inv;
            bukuKas.harian.billMalam.akhir = d.inv; bukuKas.harian.billMalam.count++;
        }

        let pdg = tamuPending.find(t => t.room === tempRoom);
        let nilaiPotongan = pdg ? (pdg.dp || 0) : 0;
        let subTotalHarga = (getHarga(tempRoom) * parseInt(d.malam)) + (parseInt(d.extrabed)*150000);
        let sisaTagihan = subTotalHarga - nilaiPotongan;
        if(sisaTagihan < 0) sisaTagihan = 0; 

        let setoranLaporanKas = sisaTagihan;
        if(isJualBillMode) {
            setoranLaporanKas = 100000;
            if(!bukuKas.harian.jualBill) bukuKas.harian.jualBill = [];
            bukuKas.harian.jualBill.push({ kamar: tempRoom, inv: d.inv });
        }

        if(setoranLaporanKas > 0) {
            bukuKas.harian.uang += setoranLaporanKas; bukuKas.bulanan.uang += setoranLaporanKas;
            if(d.bayar === "CASH") { bukuKas.harian.uangCash += setoranLaporanKas; bukuKas.bulanan.uangCash += setoranLaporanKas; }
            else if(d.bayar === "TRANSFER") { bukuKas.harian.uangTransfer += setoranLaporanKas; bukuKas.bulanan.uangTransfer += setoranLaporanKas; }
            else if(d.bayar === "DEBIT") { bukuKas.harian.uangDebit += setoranLaporanKas; bukuKas.bulanan.uangDebit += setoranLaporanKas; }
        }
        
        bukuKas.bulanan.kamar = (bukuKas.bulanan.kamar || 0) + 1;
        tamuIn.push({ ...d, room: tempRoom }); 
        
        if(pdg) { tamuPending = tamuPending.filter(t => t.room !== tempRoom); }
        
        isJualBillMode = false; 
        simpanKeCloud(); pindahHalaman("PESAN_SUKSES");
    }

    window.onpopstate = function(e) { state = (e.state && e.state.page) ? e.state.page : "MENU"; renderScreen(); };
    window.onload = function() { history.replaceState({ page: "MENU" }, "", ""); renderScreen(); };
</script>
</body>
</html>
