<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hotel Terminal Juma Eluk - Luxury PMS</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #0a192f; --gold: #c5a059; --bg: #f4f7f6;
            --white: #ffffff; --green: #27ae60; --red: #e74c3c;
            --orange: #f39c12; --blue: #3498db; --text: #333;
        }
        body { background-color: var(--bg); color: var(--text); font-family: 'Montserrat', sans-serif; margin: 0; padding: 0; }
        .navbar { background-color: #000; color: #fff; padding: 20px 25px; border-bottom: 4px solid var(--gold); display: flex; align-items: center; justify-content: center; }
        .navbar-brand { display: flex; flex-direction: column; align-items: center; gap: 10px; text-align: center; }
        .nav-logo-box { background-color: #fff; width: 70px; height: 70px; padding: 5px; display: flex; justify-content: center; align-items: center; border-radius: 2px; }
        .nav-logo-box img { max-width: 100%; max-height: 100%; object-fit: contain; }
        .header-info h1 { font-size: 24px; text-transform: uppercase; color: #fff; margin:0; }
        .header-info p { font-size: 10px; margin: 2px 0 0; color: #fff; }
        .container { max-width: 600px; margin: 0 auto; padding: 20px 15px 50px; }
        .card { background: var(--white); border-radius: 15px; padding: 20px; margin-bottom: 20px; box-shadow: 0 8px 25px rgba(0,0,0,0.05); border-top: 5px solid var(--gold); }
        .btn-mewah { background: #fff; color: var(--primary); border: 1px solid #eee; padding: 16px; border-radius: 12px; margin-bottom: 12px; cursor: pointer; font-weight: 600; display: flex; align-items: center; justify-content: space-between; }
        .btn-submit { background: var(--gold); color: white; border: none; padding: 16px; border-radius: 12px; margin-top: 15px; cursor: pointer; font-weight: 700; width: 100%; font-size: 16px; }
        .form-control { width: 100%; padding: 14px 15px; border-radius: 8px; border: 1px solid #ddd; font-size: 15px; box-sizing: border-box; background: #fafafa; margin-bottom:10px; }
        .room-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
        .room-box { padding: 20px 0; border-radius: 10px; text-align: center; font-weight: 700; color: white; cursor: pointer; }
        .status-green { background: var(--green); }
        .status-red { background: var(--red); }
        #loadingBar { background: var(--gold); color: white; padding: 5px; text-align: center; font-size: 11px; display: none; }
        
        /* AREA CETAK NOTA */
        #printArea { display: none; }
        
        @media print {
            /* Pengaturan Kertas: Lebar 20cm, Tinggi 13cm */
            @page { margin: 0; size: 200mm 130mm; } 
            body { background: white; color: black; font-family: 'Courier New', Courier, monospace; margin: 0; padding: 0; }
            #screen, #topSearchArea, #loadingBar, .navbar, .container { display: none !important; }
            #printArea { 
                display: block !important; 
                width: 200mm; 
                height: 130mm; 
                box-sizing: border-box; 
                padding: 10mm; /* Jarak dari pinggir kertas */
                overflow: hidden;
            }
            table { width: 100%; border-collapse: collapse; }
            /* Memperbesar Font Agar Terbaca Dot Matrix */
            td { border: 1.5px solid #000; padding: 5px; font-size: 12px; font-weight: bold; line-height: 1.4; }
            .no-border-table td { border: none; padding: 2px; }
        }
    </style>
</head>
<body>
    <div id="loadingBar">>>> CONNECTING...</div>
    <div class="navbar">
        <div class="navbar-brand">
            <div class="nav-logo-box"><img src="logo.jpg" alt="Logo JE"></div>
            <div class="header-info">
                <h1>Hotel Juma Eluk</h1>
                <p>Jl. Letjen Jamin Ginting Sumber Mufakat Kabanjahe</p>
            </div>
        </div>
    </div>
    <div class="container" id="mainContainer">
        <div id="screen"></div>
    </div>
    <div id="printArea"></div>

<script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-database-compat.js"></script>

<script>
    const firebaseConfig = {
      apiKey: "AIzaSyAvCTnP9xmMYdtzbItnG9s-jzJ2LP143S8",
      authDomain: "juma-elok.firebaseapp.com",
      databaseURL: "https://juma-elok-default-rtdb.firebaseio.com",
      projectId: "juma-elok",
      storageBucket: "juma-elok.firebasestorage.app",
      messagingSenderId: "703237300210",
      appId: "1:703237300210:web:e21f5bdea56000359a156b"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const dataRef = db.ref('hotel_data');

    const dataHotel = [
        {tipe: "Single", kelas: "Standard", nomor: ["2a","3a","4a","5a","6a","7a","8a","9a","10a","11a","11b"], harga: 300000},
        {tipe: "Twin", kelas: "Standard", nomor: ["2b","3b","4b","5b","6b","7b","8b","9b","10b"], harga: 300000},
        {tipe: "Single", kelas: "Deluxe", nomor: ["1","12a","13a","14a","15a","15","12b","14b"], harga: 350000},
        {tipe: "Twin", kelas: "Deluxe", nomor: ["1b","13b","15b"], harga: 350000},
        {tipe: "Single", kelas: "Suite", nomor: ["4av","5av","6av","7av","8av","9av","10av","11av","6bv","7bv","8bv","9bv"], harga: 400000},
        {tipe: "Twin", kelas: "Suite", nomor: ["4bv","5bv"], harga: 400000},
        {tipe: "Single", kelas: "VIP", nomor: ["2av", "3av", "2bv"], harga: 600000},
        {tipe: "Twin", kelas: "VIP", nomor: ["3bv"], harga: 600000}
    ];

    let tamuIn = [], lastInv = 0, state = "MENU", tempKelas="", tempBed="", tempRoom="", d = {};

    dataRef.on('value', (snapshot) => {
        const val = snapshot.val();
        if (val) { tamuIn = val.checkin || []; lastInv = val.last_inv || 0; }
        renderScreen();
    });

    function simpan() { dataRef.update({ checkin: tamuIn, last_inv: lastInv }); }
    function formatRp(angka) { return new Intl.NumberFormat('id-ID').format(angka); }
    function getHarga(no) { for(let k of dataHotel) { if(k.nomor.includes(no)) return k.harga; } return 0; }

    window.siapkanInvoice = function() {
        let hrg = getHarga(tempRoom);
        printArea.innerHTML = `
            <div style="border: 2px solid #000; padding: 5mm; height: 110mm;">
                <table class="no-border-table">
                    <tr>
                        <td width="70%"><b style="font-size: 16px;">JUMA ELUK HOTEL</b><br>Jl. Letjend Jamin Ginting, Kabanjahe<br>HP: 0821 6848 9514</td>
                        <td align="right"><b>INVOICE NO: ${d.inv}</b><br>Date: ${new Date().toLocaleDateString('id-ID')}</td>
                    </tr>
                </table>
                <br>
                <table>
                    <tr>
                        <td><b>NAME:</b><br>${d.nama}</td>
                        <td><b>ROOM:</b><br>${tempRoom} (${tempKelas})</td>
                    </tr>
                    <tr>
                        <td><b>ADDRESS:</b><br>${d.alamat}</td>
                        <td><b>PHONE:</b><br>${d.hp}</td>
                    </tr>
                    <tr>
                        <td><b>CHECK-IN:</b><br>${new Date().toLocaleString('id-ID')}</td>
                        <td><b>DURATION:</b><br>${d.malam} Night(s)</td>
                    </tr>
                </table>
                <br>
                <div style="border-top: 2px dashed #000; padding-top: 10px; display:flex; justify-content:space-between;">
                    <b style="font-size: 18px;">TOTAL PAYMENT:</b>
                    <b style="font-size: 18px;">Rp ${formatRp(hrg * parseInt(d.malam))}</b>
                </div>
                <br><br>
                <div style="display:flex; justify-content:space-between; text-align:center;">
                    <div>Guest Signature<br><br><br>...................</div>
                    <div>Receptionist<br><br><br>...................</div>
                </div>
            </div>
        `;
    }

    function renderScreen() {
        let out = "";
        if (state === "MENU") {
            out = `<div class="card"><h2>Dashboard</h2><div class="btn-mewah" onclick="state='KLS'; renderScreen()">🛏️ Booking Baru</div><div class="btn-mewah" onclick="state='MONITOR'; renderScreen()">👥 Monitoring</div></div>`;
        } else if (state === "MONITOR") {
            out = `<div class="card"><h2>Tamu In</h2>`;
            tamuIn.forEach((t, i) => { out += `<p>🚪 ${t.room} - ${t.nama} <button onclick="tamuIn.splice(${i},1); simpan()">Out</button></p>`; });
            out += `<button onclick="state='MENU'; renderScreen()">Kembali</button></div>`;
        } else if (state === "KLS") {
            ["Standard", "Deluxe", "Suite", "VIP"].forEach(c => { out += `<div class="btn-mewah" onclick="tempKelas='${c}'; state='BED'; renderScreen()">${c}</div>`; });
        } else if (state === "BED") {
            ["Single", "Twin"].forEach(b => { out += `<div class="btn-mewah" onclick="tempBed='${b}'; state='ROOM'; renderScreen()">${b} Bed</div>`; });
        } else if (state === "ROOM") {
            out = `<div class="room-grid">`;
            let cur = dataHotel.find(k => k.kelas === tempKelas && k.tipe === tempBed).nomor;
            cur.forEach(no => { out += `<div class="room-box status-green" onclick="tempRoom='${no}'; state='FORM'; renderScreen()">${no}</div>`; });
            out += `</div>`;
        } else if (state === "FORM") {
            out = `<div class="card">
                <input id="f_nama" class="form-control" placeholder="Nama">
                <input id="f_alamat" class="form-control" placeholder="Alamat">
                <input id="f_hp" class="form-control" placeholder="HP">
                <input id="f_malam" class="form-control" value="1" type="number">
                <button class="btn-submit" onclick="proses()">Simpan & Cetak</button>
            </div>`;
        } else if (state === "SUKSES") {
            out = `<div class="card"><h2>Berhasil!</h2><button class="btn-submit" onclick="window.siapkanInvoice(); window.print(); state='MENU'; renderScreen()">🖨️ Cetak Sekarang</button></div>`;
        }
        document.getElementById('screen').innerHTML = out;
    }

    function proses() {
        d = {
            nama: document.getElementById('f_nama').value,
            alamat: document.getElementById('f_alamat').value,
            hp: document.getElementById('f_hp').value,
            malam: document.getElementById('f_malam').value,
            room: tempRoom,
            inv: String(++lastInv).padStart(4, '0')
        };
        tamuIn.push(d); simpan(); state = "SUKSES"; renderScreen();
    }

    renderScreen();
</script>
</body>
</html>
