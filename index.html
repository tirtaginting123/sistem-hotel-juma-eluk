<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hotel Terminal Juma Eluk - Luxury PMS</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #0a192f; --gold: #c5a059; --bg: #f4f7f6;
            --white: #ffffff; --green: #27ae60; --red: #e74c3c;
            --orange: #f39c12; --blue: #3498db; --gray: #7f8c8d; --text: #333;
        }
        body { background-color: var(--bg); color: var(--text); font-family: 'Montserrat', sans-serif; margin: 0; padding: 0; line-height: 1.6; }
        .navbar { background-color: #000; color: #fff; padding: 20px 25px; border-bottom: 4px solid var(--gold); display: flex; align-items: center; justify-content: center; }
        .navbar-brand { display: flex; flex-direction: column; align-items: center; gap: 10px; text-align: center; }
        .nav-logo-box { background-color: #fff; width: 70px; height: 70px; padding: 5px; display: flex; justify-content: center; align-items: center; border-radius: 2px; }
        .nav-logo-box img { max-width: 100%; max-height: 100%; object-fit: contain; }
        .header-info h1 { font-family: 'Playfair Display', serif; margin: 0; font-size: 24px; text-transform: uppercase; color: #fff; }
        .header-info p { font-size: 10px; margin: 2px 0 0; color: #fff; line-height: 1.3; }
        .container { max-width: 600px; margin: 0 auto; padding: 20px 15px 50px; }
        #topSearchArea { margin-bottom: 25px; }
        .search-top { width: 100%; padding: 15px 25px; border-radius: 50px; border: 1px solid #ddd; font-size: 16px; outline: none; box-shadow: 0 5px 15px rgba(0,0,0,0.05); box-sizing: border-box; }
        .card { background: var(--white); border-radius: 15px; padding: 20px; margin-bottom: 20px; box-shadow: 0 8px 25px rgba(0,0,0,0.05); border-top: 5px solid var(--gold); }
        .section-title { font-weight: 700; color: var(--primary); margin-bottom: 15px; border-bottom: 1px solid #eee; padding-bottom: 10px; display: block; font-size: 13px; text-transform: uppercase; letter-spacing: 1px; }
        .btn-mewah { background: #fff; color: var(--primary); border: 1px solid #eee; padding: 16px; border-radius: 12px; margin-bottom: 12px; cursor: pointer; font-weight: 600; display: flex; align-items: center; justify-content: space-between; transition: 0.2s; }
        .btn-submit { background: var(--gold); color: white; border: none; padding: 16px; border-radius: 12px; margin-top: 15px; cursor: pointer; font-weight: 700; display: block; width: 100%; text-align: center; font-size: 16px; }
        .form-group { margin-bottom: 15px; text-align: left; }
        .form-label { display: block; font-size: 12px; font-weight: 700; color: var(--primary); margin-bottom: 5px; text-transform: uppercase; }
        .form-control { width: 100%; padding: 14px 15px; border-radius: 8px; border: 1px solid #ddd; font-size: 15px; box-sizing: border-box; background: #fafafa; color: #000; }
        
        .room-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
        .room-box { padding: 12px 5px; border-radius: 10px; text-align: center; font-weight: 700; color: white; cursor: pointer; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        
        /* WARNA STATUS KAMAR */
        .status-green { background: var(--green); }
        .status-red { background: var(--red); }
        .status-orange { background: var(--orange); }
        .status-blue { background: var(--blue); }
        .status-gray { background: var(--gray); }
        
        #loadingBar { background: var(--gold); color: white; padding: 5px; text-align: center; font-size: 11px; display: none; }
        
        /* TABLE ARSIP */
        .arsip-table th, .arsip-table td { border: 1px solid #ddd; padding: 8px; font-size: 11px; color: #000; }
        .arsip-table th { background-color: var(--primary); color: white; }

        /* SEMBUNYIKAN STRUK DI LAYAR HP/LAPTOP */
        #printArea { display: none; }
        
        /* DESAIN CETAK KHUSUS DOT MATRIX 24x14 CM (LANDSCAPE) */
        @media print {
            @page { margin: 0; size: 240mm 140mm; } 
            body { background: white; color: black; font-family: Arial, Helvetica, sans-serif; margin: 0; padding: 0; }
            #screen, #topSearchArea, #loadingBar, .navbar, .container { display: none !important; }
            #printArea { display: block !important; width: 240mm; height: 140mm; box-sizing: border-box; overflow: hidden; page-break-after: avoid; padding: 5mm; }
            table { border-collapse: collapse; }
        }
    </style>
</head>
<body>
    <div id="loadingBar">>>> CONNECTING TO CLOUD...</div>
    <div class="navbar">
        <div class="navbar-brand">
            <div class="nav-logo-box"><img src="logo.jpg" alt="Logo JE"></div>
            <div class="header-info">
                <h1>Hotel Juma Eluk</h1>
                <p>Jl. Letjen Jamin Ginting Sumber Mufakat Kabanjahe Tanah Karo</p>
                <p>HP: 0821 6848 9514</p>
            </div>
        </div>
    </div>
    <div class="container" id="mainContainer">
        <div id="topSearchArea"><input type="text" id="topSearch" class="search-top" placeholder="🔍 Cari Kamar, Tipe, atau Tamu..." autocomplete="off" oninput="liveSearch(this.value)"></div>
        <div id="screen"></div>
    </div>
    <div id="printArea"></div>

<script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-database-compat.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script>
    const firebaseConfig = {
      apiKey: "AIzaSyAvCTnP9xmMYdtzbItnG9s-jzJ2LP143S8",
      authDomain: "juma-elok.firebaseapp.com",
      databaseURL: "https://juma-elok-default-rtdb.firebaseio.com",
      projectId: "juma-elok",
      storageBucket: "juma-elok.firebasestorage.app",
      messagingSenderId: "703237300210",
      appId: "1:703237300210:web:e21f5bdea56000359a156b"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const dataRef = db.ref('hotel_data');

    const dataHotel = [
        {tipe: "Single", kelas: "Standard", nomor: ["2a","3a","4a","5a","6a","7a","8a","9a","10a","11a","11b"], harga: 300000},
        {tipe: "Twin", kelas: "Standard", nomor: ["2b","3b","4b","5b","6b","7b","8b","9b","10b"], harga: 300000},
        {tipe: "Single", kelas: "Deluxe", nomor: ["1a","12a","13a","14a","15a","12b","14b"], harga: 350000},
        {tipe: "Twin", kelas: "Deluxe", nomor: ["1b","13b","15b"], harga: 350000},
        {tipe: "Single", kelas: "Suite", nomor: ["4av","5av","6av","7av","8av","9av","10av","11av","6bv","7bv","8bv","9bv"], harga: 400000},
        {tipe: "Twin", kelas: "Suite", nomor: ["4bv","5bv"], harga: 400000},
        {tipe: "Single", kelas: "VIP", nomor: ["2av", "3av", "2bv"], harga: 600000},
        {tipe: "Twin", kelas: "VIP", nomor: ["3bv"], harga: 600000}
    ];

    let tamuIn = [], tamuOut = [], tamuPending = [], kamarRusak = [], kamarKotor = [], arsipTamu = [], lastInv = 0, lastRestoInv = 0, riwayatHarian = [];
    let catatanHotel = "";
    let isPendingMode = false;
    let isJualBillMode = false; 
    let bukuKas = { 
        harian: { 
            tgl: "", uang: 0, uangCash: 0, uangTransfer: 0, uangDebit: 0, keluar: 0, rincianKeluar: [], kamar: 0,
            transaksiResto: [],
            pagi: { cash:0, tf:0, db:0, keluar:0, room_cash:0, room_tf:0, room_db:0, resto_cash:0, resto_tf:0, resto_db:0, charge_cash:0, charge_tf:0, charge_db:0, panjar_cash:0, panjar_tf:0, panjar_db:0, jual_bill_cash:0 }, 
            malam: { cash:0, tf:0, db:0, keluar:0, room_cash:0, room_tf:0, room_db:0, resto_cash:0, resto_tf:0, resto_db:0, charge_cash:0, charge_tf:0, charge_db:0, panjar_cash:0, panjar_tf:0, panjar_db:0, jual_bill_cash:0 },
            billPagi: {awal:null, akhir:null, count:0}, billMalam: {awal:null, akhir:null, count:0}, jualBill: [], last_reset: 0 
        }, 
        bulanan: { bln: "", uang: 0, kamar: 0, keluar: 0, uangCash: 0, uangTransfer: 0, uangDebit: 0 } 
    };
    let state = "MENU", tempBed="", tempKelas="", tempRoom="", tempCari="";
    let d = { nama:"", alamat:"", warga:"", ktp:"", hp:"", malam:"", extrabed:"", bayar:"", tgl:"", tgl_out:"", inv:"", shift:"", timestamp: 0 };
    let cryptoChart;

    // Fungsi Pengaman
    function toArr(val) {
        if (!val) return [];
        if (Array.isArray(val)) return val;
        var arr = [];
        for (var key in val) { if (Object.prototype.hasOwnProperty.call(val, key)) arr.push(val[key]); }
        return arr;
    }

    dataRef.on('value', function(snapshot) {
        var cloudData = snapshot.val();
        document.getElementById('loadingBar').style.display = "none";
        
        if (cloudData) {
            tamuIn = toArr(cloudData.checkin); 
            tamuOut = toArr(cloudData.checkout); 
            tamuPending = toArr(cloudData.pending); 
            kamarRusak = toArr(cloudData.maintenance); 
            kamarKotor = toArr(cloudData.kamarKotor);
            arsipTamu = toArr(cloudData.arsip);
            
            lastInv = cloudData.last_inv || 0; 
            lastRestoInv = cloudData.last_resto_inv || 0;
            riwayatHarian = toArr(cloudData.riwayatHarian);
            catatanHotel = cloudData.catatan || "";
            
            var dbKas = cloudData.bukuKas || {};
            var dbKasHarian = dbKas.harian || {};
            var dbKasBulanan = dbKas.bulanan || {};
            
            var defShift = { cash:0, tf:0, db:0, keluar:0, room_cash:0, room_tf:0, room_db:0, resto_cash:0, resto_tf:0, resto_db:0, charge_cash:0, charge_tf:0, charge_db:0, panjar_cash:0, panjar_tf:0, panjar_db:0, jual_bill_cash:0 };

            bukuKas = { 
                harian: { 
                    tgl: getTanggalHarian(), 
                    uang: dbKasHarian.uang || 0, uangCash: dbKasHarian.uangCash || 0, uangTransfer: dbKasHarian.uangTransfer || 0, uangDebit: dbKasHarian.uangDebit || 0,
                    keluar: dbKasHarian.keluar || 0, kamar: dbKasHarian.kamar || 0, rincianKeluar: toArr(dbKasHarian.rincianKeluar), transaksiResto: toArr(dbKasHarian.transaksiResto), jualBill: toArr(dbKasHarian.jualBill),
                    pagi: Object.assign({}, defShift, dbKasHarian.pagi || {}), malam: Object.assign({}, defShift, dbKasHarian.malam || {}),
                    billPagi: dbKasHarian.billPagi || {awal:null, akhir:null, count:0}, billMalam: dbKasHarian.billMalam || {awal:null, akhir:null, count:0}, last_reset: dbKasHarian.last_reset || new Date().getTime()
                }, 
                bulanan: { 
                    bln: getTanggalBulanan(), uang: dbKasBulanan.uang || 0, kamar: dbKasBulanan.kamar || 0, keluar: dbKasBulanan.keluar || 0,
                    uangCash: dbKasBulanan.uangCash || 0, uangTransfer: dbKasBulanan.uangTransfer || 0, uangDebit: dbKasBulanan.uangDebit || 0
                } 
            };

            var now = new Date().getTime();
            if (now - bukuKas.harian.last_reset > (25 * 60 * 60 * 1000)) {
                bukuKas.harian.billPagi = {awal:null, akhir:null, count:0};
                bukuKas.harian.billMalam = {awal:null, akhir:null, count:0};
                bukuKas.harian.last_reset = now;
                simpanKeCloud();
            }
        }
        renderScreen();
    });

    function simpanKeCloud() { document.getElementById('loadingBar').style.display = "block"; dataRef.set({ checkin: tamuIn, checkout: tamuOut, pending: tamuPending, maintenance: kamarRusak, kamarKotor: kamarKotor, arsip: arsipTamu, last_inv: lastInv, last_resto_inv: lastRestoInv, bukuKas: bukuKas, riwayatHarian: riwayatHarian, catatan: catatanHotel }).then(function() { document.getElementById('loadingBar').style.display = "none"; }); }
    function getHarga(noKmr) { for (var i=0; i<dataHotel.length; i++) { if (dataHotel[i].nomor.indexOf(noKmr) !== -1) return dataHotel[i].harga; } return 0; }
    function formatRp(angka) { return new Intl.NumberFormat('id-ID').format(angka); }
    function getTanggalSekarang() { return new Date().toLocaleDateString('id-ID', { day: '2-digit', month: 'short', year: 'numeric', hour: '2-digit', minute:'2-digit' }); }
    function getTanggalHarian() { return new Date().toLocaleDateString('id-ID', { day: '2-digit', month: 'short', year: 'numeric' }); }
    function getTanggalBulanan() { return new Date().toLocaleDateString('id-ID', { month: 'long', year: 'numeric' }); }

    function pindahHalaman(newState) { state = newState; history.pushState({ page: newState }, "", ""); renderScreen(); }

    window.sinkronHariIni = function() {
        if(!confirm("Sinkronisasi manual ini berfokus pada Laporan ALL INFO Shift Baru.\n\nLanjutkan?")) return;
        alert("Peringatan: Sinkronisasi akan menyesuaikan format baru. Uang kas lama tidak langsung otomatis terurai secara rinci.");
    };

    window.tampilkanInfoTamu = function(noKamar) {
        var t = tamuIn.filter(function(x) { return x.room === noKamar; })[0];
        if(t) {
            var msg = "🏨 DETAIL KAMAR " + noKamar + "\n";
            msg += "========================\n";
            msg += "👤 Nama: " + t.nama + "\n";
            msg += "📱 HP: " + t.hp + "\n";
            msg += "🕒 Masuk: " + t.tgl + " (Shift " + t.shift + ")\n";
            msg += "📅 Rencana Out: " + t.tgl_out + "\n";
            msg += "🛏️ Menginap: " + t.malam + " Malam\n";
            msg += "➕ Extra Bed: " + t.extrabed + "\n";
            msg += "💳 Pembayaran: " + t.bayar + "\n";
            msg += "🔖 No Invoice: #" + t.inv + "\n";
            msg += "========================\n";
            if(t.bayar === "BELUM BAYAR") { msg += "⚠️ STATUS: BELUM DIBAYAR!\n"; } 
            else { msg += "✅ STATUS: PEMBAYARAN SELESAI\n"; }
            alert(msg);
        }
    };

    window.prosesCheckOut = function(index) {
        var cItemBox = document.getElementById('charge_item_' + index);
        var cHargaBox = document.getElementById('charge_harga_' + index);
        var cBayarBox = document.getElementById('charge_bayar_' + index);

        var cItem = cItemBox ? cItemBox.value.trim() : "";
        var cHarga = cHargaBox ? parseInt(cHargaBox.value) || 0 : 0;
        var cBayar = cBayarBox ? cBayarBox.value : "CASH";

        var sisaVit = prompt("Berapa sisa botol air Vit di kamar saat tamu keluar?\n- Ketik 2 (Utuh/Tidak diminum)\n- Ketik 1 (Sisa 1 botol)\n- Ketik 0 (Habis diminum semua)", "0");
        if(sisaVit !== null) {
            sisaVit = sisaVit.trim();
            if(sisaVit === "0" || sisaVit === "1" || sisaVit === "2") {
                var jamOut = new Date().getHours();
                var shiftOutStr = (jamOut >= 7 && jamOut < 17) ? "Pagi" : "Malam";
                var shiftOutBucket = shiftOutStr.toLowerCase();

                if (cHarga > 0 && cBayar !== "BELUM BAYAR") {
                    bukuKas.harian.uang += cHarga; bukuKas.bulanan.uang += cHarga;
                    if (cBayar === "CASH") { bukuKas.harian.uangCash += cHarga; bukuKas.bulanan.uangCash += cHarga; bukuKas.harian[shiftOutBucket].cash += cHarga; bukuKas.harian[shiftOutBucket].charge_cash += cHarga; }
                    else if (cBayar === "TRANSFER") { bukuKas.harian.uangTransfer += cHarga; bukuKas.bulanan.uangTransfer += cHarga; bukuKas.harian[shiftOutBucket].tf += cHarga; bukuKas.harian[shiftOutBucket].charge_tf += cHarga; }
                    else if (cBayar === "DEBIT") { bukuKas.harian.uangDebit += cHarga; bukuKas.bulanan.uangDebit += cHarga; bukuKas.harian[shiftOutBucket].db += cHarga; bukuKas.harian[shiftOutBucket].charge_db += cHarga; }
                    tamuIn[index].charge = cItem + " (Rp " + formatRp(cHarga) + " via " + cBayar + ")";
                } else if (cItem !== "") { tamuIn[index].charge = cItem; } 
                else { tamuIn[index].charge = "-"; }

                tamuIn[index].vit = "vit " + sisaVit; 
                tamuIn[index].jam_out_aktual = getTanggalSekarang();
                tamuIn[index].shift_out = shiftOutStr;
                
                if (kamarKotor.indexOf(tamuIn[index].room) === -1) { kamarKotor.push(tamuIn[index].room); }

                arsipTamu.push({
                    room: tamuIn[index].room, 
                    nama: tamuIn[index].nama,
                    inv: tamuIn[index].inv,
                    jam_in: tamuIn[index].tgl,
                    jam_out: tamuIn[index].jam_out_aktual,
                    vit: sisaVit,
                    charge: tamuIn[index].charge
                });

                tamuOut.push(tamuIn[index]); 
                tamuIn.splice(index, 1); 
                simpanKeCloud(); renderScreen();
            } else { alert("❌ Gagal: Masukkan angka 2, 1, atau 0 saja untuk sisa Vit."); }
        }
    };

    window.kamarBersih = function(kmr) { kamarKotor = kamarKotor.filter(function(k) { return k !== kmr; }); simpanKeCloud(); renderScreen(); };
    window.hapusRiwayat = function(index) { tamuOut.splice(index, 1); simpanKeCloud(); renderScreen(); };
    window.liveSearch = function(val) { tempCari = val.trim().toLowerCase(); state = tempCari !== "" ? "HASIL_CARI" : "MENU"; renderScreen(); };

    window.tandaiDeposit = function(index) { if(confirm("Tandai deposit Rp 100.000 sudah kembali?")) { tamuIn[index].deposit_kembali = true; simpanKeCloud(); renderScreen(); } };
    window.tandaiDepositOut = function(index) { if(confirm("Tandai deposit Rp 100.000 sudah kembali?")) { tamuOut[index].deposit_kembali = true; simpanKeCloud(); renderScreen(); } };

    window.editPembayaran = function(index) {
        var t = tamuIn[index]; var opsiBaru = prompt("Ketik 'CASH', 'TRANSFER', 'DEBIT', atau 'BELUM BAYAR':", t.bayar);
        if (opsiBaru !== null) {
            opsiBaru = opsiBaru.toUpperCase().trim();
            if (opsiBaru === "CASH" || opsiBaru === "TRANSFER" || opsiBaru === "DEBIT" || opsiBaru === "BELUM BAYAR") {
                if (opsiBaru !== t.bayar) {
                    var sub = (getHarga(t.room) * (parseInt(t.malam)||1)) + ((parseInt(t.extrabed)||0)*150000);
                    var ts = t.shift ? t.shift.toLowerCase() : "pagi";
                    
                    if (t.bayar === "CASH") { bukuKas.harian.uangCash -= sub; bukuKas.bulanan.uangCash -= sub; bukuKas.harian[ts].cash -= sub; bukuKas.harian[ts].room_cash -= sub; }
                    else if (t.bayar === "TRANSFER") { bukuKas.harian.uangTransfer -= sub; bukuKas.bulanan.uangTransfer -= sub; bukuKas.harian[ts].tf -= sub; bukuKas.harian[ts].room_tf -= sub; }
                    else if (t.bayar === "DEBIT") { bukuKas.harian.uangDebit -= sub; bukuKas.bulanan.uangDebit -= sub; bukuKas.harian[ts].db -= sub; bukuKas.harian[ts].room_db -= sub; }
                    
                    if (opsiBaru === "CASH") { bukuKas.harian.uangCash += sub; bukuKas.bulanan.uangCash += sub; bukuKas.harian[ts].cash += sub; bukuKas.harian[ts].room_cash += sub; }
                    else if (opsiBaru === "TRANSFER") { bukuKas.harian.uangTransfer += sub; bukuKas.bulanan.uangTransfer += sub; bukuKas.harian[ts].tf += sub; bukuKas.harian[ts].room_tf += sub; }
                    else if (opsiBaru === "DEBIT") { bukuKas.harian.uangDebit += sub; bukuKas.bulanan.uangDebit += sub; bukuKas.harian[ts].db += sub; bukuKas.harian[ts].room_db += sub; }
                    
                    tamuIn[index].bayar = opsiBaru; simpanKeCloud(); renderScreen();
                }
            } else { alert("❌ Gagal: Masukkan pilihan yang benar."); }
        }
    };

    window.prosesPengeluaran = function() {
        var deskripsi = document.getElementById('p_item').value || "Lain-lain";
        var harga = parseInt(document.getElementById('p_harga').value) || 0;
        if(harga > 0) {
            var jam = new Date().getHours();
            var shiftNow = (jam >= 7 && jam < 17) ? "Pagi" : "Malam";
            bukuKas.harian.keluar += harga; bukuKas.bulanan.keluar += harga;
            bukuKas.harian[shiftNow.toLowerCase()].keluar += harga;
            bukuKas.harian.rincianKeluar.push({ ket: deskripsi, nominal: harga, shift: shiftNow });
            simpanKeCloud(); alert("✅ Pengeluaran dicatat!"); pindahHalaman("TUTUP_BUKU");
        }
    };

    window.prosesResto = function() {
        var item = document.getElementById('r_item').value;
        var harga = parseInt(document.getElementById('r_harga').value) || 0;
        var bayar = document.getElementById('r_bayar').value;
        if(harga > 0 && item && bayar !== "BELUM BAYAR") {
            var jam = new Date().getHours();
            var shiftNow = (jam >= 7 && jam < 17) ? "Pagi" : "Malam";
            var sb = shiftNow.toLowerCase();
            lastRestoInv++; var invR = "R" + String(lastRestoInv).padStart(4, '0');
            
            bukuKas.harian.transaksiResto.push({ item: item, nominal: harga, bayar: bayar, shift: shiftNow, inv: invR, timestamp: new Date().getTime() });
            bukuKas.harian.uang += harga; bukuKas.bulanan.uang += harga;
            if(bayar === "CASH") { bukuKas.harian.uangCash += harga; bukuKas.bulanan.uangCash += harga; bukuKas.harian[sb].cash += harga; bukuKas.harian[sb].resto_cash += harga; }
            else if(bayar === "TRANSFER") { bukuKas.harian.uangTransfer += harga; bukuKas.bulanan.uangTransfer += harga; bukuKas.harian[sb].tf += harga; bukuKas.harian[sb].resto_tf += harga; }
            else if(bayar === "DEBIT") { bukuKas.harian.uangDebit += harga; bukuKas.bulanan.uangDebit += harga; bukuKas.harian[sb].db += harga; bukuKas.harian[sb].resto_db += harga; }
            simpanKeCloud(); alert("✅ Transaksi Resto berhasil dicatat!"); pindahHalaman("MENU");

    function generateLaporanShift(shiftLabel, bucketObj) {
        var s = shiftLabel.toLowerCase();
        var allInThisShift = tamuIn.filter(function(t) { return t.shift && t.shift.toLowerCase() === s; }).concat(tamuOut.filter(function(t) { return t.shift && t.shift.toLowerCase() === s; }));
        
        var chkIn = allInThisShift.length;
        var extrabeds = allInThisShift.reduce(function(sum, t) { return sum + (parseInt(t.extrabed)||0); }, 0);
        
        var outThisShift = tamuOut.filter(function(t) { return t.shift_out && t.shift_out.toLowerCase() === s; });
        var vd = [], vr = [];
        outThisShift.forEach(function(t) { if(kamarKotor.indexOf(t.room) !== -1) vd.push(t.room); else vr.push(t.room); });
        
        var blmBayarRooms = [], blmBayarTotal = 0;
        var depositPendingCount = 0;

        allInThisShift.forEach(function(t) {
            if(t.bayar === "BELUM BAYAR") {
                blmBayarRooms.push(t.room);
                blmBayarTotal += (getHarga(t.room) * (parseInt(t.malam)||1)) + ((parseInt(t.extrabed)||0) * 150000);
            }
        });

        tamuIn.forEach(function(t) { if(t.shift && t.shift.toLowerCase() === s && !t.deposit_kembali) depositPendingCount++; });
        var depositPendingUang = depositPendingCount * 100000;

        var keluarHtml = "", uangKeluarShift = 0;
        bukuKas.harian.rincianKeluar.forEach(function(r) {
            if(r.shift && r.shift.toLowerCase() === s) {
                uangKeluarShift += r.nominal;
                keluarHtml += "- " + r.ket + " (Rp " + formatRp(r.nominal) + ")<br>";
            }
        });

        var noBillLast = s === "pagi" ? (bukuKas.harian.billPagi ? bukuKas.harian.billPagi.akhir : null) : (bukuKas.harian.billMalam ? bukuKas.harian.billMalam.akhir : null);
        var noBillRestoLast = "";
        var restoThisShift = bukuKas.harian.transaksiResto.filter(function(r) { return r.shift && r.shift.toLowerCase() === s; });
        if(restoThisShift.length > 0) noBillRestoLast = restoThisShift[restoThisShift.length-1].inv;

        var jbTotal = bukuKas.harian.jualBill.filter(function(jb) { return jb.shift && jb.shift.toLowerCase() === s; }).length * 100000;

        var textBlock = "<b>laporan " + getTanggalHarian() + " shf " + s + "</b><br><br>" +
"total room check in 👉🏽 " + chkIn + "<br>" +
"room check out yg vd 👉🏽 " + (vd.length > 0 ? vd.join(", ") : "-") + "<br>" +
"room check out yg vr 👉🏽 " + (vr.length > 0 ? vr.join(", ") : "-") + "<br>" +
"total extrabed 👉🏽 " + extrabeds + "<br>" +
"room yg belum bayar 👉🏽 " + (blmBayarRooms.length > 0 ? blmBayarRooms.join(", ") : "-") + "<br>" +
"total uang room cash 👉🏽 Rp " + formatRp(bucketObj.room_cash||0) + "<br>" +
"ttl uang room tf 👉🏽 Rp " + formatRp(bucketObj.room_tf||0) + "<br>" +
"ttl uang room debit 👉🏽 Rp " + formatRp(bucketObj.room_db||0) + "<br>" +
"ttl uang resto 👉🏽 Rp " + formatRp((bucketObj.resto_cash||0) + (bucketObj.resto_tf||0) + (bucketObj.resto_db||0)) + "<br>" +
"ttl uang jual bill 👉🏽 Rp " + formatRp(jbTotal) + "<br>" +
"ttl uang charge 👉🏽 Rp " + formatRp((bucketObj.charge_cash||0) + (bucketObj.charge_tf||0) + (bucketObj.charge_db||0)) + "<br>" +
"ttl uang deposit pnding 👉🏽 Rp " + formatRp(depositPendingUang) + "<br>" +
"ttl uang panjar 👉🏽 Rp " + formatRp((bucketObj.panjar_cash||0) + (bucketObj.panjar_tf||0) + (bucketObj.panjar_db||0)) + "<br>" +
"ttl pembayaran belum bayar 👉🏽 Rp " + formatRp(blmBayarTotal) + "<br><br>" +
"<b>- *TOTAL UANG CASH :* Rp " + formatRp(bucketObj.cash) + "</b><br><br>" +
"ttl uang keluar 👉🏽 Rp " + formatRp(uangKeluarShift) + "<br>" +
"Jenis uang keluar :<br>" +
(keluarHtml || "-") + "<br>" +

        return `<div style="background:#fef9e7; color:#000000; padding:15px; border-radius:8px; border:1px solid #f1c40f; margin-bottom:15px; font-family:monospace; font-size:11px; line-height:1.6; white-space:nowrap; overflow-x:auto;">

        }
        else if (val === "RESET_KAMAR") { 
            var s3 = prompt("Sandi Kamar:"); if(s3 && s3.trim() === "vipjumaeluk1234") { bukuKas.bulanan.kamar = 0; simpanKeCloud(); renderScreen(); alert("✅ Rekap Nol!"); }
        }
        else if (val === "RESET_ALL_INFO") { 
            var s4 = prompt("⚠️ SANDI MASTER:"); 
            if(s4 && s4.trim() === "vipjumaeluk1234") { 
                var defShift2 = { cash:0, tf:0, db:0, keluar:0, room_cash:0, room_tf:0, room_db:0, resto_cash:0, resto_tf:0, resto_db:0, charge_cash:0, charge_tf:0, charge_db:0, panjar_cash:0, panjar_tf:0, panjar_db:0, jual_bill_cash:0 };
                bukuKas.harian = {tgl:getTanggalHarian(), uang:0, uangCash:0, uangTransfer:0, uangDebit:0, keluar:0, rincianKeluar: [], kamar:0, transaksiResto: [], pagi: Object.assign({}, defShift2), malam: Object.assign({}, defShift2), billPagi: {awal:null, akhir:null, count:0}, billMalam: {awal:null, akhir:null, count:0}, jualBill: [], last_reset: new Date().getTime()}; 
                simpanKeCloud(); renderScreen(); alert("✅ Semua Laporan Shift Harian telah direset!"); 
            } else if(s4 !== null) { alert("❌ Sandi Salah!"); }
        }
    };

    window.prosesFormPending = function() {
        var dpValue = parseInt(document.getElementById('p_dp').value) || 0;
        var byr = document.getElementById('p_bayar').value;
        var p = { nama: document.getElementById('p_nama').value || "-", hp: document.getElementById('p_hp').value || "-", dp: dpValue, bayar: byr, room: tempRoom };
        
        if(dpValue > 0 && byr !== "BELUM BAYAR") {
            var jam = new Date().getHours();
            var shiftNow = (jam >= 7 && jam < 17) ? "Pagi" : "Malam";
            var sb = shiftNow.toLowerCase();
            
            bukuKas.harian.uang += dpValue; bukuKas.bulanan.uang += dpValue;
            if(byr === "CASH") { bukuKas.harian.uangCash += dpValue; bukuKas.harian[sb].cash += dpValue; bukuKas.harian[sb].panjar_cash += dpValue; }
            else if(byr === "TRANSFER") { bukuKas.harian.uangTransfer += dpValue; bukuKas.harian[sb].tf += dpValue; bukuKas.harian[sb].panjar_tf += dpValue; }
            else if(byr === "DEBIT") { bukuKas.harian.uangDebit += dpValue; bukuKas.harian[sb].db += dpValue; bukuKas.harian[sb].panjar_db += dpValue; }
        }
        tamuPending.push(p); simpanKeCloud(); alert("✅ Kamar Pending!"); pindahHalaman("MENU");
    };

    window.prosesFormCheckIn = function() {
        d.nama = document.getElementById('f_nama').value || "-"; d.hp = document.getElementById('f_hp').value || "-";
        d.malam = document.getElementById('f_malam').value || "1"; d.extrabed = document.getElementById('f_extrabed').value || "0"; d.bayar = document.getElementById('f_bayar').value || "CASH";
        
        var jam = new Date().getHours(); d.shift = (jam >= 7 && jam < 17) ? "Pagi" : "Malam";
        var bucketShift = d.shift.toLowerCase();
        
        d.tgl = getTanggalSekarang(); lastInv++; d.inv = String(lastInv).padStart(4, '0');
        var dateOut = new Date(); if (jam >= 0 && jam < 7) { dateOut.setDate(dateOut.getDate() - 1); }
        dateOut.setDate(dateOut.getDate() + parseInt(d.malam));
        d.tgl_out = dateOut.toLocaleDateString('id-ID', { day: '2-digit', month: 'short', year: 'numeric' });
        
        if(d.shift === "Pagi") { if(!bukuKas.harian.billPagi.awal) bukuKas.harian.billPagi.awal = d.inv; bukuKas.harian.billPagi.akhir = d.inv; bukuKas.harian.billPagi.count++; } 
        else { if(!bukuKas.harian.billMalam.awal) bukuKas.harian.billMalam.awal = d.inv; bukuKas.harian.billMalam.akhir = d.inv; bukuKas.harian.billMalam.count++; }

        var pdg = tamuPending.find(function(t) { return t.room === tempRoom; });
        var nilaiPotongan = pdg ? (pdg.dp || 0) : 0;
        var subTotalHarga = (getHarga(tempRoom) * parseInt(d.malam)) + (parseInt(d.extrabed)*150000);
        var sisaTagihan = subTotalHarga - nilaiPotongan;
        if(sisaTagihan < 0) sisaTagihan = 0; 

        var setoranLaporanKas = d.bayar === "BELUM BAYAR" ? 0 : sisaTagihan;

        if(isJualBillMode) {
            setoranLaporanKas = d.bayar === "BELUM BAYAR" ? 0 : 100000;
            if(!bukuKas.harian.jualBill) bukuKas.harian.jualBill = [];
            bukuKas.harian.jualBill.push({ kamar: tempRoom, inv: d.inv, shift: d.shift });
        }

        if(setoranLaporanKas > 0 && d.bayar !== "BELUM BAYAR") {
            bukuKas.harian.uang += setoranLaporanKas; bukuKas.bulanan.uang += setoranLaporanKas;
            if(d.bayar === "CASH") { bukuKas.harian.uangCash += setoranLaporanKas; bukuKas.harian[bucketShift].cash += setoranLaporanKas; }
            else if(d.bayar === "TRANSFER") { bukuKas.harian.uangTransfer += setoranLaporanKas; bukuKas.harian[bucketShift].tf += setoranLaporanKas; }
            else if(d.bayar === "DEBIT") { bukuKas.harian.uangDebit += setoranLaporanKas; bukuKas.harian[bucketShift].db += setoranLaporanKas; }

            if(isJualBillMode) {
                 if(d.bayar === "CASH") bukuKas.harian[bucketShift].jual_bill_cash = (bukuKas.harian[bucketShift].jual_bill_cash||0) + setoranLaporanKas;
            } else {
                 if(d.bayar === "CASH") bukuKas.harian[bucketShift].room_cash = (bukuKas.harian[bucketShift].room_cash||0) + setoranLaporanKas;
                 else if(d.bayar === "TRANSFER") bukuKas.harian[bucketShift].room_tf = (bukuKas.harian[bucketShift].room_tf||0) + setoranLaporanKas;
                 else if(d.bayar === "DEBIT") bukuKas.harian[bucketShift].room_db = (bukuKas.harian[bucketShift].room_db||0) + setoranLaporanKas;
            }
        }
        
        kamarKotor = kamarKotor.filter(function(k) { return k !== tempRoom; }); 
        
        tamuIn.push(Object.assign({}, d, { room: tempRoom })); 
        if(pdg) { tamuPending = tamuPending.filter(function(t) { return t.room !== tempRoom; }); }
        isJualBillMode = false; simpanKeCloud(); pindahHalaman("PESAN_SUKSES");
    }

    window.onpopstate = function(e) { state = (e.state && e.state.page) ? e.state.page : "MENU"; renderScreen(); };
    window.onload = function() { history.replaceState({ page: "MENU" }, "", ""); renderScreen(); };
</script>
