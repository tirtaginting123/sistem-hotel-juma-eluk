<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hotel Juma Eluk - Ultimate Luxury PMS</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #0a192f; --gold: #c5a059; --bg: #f8fafc;
            --white: #ffffff; --green: #10b981; --red: #ef4444;
            --orange: #f59e0b; --blue: #3b82f6; --gray: #64748b; --text: #1e293b;
            --purple: #8b5cf6; --shadow: 0 10px 15px -3px rgba(0,0,0,0.1);
        }
        body { background-color: var(--bg); color: var(--text); font-family: 'Montserrat', sans-serif; margin: 0; padding: 0; line-height: 1.6; }
        .navbar { background-color: #000; color: #fff; padding: 25px; border-bottom: 5px solid var(--gold); display: flex; align-items: center; justify-content: center; position: sticky; top: 0; z-index: 100; }
        .navbar-brand { display: flex; flex-direction: column; align-items: center; gap: 10px; text-align: center; }
        .nav-logo-box { background-color: #fff; width: 75px; height: 75px; padding: 5px; display: flex; justify-content: center; align-items: center; border-radius: 8px; box-shadow: var(--shadow); }
        .nav-logo-box img { max-width: 100%; max-height: 100%; object-fit: contain; }
        .header-info h1 { font-family: 'Playfair Display', serif; margin: 0; font-size: 28px; text-transform: uppercase; letter-spacing: 2px; }
        .header-info p { font-size: 11px; margin: 3px 0 0; color: #cbd5e1; font-weight: 400; }
        
        .container { max-width: 650px; margin: 0 auto; padding: 20px 15px 80px; }
        .card { background: var(--white); border-radius: 20px; padding: 25px; margin-bottom: 25px; box-shadow: var(--shadow); border-top: 6px solid var(--gold); transition: 0.3s; }
        .section-title { font-weight: 700; color: var(--primary); margin-bottom: 20px; border-bottom: 2px solid #f1f5f9; padding-bottom: 12px; display: block; font-size: 14px; text-transform: uppercase; letter-spacing: 1.5px; }
        
        .btn-mewah { background: #fff; color: var(--primary); border: 1px solid #e2e8f0; padding: 18px; border-radius: 15px; margin-bottom: 14px; cursor: pointer; font-weight: 600; display: flex; align-items: center; justify-content: space-between; transition: 0.2s; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); }
        .btn-mewah:hover { border-color: var(--gold); background: #fffdf9; transform: translateY(-2px); }
        .btn-submit { background: var(--gold); color: white; border: none; padding: 18px; border-radius: 15px; margin-top: 20px; cursor: pointer; font-weight: 700; display: block; width: 100%; font-size: 16px; box-shadow: 0 10px 15px -3px rgba(197, 160, 89, 0.3); }
        
        .form-control { width: 100%; padding: 15px; border-radius: 12px; border: 1px solid #cbd5e1; font-size: 15px; box-sizing: border-box; background: #fcfcfc; color: #000; font-family: inherit; }
        .form-control:focus { outline: none; border-color: var(--gold); background: #fff; }
        
        .room-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }
        .room-box { padding: 15px 5px; border-radius: 15px; text-align: center; font-weight: 700; color: white; cursor: pointer; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); border: 2px solid rgba(255,255,255,0.2); }
        
        .status-green { background: linear-gradient(135deg, #10b981, #059669); }
        .status-red { background: linear-gradient(135deg, #ef4444, #dc2626); }
        .status-orange { background: linear-gradient(135deg, #f59e0b, #d97706); }
        .status-blue { background: linear-gradient(135deg, #3b82f6, #2563eb); }
        .status-gray { background: linear-gradient(135deg, #64748b, #475569); }
        .status-purple { background: linear-gradient(135deg, #8b5cf6, #7c3aed); }
        
        #loadingBar { background: var(--gold); color: white; padding: 8px; text-align: center; font-size: 12px; display: none; font-weight: 700; }
        .arsip-table { border-collapse: collapse; width: 100%; }
        .arsip-table th, .arsip-table td { border: 1px solid #e2e8f0; padding: 12px; font-size: 11px; text-align: left; }
        .arsip-table th { background-color: var(--primary); color: white; text-transform: uppercase; }

        @media print {
            @page { margin: 0; size: 240mm 140mm; } 
            body { background: white; color: black; font-family: Arial, sans-serif; }
            #screen, #topSearchArea, #loadingBar, .navbar, .container { display: none !important; }
            #printArea { display: block !important; width: 240mm; height: 140mm; padding: 8mm; }
        }
    </style>
</head>
<body>
    <div id="loadingBar">>>> SYNCING WITH CLOUD...</div>
    <div class="navbar">
        <div class="navbar-brand">
            <div class="nav-logo-box"><img src="logo.jpg" alt="Logo JE"></div>
            <div class="header-info">
                <h1>Hotel Juma Eluk</h1>
                <p>Jl. Letjen Jamin Ginting Sumber Mufakat Kabanjahe Tanah Karo</p>
                <p>CONTACT: 0821 6848 9514</p>
            </div>
        </div>
    </div>
    <div class="container" id="mainContainer">
        <div id="topSearchArea" style="margin-bottom: 30px;">
            <input type="text" id="topSearch" class="form-control" placeholder="🔍 Cari Kamar, Tipe, atau Tamu..." autocomplete="off" oninput="liveSearch(this.value)" style="border-radius: 50px; padding-left: 25px; box-shadow: var(--shadow);">
        </div>
        <div id="screen"></div>
    </div>
    <div id="printArea" style="display: none;"></div>

<script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-database-compat.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script>
    const firebaseConfig = {
      apiKey: "AIzaSyAvCTnP9xmMYdtzbItnG9s-jzJ2LP143S8",
      authDomain: "juma-elok.firebaseapp.com",
      databaseURL: "https://juma-elok-default-rtdb.firebaseio.com",
      projectId: "juma-elok",
      storageBucket: "juma-elok.firebasestorage.app",
      messagingSenderId: "703237300210",
      appId: "1:703237300210:web:e21f5bdea56000359a156b"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const dataRef = db.ref('hotel_data');

    const dataHotel = [
        {tipe: "Single", kelas: "Standard", nomor: ["2a","3a","4a","5a","6a","7a","8a","9a","10a","11a","11b"], harga: 300000},
        {tipe: "Twin", kelas: "Standard", nomor: ["2b","3b","4b","5b","6b","7b","8b","9b","10b"], harga: 300000},
        {tipe: "Single", kelas: "Deluxe", nomor: ["1a","12a","13a","14a","15a","12b","14b"], harga: 350000},
        {tipe: "Twin", kelas: "Deluxe", nomor: ["1b","13b","15b"], harga: 350000},
        {tipe: "Single", kelas: "Suite", nomor: ["4av","5av","6av","7av","8av","9av","10av","11av","6bv","7bv","8bv","9bv"], harga: 400000},
        {tipe: "Twin", kelas: "Suite", nomor: ["4bv","5bv"], harga: 400000},
        {tipe: "Single", kelas: "VIP", nomor: ["2av", "3av", "2bv"], harga: 600000},
        {tipe: "Twin", kelas: "VIP", nomor: ["3bv"], harga: 600000}
    ];

    let tamuIn = [], tamuOut = [], tamuPending = [], kamarRusak = [], kamarKotor = [], arsipTamu = [], arsipLaporanHarian = [], lastInv = 0, lastRestoInv = 0, riwayatHarian = [];
    let catatanHotel = "";
    let isPendingMode = false;
    let isJualBillMode = false; 
    let editIndex = -1; 
    window.isCheckInNormal = true;
    let state = "MENU", tempBed="", tempKelas="", tempRoom="", tempCari="";
    let d = { nama:"", hp:"", malam:"", extrabed:"", bayar:"", tgl:"", tgl_out:"", inv:"", shift:"", total_tagihan:0, sudah_dibayar:0, alamat:"", warga:"", ktp:"", transport:"", trip:"", jenis_deposit:"Uang 100k" };
    let bukuKas = { harian: {}, bulanan: {} };

    function toArr(val) { if (!val) return []; return Array.isArray(val) ? val : Object.values(val); }
    function formatRp(angka) { return new Intl.NumberFormat('id-ID').format(angka); }
    
    // ATURAN JAM OPERASIONAL 07.00 - 07.00
    function getTanggalHarian() { 
        var date = new Date(); 
        if (date.getHours() < 7) { date.setDate(date.getDate() - 1); } 
        return date.toLocaleDateString('id-ID', { day: '2-digit', month: 'short', year: 'numeric' }); 
    }
    function getTanggalBulanan() { return new Date().toLocaleDateString('id-ID', { month: 'long', year: 'numeric' }); }
    function getTanggalSekarangFull() { return new Date().toLocaleDateString('id-ID', { day: '2-digit', month: 'short', year: 'numeric', hour: '2-digit', minute:'2-digit' }); }

    // --- FIREBASE LISTENER DENGAN AUTO-RESET JAM 07.00 ---
    dataRef.on('value', function(snapshot) {
        var cloudData = snapshot.val();
        document.getElementById('loadingBar').style.display = "none";
        if (cloudData) {
            var dbKasHarian = (cloudData.bukuKas || {}).harian || {};
            var realTglHarian = getTanggalHarian();

            // >>> LOGIKA AUTO-RESET SETIAP JAM 07:00 PAGI <<<
            if (dbKasHarian.tgl && dbKasHarian.tgl !== "" && dbKasHarian.tgl !== realTglHarian) {
                tamuIn = toArr(cloudData.checkin); tamuOut = toArr(cloudData.checkout);
                bukuKas = cloudData.bukuKas; 
                arsipLaporanHarian = toArr(cloudData.arsipLaporanHarian);
                riwayatHarian = toArr(cloudData.riwayatHarian);
                
                // 1. Simpan Laporan Shift Pagi & Malam ke Arsip Permanen
                var divP = document.createElement("div"); divP.innerHTML = generateLaporanShift("Pagi", bukuKas.harian.pagi);
                var divM = document.createElement("div"); divM.innerHTML = generateLaporanShift("Malam", bukuKas.harian.malam);
                arsipLaporanHarian.push({ 
                    tgl: bukuKas.harian.tgl, 
                    lapPagi: divP.innerText.replace("📋 COPY KE WHATSAPP", "").trim().replace(/\n/g, "<br>"), 
                    lapMalam: divM.innerText.replace("📋 COPY KE WHATSAPP", "").trim().replace(/\n/g, "<br>") 
                });

                // 2. Akumulasi Laporan Bulanan & Grafik
                var h = bukuKas.harian; var b = bukuKas.bulanan || {};
                var fields = ["uang", "uangCash", "uangTransfer", "uangDebit", "keluar", "kamar", "room_cash", "room_tf", "room_db", "resto_cash", "resto_tf", "resto_db", "charge_cash", "charge_tf", "charge_db", "panjar_cash", "panjar_tf", "panjar_db", "jual_bill_cash"];
                fields.forEach(f => { b[f] = (b[f] || 0) + (h[f] || 0); });
                if(h.uang > 0) { riwayatHarian.push({ tgl: h.tgl, uang: h.uang }); if(riwayatHarian.length > 30) riwayatHarian.shift(); }

                // 3. Reset Laci Harian Jadi Rp 0
                var def = { cash:0, tf:0, db:0, keluar:0, room_cash:0, room_tf:0, room_db:0, resto_cash:0, resto_tf:0, resto_db:0, charge_cash:0, charge_tf:0, charge_db:0, panjar_cash:0, panjar_tf:0, panjar_db:0, jual_bill_cash:0, kamar_in:0, extrabed_in:0 };
                bukuKas.harian = { tgl: realTglHarian, uang: 0, uangCash: 0, uangTransfer: 0, uangDebit: 0, keluar: 0, kamar: 0, rincianKeluar: [], transaksiResto: [], pagi: Object.assign({}, def), malam: Object.assign({}, def), billPagi: {awal:null, akhir:null, count:0}, billMalam: {awal:null, akhir:null, count:0}, jualBill: [], last_reset: new Date().getTime() };
                bukuKas.bulanan = b;

                simpanKeCloud();
                alert("🌅 AUTO-RESET SUKSES!\nLaporan harian " + h.tgl + " telah disimpan ke Arsip Permanen (Menu 9).");
                return;
            }

            tamuIn = toArr(cloudData.checkin); tamuOut = toArr(cloudData.checkout); tamuPending = toArr(cloudData.pending); 
            kamarRusak = toArr(cloudData.maintenance); kamarKotor = toArr(cloudData.kamarKotor); arsipTamu = toArr(cloudData.arsip); arsipLaporanHarian = toArr(cloudData.arsipLaporanHarian);
            lastInv = cloudData.last_inv || 0; lastRestoInv = cloudData.last_resto_inv || 0; riwayatHarian = toArr(cloudData.riwayatHarian);
            catatanHotel = cloudData.catatan || "";
            bukuKas = cloudData.bukuKas || { harian: { tgl: realTglHarian }, bulanan: { bln: getTanggalBulanan() } };
        }
        renderScreen();
    });

    function simpanKeCloud() { 
        document.getElementById('loadingBar').style.display = "block"; 
        dataRef.set({ checkin: tamuIn, checkout: tamuOut, pending: tamuPending, maintenance: kamarRusak, kamarKotor: kamarKotor, arsip: arsipTamu, arsipLaporanHarian: arsipLaporanHarian, last_inv: lastInv, last_resto_inv: lastRestoInv, bukuKas: bukuKas, riwayatHarian: riwayatHarian, catatan: catatanHotel }).then(() => { document.getElementById('loadingBar').style.display = "none"; }); 
    }
    
    function pindahHalaman(newState) { state = newState; history.pushState({ page: newState }, "", ""); renderScreen(); }

    // --- LOGIKA FORM CHECK-IN LUXURY ---
    window.prosesFormCheckIn = function() {
        d.nama = document.getElementById('f_nama').value || "-"; 
        d.hp = document.getElementById('f_hp').value || "-";
        d.malam = document.getElementById('f_malam').value || "1"; 
        d.extrabed = document.getElementById('f_extrabed').value || "0";
        d.alamat = document.getElementById('f_alamat').value || "-";
        
        var inputTglIn = document.getElementById('f_tgl_in');
        var dateObj = new Date(); if (inputTglIn && inputTglIn.value) { dateObj = new Date(inputTglIn.value); }

        var jam = dateObj.getHours(); 
        d.shift = (jam >= 7 && jam < 17) ? "Pagi" : "Malam"; 
        var bucketShift = d.shift.toLowerCase();
        
        // Format Rapi: 24-Apr-2026, 09.01
        var tglHari = String(dateObj.getDate()).padStart(2, '0');
        var bulanArr = ["Jan", "Feb", "Mar", "Apr", "Mei", "Jun", "Jul", "Agt", "Sep", "Okt", "Nov", "Des"];
        var tglBln = bulanArr[dateObj.getMonth()];
        d.tgl = tglHari + "-" + tglBln + "-" + dateObj.getFullYear() + ", " + String(dateObj.getHours()).padStart(2, '0') + "." + String(dateObj.getMinutes()).padStart(2, '0');
        
        lastInv++; d.inv = String(lastInv).padStart(4, '0');
        var dateOut = new Date(dateObj); if (jam >= 0 && jam < 7) { dateOut.setDate(dateOut.getDate() - 1); }
        dateOut.setDate(dateOut.getDate() + parseInt(d.malam)); 
        d.tgl_out = dateOut.toLocaleDateString('id-ID', { day: '2-digit', month: 'short', year: 'numeric' });

        // Hitung Uang
        var baseHarga = 0; for (let k of dataHotel) { if (k.nomor.includes(tempRoom)) baseHarga = k.harga; }
        var total = (baseHarga * parseInt(d.malam)) + (parseInt(d.extrabed)*150000);
        if(document.getElementById('f_early').checked) total += 100000;
        
        d.total_tagihan = total; d.sudah_dibayar = total;
        d.bayar = document.getElementById('f_bayar_basic').value;
        
        if(d.bayar !== "LUNAS LAMA") {
            bukuKas.harian.uang += total; bukuKas.harian[bucketShift].cash += (d.bayar==="CASH"?total:0);
            bukuKas.harian[bucketShift].room_cash += (d.bayar==="CASH"?total:0);
            bukuKas.harian[bucketShift].room_tf += (d.bayar==="TRANSFER"?total:0);
            bukuKas.harian[bucketShift].room_db += (d.bayar==="DEBIT"?total:0);
            bukuKas.harian[bucketShift].kamar_in = (bukuKas.harian[bucketShift].kamar_in || 0) + 1;
            bukuKas.harian.kamar = (bukuKas.harian.kamar||0) + 1;
        }

        kamarKotor = kamarKotor.filter(k => k !== tempRoom); 
        tamuIn.push(Object.assign({}, d, { room: tempRoom })); 
        simpanKeCloud(); pindahHalaman("PESAN_SUKSES");
    }

    // --- LAPORAN HUNIAN FISIK 22 KAMAR ---
    function renderTotalKamar() {
        var hPagi = 0; var hMalam = 0;
        var listPagi = []; var listMalam = [];
        var sudahDihitung = new Set();

        tamuIn.forEach(t => {
            if (!sudahDihitung.has(t.room)) {
                sudahDihitung.add(t.room);
                var sIn = (t.shift || "pagi").toLowerCase();
                if (sIn === "pagi") { hPagi++; listPagi.push(t.room); } else { hMalam++; listMalam.push(t.room); }
            }
        });

        kamarKotor.forEach(kmr => {
            if (!sudahDihitung.has(kmr)) {
                sudahDihitung.add(kmr);
                var lastTamu = [...tamuOut].reverse().find(a => String(a.room) === String(kmr));
                var sIn = lastTamu ? (lastTamu.shift || "pagi").toLowerCase() : "pagi";
                if (sIn === "pagi") { hPagi++; listPagi.push(kmr + "(VD)"); } else { hMalam++; listMalam.push(kmr + "(VD)"); }
            }
        });

        var total = hPagi + hMalam;
        return `<div class="card"><span class="section-title">📊 Laporan Hunian Kamar</span>
                <div style="background:#fff; padding:20px; border-radius:15px; border:2px solid var(--primary); text-align:center;">
                    <div style="margin-bottom:20px;">
                        <p style="margin:0; color:var(--green); font-weight:bold; font-size:14px;">☀️ JATAH SHIFT PAGI: ${hPagi} Kamar</p>
                        <small style="color:var(--gray); font-size:10px;">(${listPagi.join(", ")})</small>
                    </div>
                    <div style="margin-bottom:20px;">
                        <p style="margin:0; color:var(--blue); font-weight:bold; font-size:14px;">🌙 JATAH SHIFT MALAM: ${hMalam} Kamar</p>
                        <small style="color:var(--gray); font-size:10px;">(${listMalam.join(", ")})</small>
                    </div>
                    <hr style="border:1px dashed #cbd5e1;">
                    <h2 style="margin:0; color:var(--primary); font-size:32px;">TOTAL: ${total} Kamar</h2>
                </div>
                <div class="btn-mewah" onclick="pindahHalaman('MENU')" style="margin-top:20px; justify-content:center;">🔙 Kembali</div></div>`;
    }

    // --- LOGIKA LAPORAN WA GROSS (ANTI-BERKURANG) ---
    function generateLaporanShift(shiftLabel, bucketObj) {
        var s = shiftLabel.toLowerCase();
        var tStr = getTanggalHarian();
        var dCek = new Date(); if (dCek.getHours() < 7) { dCek.setDate(dCek.getDate() - 1); }
        var tglPad = String(dCek.getDate()).padStart(2, '0');

        function cekHariIni(tglStr) { if(!tglStr) return false; return tglStr.startsWith(tglPad); }

        var daftarKamar = []; var kamarAktif = []; var outVD = [];       
        var sudahDihitung = new Set(); var sudahDihitungOut = new Set();

        tamuIn.forEach(t => {
            if ((t.shift||"pagi").toLowerCase() === s) {
                kamarAktif.push(t.room); sudahDihitung.add(t.room);
                var isBaru = cekHariIni(t.tgl);
                var ikon = isBaru ? (s === "pagi" ? "🌞" : "🌙") : (s === "pagi" ? "🤝🌞" : "🤝🌙");
                daftarKamar.push(t.room + ikon);
            }
        });

        tamuOut.forEach(t => {
            if (cekHariIni(t.jam_out_aktual) && (t.shift||"pagi").toLowerCase() === s) {
                if (!sudahDihitung.has(t.room)) {
                    kamarAktif.push(t.room); sudahDihitung.add(t.room);
                    daftarKamar.push(t.room + (s==="pagi"?"🌞(OUT)":"🌙(OUT)"));
                }
                if (!sudahDihitungOut.has(t.room)) { outVD.push(t.room); sudahDihitungOut.add(t.room); }
            }
        });

        kamarKotor.forEach(kmr => {
            if (!sudahDihitungOut.has(kmr)) {
                var last = [...tamuOut].reverse().find(a => String(a.room) === String(kmr));
                if (last && (last.shift||"pagi").toLowerCase() === s) {
                    outVD.push(kmr); sudahDihitungOut.add(kmr);
                    if (!sudahDihitung.has(kmr)) { daftarKamar.push(kmr + (s==="pagi"?"🌞(VD)":"🌙(VD)")); sudahDihitung.add(kmr); }
                }
            }
        });

        var uangKeluar = 0; var teksKeluar = "";
        (bukuKas.harian.rincianKeluar || []).forEach(r => {
            if((r.shift||"Pagi").toLowerCase() === s) { uangKeluar += r.nominal; teksKeluar += "- " + r.ket + " (Rp " + formatRp(r.nominal) + ")<br>"; }
        });

        var text = `laporan tgl ${tStr.split(" ")[0]} shf ${s}<br><br>LAPORAN SHIFT ${shiftLabel.toUpperCase()}<br>Tanggal: ${tStr}<br><br>Kamar Terjual/Dijaga: ${daftarKamar.join(", ")}<br><br>total room c in 👉🏽${kamarAktif.length}<br>room c out yg vd 👉🏽${outVD.length}<br>room c out yg vr👉🏽0<br>total uang room cash👉🏽Rp ${formatRp(bucketObj.room_cash||0)}<br>ttl uang room tf👉🏽Rp ${formatRp(bucketObj.room_tf||0)}<br>ttl uang resto👉🏽Rp ${formatRp((bucketObj.resto_cash||0)+(bucketObj.resto_tf||0))}<br>ttl uang jual bill👉🏽Rp ${formatRp(bucketObj.jual_bill_cash||0)}<br><br>- *TOTAL UANG CASH :* Rp ${formatRp(bucketObj.cash||0)}<br><br>ttl uang keluar👉🏽Rp ${formatRp(uangKeluar)}<br>Jenis keluar:<br>${teksKeluar||"-"}<br>sisa stor cash 👉🏽Rp ${formatRp((bucketObj.cash||0)-uangKeluar)}`;
        return `<div style="background:#fef9e7; padding:20px; border-radius:15px; border:2px solid var(--green); font-family:monospace; font-size:13px; margin-bottom:20px;"><button onclick="navigator.clipboard.writeText(this.nextElementSibling.innerText.replace(/<br>/g, '\\n')); alert('✅ Copy WA Berhasil!')" style="background:var(--green); color:#fff; border:none; padding:12px; border-radius:10px; width:100%; font-weight:bold; cursor:pointer; margin-bottom:15px;">📋 COPY KE WHATSAPP</button><div>${text}</div></div>`;
    }

    function renderScreen() {
        var out = ""; document.getElementById('topSearchArea').style.display = (state === "MENU" || state === "HASIL_CARI") ? "block" : "none";
        
        if (state === "MENU") {
            out += `<div class="card"><span class="section-title">🏠 Luxury Dashboard</span>
                <div class="btn-mewah" onclick="pindahHalaman('PILIH_KELAS')"><span>🛏️ 1. Booking Kamar Baru</span><span>➔</span></div>
                <div class="btn-mewah" onclick="pindahHalaman('DAFTAR_TAMU')"><span>👥 2. Monitoring & Check-Out</span><span>➔</span></div>
                <div class="btn-mewah" onclick="pindahHalaman('TUTUP_BUKU')"><span>💰 3a. Laporan Keuangan</span><span>➔</span></div>
                <div class="btn-mewah" onclick="pindahHalaman('FORM_PENGELUARAN')" style="border-left: 4px solid var(--red);"><span>📉 3b. Catat Pengeluaran</span><span>➔</span></div>
                <div class="btn-mewah" onclick="pindahHalaman('TOTAL_KAMAR')" style="border-left: 4px solid var(--purple);"><span>🧮 7. Rekap Hunian (Fisik)</span><span>➔</span></div>
                <div class="btn-mewah" onclick="pindahHalaman('ALL_INFO_HARIAN')" style="border-left: 4px solid var(--green);"><span>🌐 8. ALL INFO (Laporan WA)</span><span>➔</span></div>
                <div class="btn-mewah" onclick="pindahHalaman('ARSIP')" style="margin-top:20px; background:var(--primary); color:white;"><span>🗄️ 9. Arsip Permanen</span><span>➔</span></div></div>`;
        } 
        else if (state === "TOTAL_KAMAR") { out += renderTotalKamar(); }
        else if (state === "ALL_INFO_HARIAN") {
            out += `<div class="card"><span class="section-title">📋 Laporan WA Harian</span>${generateLaporanShift("Pagi", bukuKas.harian.pagi)}<hr>${generateLaporanShift("Malam", bukuKas.harian.malam)}<div class="btn-mewah" onclick="pindahHalaman('MENU')" style="justify-content:center;">🔙 Kembali</div></div>`;
        }
        else if (state === "FORM_CHECKIN") {
            var now = new Date(); var valDT = now.getFullYear()+"-"+String(now.getMonth()+1).padStart(2,'0')+"-"+String(now.getDate()).padStart(2,'0')+"T"+String(now.getHours()).padStart(2,'0')+":"+String(now.getMinutes()).padStart(2,'0');
            out += `<div class="card"><span class="section-title">📝 Formulir Check-In</span>
                <div class="form-group"><label class="form-label">Nama Tamu</label><input type="text" id="f_nama" class="form-control"></div>
                <div class="form-group"><label class="form-label">Tanggal & Jam (Bisa Edit 1 per 1)</label><input type="datetime-local" id="f_tgl_in" class="form-control" value="${valDT}"></div>
                <div style="display:flex; gap:10px;"><div class="form-group" style="flex:1;"><label class="form-label">Malam</label><input type="number" id="f_malam" class="form-control" value="1"></div><div class="form-group" style="flex:1;"><label class="form-label">Extra Bed</label><select id="f_extrabed" class="form-control"><option value="0">0</option><option value="1">1</option></select></div></div>
                <div class="form-group"><label class="form-label"><input type="checkbox" id="f_early"> Early Check-In (+100k)</label></div>
                <div class="form-group"><label class="form-label">Metode Bayar</label><select id="f_bayar_basic" class="form-control"><option value="CASH">CASH</option><option value="TRANSFER">TRANSFER</option><option value="LUNAS LAMA">LUNAS LAMA</option></select></div>
                <button class="btn-submit" onclick="prosesFormCheckIn()">✔️ Selesaikan Check-In</button></div>`;
        }
        else if (state === "TUTUP_BUKU") {
            out += `<div class="card"><span class="section-title">💰 Laporan Laci</span>
                <p style="font-size:11px; font-style:italic;">✨ Sistem otomatis tutup buku setiap jam 07:00 Pagi.</p>
                <div class="btn-mewah" onclick="klikMenu('RESET_HARIAN')" style="color:var(--red); border:1px dashed var(--red); background:#fff5f5; justify-content:center;">🚨 (DARURAT) Paksa Tutup Buku Sekarang</div>
                <div class="btn-mewah" onclick="pindahHalaman('MENU')" style="justify-content:center;">🔙 Kembali</div></div>`;
        }
        else if (state === "ARSIP") {
            out += `<div class="card"><span class="section-title">🗄️ Arsip Permanen</span>`;
            (arsipLaporanHarian || []).slice().reverse().forEach(al => {
                out += `<div style="background:#f1f5f9; padding:15px; border-radius:15px; margin-bottom:20px; border:1px solid #cbd5e1;">
                    <b style="display:block; text-align:center; margin-bottom:10px;">📅 TANGGAL: ${al.tgl}</b>
                    <div style="font-size:10px; background:#fff; padding:10px; border-radius:8px; border:1px solid #e2e8f0;">${al.lapPagi}</div>
                    <div style="font-size:10px; background:#fff; padding:10px; border-radius:8px; border:1px solid #e2e8f0; margin-top:10px;">${al.lapMalam}</div>
                </div>`;
            });
            out += `<div class="btn-mewah" onclick="pindahHalaman('MENU')" style="justify-content:center;">🔙 Kembali</div></div>`;
        }
        document.getElementById('screen').innerHTML = out;
    }

    window.klikMenu = function(val) {
        if (val === "RESET_HARIAN") {
            var s = prompt("Sandi:"); if(s === "jumaeluk1234") { 
                // Logika Reset Manual (Sama dengan Auto-Reset)
                bukuKas.harian.tgl = "FORCE_RESET"; 
                simpanKeCloud(); location.reload();
            }
        }
    };

    window.onload = function() { renderScreen(); };
</script>
</body>
</html>
