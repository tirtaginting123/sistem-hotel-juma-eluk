<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hotel Terminal Juma Eluk - Master V4.8</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #0a192f; --gold: #c5a059; --bg: #f4f7f6;
            --white: #ffffff; --green: #27ae60; --red: #e74c3c;
            --orange: #f39c12; --blue: #3498db; --text: #333;
        }
        body { background-color: var(--bg); color: var(--text); font-family: 'Montserrat', sans-serif; margin: 0; padding: 0; line-height: 1.6; }
        .navbar { background-color: #000; color: #fff; padding: 20px 25px; border-bottom: 4px solid var(--gold); display: flex; align-items: center; justify-content: center; }
        .navbar-brand { display: flex; flex-direction: column; align-items: center; gap: 10px; text-align: center; }
        .nav-logo-box { background-color: #fff; width: 70px; height: 70px; padding: 5px; display: flex; justify-content: center; align-items: center; border-radius: 2px; }
        .nav-logo-box img { max-width: 100%; max-height: 100%; object-fit: contain; }
        .header-info h1 { font-family: 'Playfair Display', serif; margin: 0; font-size: 24px; text-transform: uppercase; color: #fff; }
        .header-info p { font-size: 10px; margin: 2px 0 0; color: #fff; line-height: 1.3; }
        .container { max-width: 600px; margin: 0 auto; padding: 20px 15px 50px; }
        #topSearchArea { margin-bottom: 25px; }
        .search-top { width: 100%; padding: 15px 25px; border-radius: 50px; border: 1px solid #ddd; font-size: 16px; outline: none; box-shadow: 0 5px 15px rgba(0,0,0,0.05); box-sizing: border-box; }
        .card { background: var(--white); border-radius: 15px; padding: 20px; margin-bottom: 20px; box-shadow: 0 8px 25px rgba(0,0,0,0.05); border-top: 5px solid var(--gold); }
        .section-title { font-weight: 700; color: var(--primary); margin-bottom: 15px; border-bottom: 1px solid #eee; padding-bottom: 10px; display: block; font-size: 13px; text-transform: uppercase; letter-spacing: 1px; }
        .btn-mewah { background: #fff; color: var(--primary); border: 1px solid #eee; padding: 16px; border-radius: 12px; margin-bottom: 12px; cursor: pointer; font-weight: 600; display: flex; align-items: center; justify-content: space-between; transition: 0.2s; }
        .btn-submit { background: var(--gold); color: white; border: none; padding: 16px; border-radius: 12px; margin-top: 15px; cursor: pointer; font-weight: 700; display: block; width: 100%; text-align: center; font-size: 16px; }
        .form-group { margin-bottom: 15px; text-align: left; }
        .form-label { display: block; font-size: 12px; font-weight: 700; color: var(--primary); margin-bottom: 5px; text-transform: uppercase; }
        .form-control { width: 100%; padding: 14px 15px; border-radius: 8px; border: 1px solid #ddd; font-size: 15px; box-sizing: border-box; background: #fafafa; }
        
        .room-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
        .room-box { padding: 15px 5px; border-radius: 10px; text-align: center; font-weight: 700; color: white; cursor: pointer; display: flex; flex-direction: column; align-items: center; justify-content: center; line-height: 1.2; }
        .room-box .rb-no { font-size: 20px; margin-bottom: 3px; }
        .room-box .rb-tipe { font-size: 9px; font-weight: 600; }
        .status-green { background: #2ecc71; }
        .status-red { background: #e74c3c; }
        .status-orange { background: #f39c12; }
        .status-blue { background: #3498db; }
        
        #loadingBar { background: var(--gold); color: white; padding: 5px; text-align: center; font-size: 11px; display: none; }
        .arsip-table th, .arsip-table td { border: 1px solid #ddd; padding: 8px; font-size: 11px; }
        .arsip-table th { background-color: var(--primary); color: white; }
        #printArea { display: none; }
        @media print {
            @page { margin: 0; size: 240mm 140mm; } 
            body { background: white; color: black; font-family: Arial, Helvetica, sans-serif; margin: 0; padding: 0; }
            #screen, #topSearchArea, #loadingBar, .navbar, .container { display: none !important; }
            #printArea { display: block !important; width: 240mm; height: 140mm; box-sizing: border-box; overflow: hidden; padding: 5mm; }
            table { border-collapse: collapse; }
        }
    </style>
</head>
<body>
    <div id="loadingBar">>>> CONNECTING TO CLOUD...</div>
    <div class="navbar">
        <div class="navbar-brand">
            <div class="nav-logo-box"><img src="logo.jpg" alt="Logo JE"></div>
            <div class="header-info">
                <h1>Hotel Juma Eluk</h1>
                <p>Jl. Letjen Jamin Ginting Sumber Mufakat Kabanjahe Tanah Karo</p>
                <p>HP: 0821 6848 9514</p>
            </div>
        </div>
    </div>
    <div class="container" id="mainContainer">
        <div id="topSearchArea"><input type="text" id="topSearch" class="search-top" placeholder="🔍 Cari Kamar, Tipe, atau Tamu..." autocomplete="off" oninput="liveSearch(this.value)"></div>
        <div id="screen"></div>
    </div>
    <div id="printArea"></div>

<script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-database-compat.js"></script>

<script>
    const firebaseConfig = {
      apiKey: "AIzaSyAvCTnP9xmMYdtzbItnG9s-jzJ2LP143S8",
      authDomain: "juma-elok.firebaseapp.com",
      databaseURL: "https://juma-elok-default-rtdb.firebaseio.com",
      projectId: "juma-elok",
      storageBucket: "juma-elok.firebasestorage.app",
      messagingSenderId: "703237300210",
      appId: "1:703237300210:web:e21f5bdea56000359a156b"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const dataRef = db.ref('hotel_data');

    const dataHotel = [
        {tipe: "Single", kelas: "Standard", nomor: ["2a","3a","4a","5a","6a","7a","8a","9a","10a","11a","11b"], harga: 300000},
        {tipe: "Twin", kelas: "Standard", nomor: ["2b","3b","4b","5b","6b","7b","8b","9b","10b"], harga: 300000},
        {tipe: "Single", kelas: "Deluxe", nomor: ["1","12a","13a","14a","15a","15","12b","14b"], harga: 350000},
        {tipe: "Twin", kelas: "Deluxe", nomor: ["1b","13b","15b"], harga: 350000},
        {tipe: "Single", kelas: "Suite", nomor: ["4av","5av","6av","7av","8av","9av","10av","11av","6bv","7bv","8bv","9bv"], harga: 400000},
        {tipe: "Twin", kelas: "Suite", nomor: ["4bv","5bv"], harga: 400000},
        {tipe: "Single", kelas: "VIP", nomor: ["2av", "3av", "2bv"], harga: 600000},
        {tipe: "Twin", kelas: "VIP", nomor: ["3bv"], harga: 600000}
    ];

    let tamuIn = [], tamuOut = [], kamarRusak = [], arsipTamu = [], lastInv = 0, riwayatHarian = [];
    let catatanHotel = "", isJualBillMode = false;
    let bukuKas = { 
        harian: { tgl: "", uang: 0, uangCash: 0, uangTransfer: 0, uangDebit: 0, keluar: 0, rincianKeluar: [], kamar: 0, pagi: { cash:0, tf:0, db:0, keluar:0 }, malam: { cash:0, tf:0, db:0, keluar:0 }, billPagi: {awal:null, akhir:null, count:0}, billMalam: {awal:null, akhir:null, count:0}, jualBill: [], last_reset: 0 }, 
        bulanan: { bln: "", uang: 0, kamar: 0, keluar: 0, uangCash: 0, uangTransfer: 0, uangDebit: 0, rincianBulanan: [] } 
    };
    let state = "MENU", tempBed="", tempKelas="", tempRoom="", tempCari="";
    let d = { nama:"", alamat:"", warga:"", ktp:"", hp:"", malam:"", extrabed:"", bayar:"", tgl:"", tgl_out:"", inv:"", shift:"", deposit:"", deposit_tipe:"", timestamp: 0 };
    const sandiMaster = "printf(\"jumaeluk\");";

    dataRef.on('value', (snapshot) => {
        const cloudData = snapshot.val();
        if (cloudData) {
            tamuIn = cloudData.checkin || []; tamuOut = cloudData.checkout || []; kamarRusak = cloudData.maintenance || []; 
            arsipTamu = cloudData.arsip || []; lastInv = cloudData.last_inv || 0; 
            riwayatHarian = cloudData.riwayatHarian || []; catatanHotel = cloudData.catatan || "";
            let dbKas = cloudData.bukuKas || {};
            bukuKas = { 
                harian: { tgl: getTanggalHarian(), uang: dbKas.harian?.uang || 0, uangCash: dbKas.harian?.uangCash || 0, uangTransfer: dbKas.harian?.uangTransfer || 0, uangDebit: dbKas.harian?.uangDebit || 0, keluar: dbKas.harian?.keluar || 0, rincianKeluar: dbKas.harian?.rincianKeluar || [], kamar: dbKas.harian?.kamar || 0, pagi: dbKas.harian?.pagi || { cash:0, tf:0, db:0, keluar:0 }, malam: dbKas.harian?.malam || { cash:0, tf:0, db:0, keluar:0 }, billPagi: dbKas.harian?.billPagi || {awal:null, akhir:null, count:0}, billMalam: dbKas.harian?.billMalam || {awal:null, akhir:null, count:0}, jualBill: dbKas.harian?.jualBill || [], last_reset: dbKas.harian?.last_reset || new Date().getTime() }, 
                bulanan: { bln: getTanggalBulanan(), uang: dbKas.bulanan?.uang || 0, kamar: dbKas.bulanan?.kamar || 0, keluar: dbKas.bulanan?.keluar || 0, uangCash: dbKas.bulanan?.uangCash || 0, uangTransfer: dbKas.bulanan?.uangTransfer || 0, uangDebit: dbKas.bulanan?.uangDebit || 0, rincianBulanan: dbKas.bulanan?.rincianBulanan || [] } 
            };
        }
        renderScreen();
    });

    function simpanKeCloud() { dataRef.set({ checkin: tamuIn, checkout: tamuOut, maintenance: kamarRusak, arsip: arsipTamu, last_inv: lastInv, bukuKas: bukuKas, riwayatHarian: riwayatHarian, catatan: catatanHotel }); }
    function getHarga(noKmr) { for (let k of dataHotel) { if (k.nomor.includes(noKmr)) return k.harga; } return 0; }
    function formatRp(angka) { return new Intl.NumberFormat('id-ID').format(angka); }
    function getTanggalSekarang() { return new Date().toLocaleDateString('id-ID', { day: '2-digit', month: 'short', year: 'numeric', hour: '2-digit', minute:'2-digit' }); }
    function getTanggalHarian() { return new Date().toLocaleDateString('id-ID', { day: '2-digit', month: 'short', year: 'numeric' }); }
    function getTanggalBulanan() { return new Date().toLocaleDateString('id-ID', { month: 'long', year: 'numeric' }); }
    function pindahHalaman(newState) {
    state = newState;
    // Tambahkan baris ini untuk mencatat riwayat di browser
    history.pushState({ state: newState }, newState, ""); 
    renderScreen();
}

    
    window.sinkronHariIni = function() {
        if(!confirm("Fitur ini akan menghitung ulang dan menyesuaikan semua kas uang & kamar dengan keadaan Dashboard saat ini.\n\nLanjutkan?")) return;
        let c = 0, t = 0, db = 0, k = 0, pc = 0, pt = 0, pdb = 0, pkeluar = 0, mc = 0, mt = 0, mdb = 0, mkeluar = 0;
        let allTamu = tamuIn.concat(tamuOut);
        allTamu.forEach(x => {
            if(x.bayar !== "PENDING") {
                let sub = (getHarga(x.room)*(parseInt(x.malam)||1)) + ((parseInt(x.extrabed)||0)*150000);
                let shiftReal = x.shift ? x.shift.toLowerCase() : "pagi";
                if(x.bayar === "CASH") { c += sub; if(shiftReal === "pagi") pc += sub; else mc += sub; }
                else if(x.bayar === "TRANSFER") { t += sub; if(shiftReal === "pagi") pt += sub; else mt += sub; }
                else if(x.bayar === "DEBIT") { db += sub; if(shiftReal === "pagi") pdb += sub; else mdb += sub; }
            }
            k++;
        });
        if(bukuKas.harian.jualBill) { bukuKas.harian.jualBill.forEach(jb => { c += 100000; pc += 100000; }); }
        let totalKeluar = 0;
        if(bukuKas.harian.rincianKeluar) { bukuKas.harian.rincianKeluar.forEach(r => { totalKeluar += r.nominal; if(r.shift === "Malam") mkeluar += r.nominal; else pkeluar += r.nominal; }); }
        bukuKas.harian.uangCash = c; bukuKas.harian.uangTransfer = t; bukuKas.harian.uangDebit = db; bukuKas.harian.uang = c + t + db;
        bukuKas.harian.kamar = k; bukuKas.harian.keluar = totalKeluar;
        bukuKas.harian.pagi = { cash: pc, tf: pt, db: pdb, keluar: pkeluar };
        bukuKas.harian.malam = { cash: mc, tf: mt, db: mdb, keluar: mkeluar };
        simpanKeCloud(); alert("✅ Sinkronisasi Berhasil! Seluruh data ALL INFO telah di-update mengikuti Data Terbaru."); renderScreen();
    };

    window.prosesCheckOut = function(index) {
        let cItemBox = document.getElementById('charge_item_' + index), cHargaBox = document.getElementById('charge_harga_' + index);
        let cItem = cItemBox ? cItemBox.value.trim() : "", cHarga = cHargaBox ? parseInt(cHargaBox.value) || 0 : 0;
        let sisaVit = prompt("Sisa Vit?", "0");
        if(sisaVit !== null) {
            if (cHarga > 0) {
                let shiftOut = (new Date().getHours() >= 7 && new Date().getHours() < 17) ? "pagi" : "malam";
                bukuKas.harian.uang += cHarga; bukuKas.bulanan.uang += cHarga; bukuKas.harian.uangCash += cHarga; bukuKas.bulanan.uangCash += cHarga; bukuKas.harian[shiftOut].cash += cHarga;
                tamuIn[index].charge = `${cItem} (Rp ${formatRp(cHarga)} via CASH)`;
            } else { tamuIn[index].charge = cItem || "-"; }
            tamuIn[index].vit = "vit " + sisaVit; tamuIn[index].jam_out_aktual = getTanggalSekarang();
            arsipTamu.push({ nama: tamuIn[index].nama, inv: tamuIn[index].inv, jam_in: tamuIn[index].tgl, jam_out: tamuIn[index].jam_out_aktual, vit: sisaVit, charge: tamuIn[index].charge });
            tamuOut.push(tamuIn[index]); tamuIn.splice(index, 1); simpanKeCloud(); renderScreen();
        }
    };

    window.hapusRiwayat = function(index) { tamuOut.splice(index, 1); simpanKeCloud(); renderScreen(); };
    window.liveSearch = function(val) { tempCari = val.trim().toLowerCase(); state = tempCari !== "" ? "HASIL_CARI" : "MENU"; renderScreen(); };

    window.editPembayaran = function(index) {
        let t = tamuIn[index];
        let opsiBaru = prompt(`Pilih Pembayaran Kamar ${t.room}\n\nSaat ini: ${t.bayar}\nKetik: CASH / TRANSFER / DEBIT / PENDING`, t.bayar === "PENDING" ? "CASH" : t.bayar);
        if (opsiBaru) {
            opsiBaru = opsiBaru.toUpperCase().trim();
            if (["CASH", "TRANSFER", "DEBIT", "PENDING"].includes(opsiBaru) && opsiBaru !== t.bayar) {
                let sub = (getHarga(t.room) * (parseInt(t.malam)||1)) + ((parseInt(t.extrabed)||0)*150000);
                let ts = t.shift ? t.shift.toLowerCase() : "pagi";
                
                if(t.bayar !== "PENDING") {
                    bukuKas.harian.uang -= sub; bukuKas.bulanan.uang -= sub;
                    if (t.bayar === "CASH") { bukuKas.harian.uangCash -= sub; bukuKas.bulanan.uangCash -= sub; bukuKas.harian[ts].cash -= sub; }
                    else if (t.bayar === "TRANSFER") { bukuKas.harian.uangTransfer -= sub; bukuKas.bulanan.uangTransfer -= sub; bukuKas.harian[ts].tf -= sub; }
                    else if (t.bayar === "DEBIT") { bukuKas.harian.uangDebit -= sub; bukuKas.bulanan.uangDebit -= sub; bukuKas.harian[ts].db -= sub; }
                }
                
                if(opsiBaru !== "PENDING") {
                    bukuKas.harian.uang += sub; bukuKas.bulanan.uang += sub;
                    if (opsiBaru === "CASH") { bukuKas.harian.uangCash += sub; bukuKas.bulanan.uangCash += sub; bukuKas.harian[ts].cash += sub; }
                    else if (opsiBaru === "TRANSFER") { bukuKas.harian.uangTransfer += sub; bukuKas.bulanan.uangTransfer += sub; bukuKas.harian[ts].tf += sub; }
                    else if (opsiBaru === "DEBIT") { bukuKas.harian.uangDebit += sub; bukuKas.bulanan.uangDebit += sub; bukuKas.harian[ts].db += sub; }
                    alert(`✅ Mantap! Pembayaran ${opsiBaru} sebesar Rp ${formatRp(sub)} telah dimasukkan ke kas.`);
                } else {
                    alert(`⚠️ Status diubah menjadi PENDING. Uang telah ditarik kembali dari laporan kas.`);
                }
                tamuIn[index].bayar = opsiBaru; simpanKeCloud(); renderScreen();
            }
        }
    };

    window.editKamar = function(index) {
        let t = tamuIn[index];
        let kamarBaru = prompt(`Pindahkan Tamu: ${t.nama}\nDari Kamar Lama: ${t.room}\n\nMasukkan Nomor Kamar Tujuan:`, t.room);
        
        if (kamarBaru !== null) {
            kamarBaru = kamarBaru.trim().toLowerCase();
            if (kamarBaru === "" || kamarBaru === t.room) return;
            
            let roomExists = false;
            for (let k of dataHotel) {
                if (k.nomor.includes(kamarBaru)) {
                    roomExists = true;
                    break;
                }
            }
            
            if (!roomExists) {
                alert(`❌ Pindah Gagal: Kamar ${kamarBaru} tidak ditemukan di sistem Juma Eluk.`);
                return;
            }
            
            let isOccupied = tamuIn.some(x => x.room === kamarBaru);
            if (isOccupied) {
                alert(`❌ Pindah Gagal: Kamar ${kamarBaru} sedang terisi oleh tamu lain!`);
                return;
            }
            
            let kamarLama = t.room;
            tamuIn[index].room = kamarBaru;
            simpanKeCloud();
            renderScreen();
            alert(`✅ Pindah Berhasil!\nTamu ${t.nama} resmi dipindah dari kamar ${kamarLama} ke ${kamarBaru}.`);
        }
    };

    window.prosesPengeluaran = function() {
        let deskripsi = document.getElementById('p_item').value || "Lain-lain", harga = parseInt(document.getElementById('p_harga').value) || 0;
        if(harga > 0) {
            let jam = new Date().getHours(), shiftNow = (jam >= 7 && jam < 17) ? "Pagi" : "Malam", tglExp = getTanggalHarian();
            bukuKas.harian.keluar += harga; bukuKas.bulanan.keluar += harga; bukuKas.harian[shiftNow.toLowerCase()].keluar += harga;
            bukuKas.harian.rincianKeluar.push({ ket: deskripsi, nominal: harga, shift: shiftNow });
            bukuKas.bulanan.rincianBulanan.push({ tgl: tglExp, ket: deskripsi, nominal: harga });
            simpanKeCloud(); alert("✅ Pengeluaran dicatat!"); pindahHalaman("MENU");
        }
    };

    window.lihatDetailKamar = function(no) {
        let t = tamuIn.find(x => x.room === no);
        if(t) {
            let pendingAlert = t.bayar === "PENDING" ? "\n⚠️ BELUM LUNAS (PENDING)" : "";
            alert(`🚪 INFO KAMAR TERISI: ${no}\n\n👤 Nama: ${t.nama}\n📞 HP: ${t.hp}\n🗓️ In: ${t.tgl}\n🗓️ Out: ${t.tgl_out}\n💰 Bayar via: ${t.bayar} ${pendingAlert}\n📌 Deposit: ${t.deposit_tipe} ${t.deposit !== "-" ? "("+t.deposit+")" : ""}\n\n🛏️ Extrabed: ${t.extrabed}`);
        } else { alert("Kamar ini kosong."); }
    };

    window.renderScreen = function() {
        let out = ""; document.getElementById('topSearchArea').style.display = (["MENU", "HASIL_CARI"].includes(state)) ? "block" : "none";
        
        if (state === "MENU") {
            out += `<div class="card"><span class="section-title">🏠 Dashboard Utama</span>
                <div class="btn-mewah" onclick="pindahHalaman('PILIH_KELAS')"><span>🛏️ 1. Booking Kamar Baru</span><span>➔</span></div>
                <div class="btn-mewah" onclick="pindahHalaman('DAFTAR_TAMU')"><span>👥 2. Monitoring Tamu</span><span>➔</span></div>
                <div class="btn-mewah" onclick="pindahHalaman('FORM_PENGELUARAN')"><span>📉 3. Catat Pengeluaran</span><span>➔</span></div>
                <div class="btn-mewah" onclick="pindahHalaman('CATATAN')"><span>📝 4. Catatan Jaga Shift</span><span>➔</span></div>
                <div class="btn-mewah" onclick="pindahHalaman('ALL_INFO_MASTER')" style="background:var(--primary); color:white; border-left:6px solid var(--gold); margin-top:25px;"><span>🌐 9. ALL INFO (Hub Pusat)</span><span>➔</span></div>
            </div>`;
        } 
        else if (state === "ALL_INFO_MASTER") {
            out += `<div class="card"><span class="section-title" style="color:var(--gold);">🌐 9. ALL INFO DASHBOARD</span>
                <div class="btn-mewah" onclick="pindahHalaman('ALL_INFO_KEUANGAN')"><span>💰 1. Info Keuangan</span><span>➔</span></div>
                <div class="btn-mewah" onclick="pindahHalaman('ALL_INFO_ARSIP')"><span>🗄️ 2. Info Tamu Check-Out Permanen</span><span>➔</span></div>
                <div class="btn-mewah" onclick="pindahHalaman('ALL_INFO_BILL')"><span>🧾 3. Info Bill / Kamar Laku</span><span>➔</span></div>
                <div class="btn-mewah" onclick="pindahHalaman('ALL_INFO_KAMAR')"><span>📊 4. Kamar Status (Ringkasan)</span><span>➔</span></div>
                <div class="btn-mewah" onclick="pindahHalaman('MENU')" style="justify-content:center; margin-top:20px;">🔙 Kembali ke Menu Utama</div>
            </div>`;
        }
        else if (state === "ALL_INFO_KEUANGAN") {
            let h = bukuKas.harian, b = bukuKas.bulanan;
            let bersihPagi = h.pagi.cash - h.pagi.keluar;
            let bersihMalam = h.malam.cash - h.malam.keluar;
            
            out += `<div class="card"><span class="section-title">💰 1. Info Keuangan</span>
                
                <div style="background:#eafaf1; padding:15px; border-radius:10px; border:2px solid #2ecc71; margin-bottom:15px;">
                    <h3 style="margin:0 0 10px 0; color:#27ae60; border-bottom:1px solid #ccc; padding-bottom:5px;">A. PENDAPATAN SHIFT PAGI</h3>
                    <div style="font-size:12px; margin-bottom:10px; line-height:1.6;">
                        • TF Masuk: Rp ${formatRp(h.pagi.tf)}<br>
                        • Debit Masuk: Rp ${formatRp(h.pagi.db)}<br>
                        • Cash Laci: Rp ${formatRp(h.pagi.cash)}<br>
                        <span style="color:var(--red)">• Pengeluaran: Rp ${formatRp(h.pagi.keluar)}</span>
                    </div>
                    <div style="background:#fff; padding:8px; border-radius:6px; font-weight:700; color:var(--primary); font-size:13px; text-align:center;">
                        Sisa Uang Fisik Laci (Pagi): Rp ${formatRp(bersihPagi)}
                    </div>
                </div>

                <div style="background:#f4f6f7; padding:15px; border-radius:10px; border:2px solid #34495e; margin-bottom:20px;">
                    <h3 style="margin:0 0 10px 0; color:#34495e; border-bottom:1px solid #ccc; padding-bottom:5px;">B. PENDAPATAN SHIFT MALAM</h3>
                    <div style="font-size:12px; margin-bottom:10px; line-height:1.6;">
                        • TF Masuk: Rp ${formatRp(h.malam.tf)}<br>
                        • Debit Masuk: Rp ${formatRp(h.malam.db)}<br>
                        • Cash Laci: Rp ${formatRp(h.malam.cash)}<br>
                        <span style="color:var(--red)">• Pengeluaran: Rp ${formatRp(h.malam.keluar)}</span>
                    </div>
                    <div style="background:#fff; padding:8px; border-radius:6px; font-weight:700; color:var(--primary); font-size:13px; text-align:center;">
                        Sisa Uang Fisik Laci (Malam): Rp ${formatRp(bersihMalam)}
                    </div>
                </div>
                
                <div class="btn-mewah" onclick="klikMenu('RESET_HARIAN')" style="color:var(--orange); font-weight:700; justify-content:center; border: 1px solid var(--orange);">🔒 Tutup Buku Harian (Reset Pagi & Malam)</div>
                <div class="btn-mewah" onclick="pindahHalaman('RIWAYAT_HARIAN')" style="background:var(--blue); color:white; border:none; justify-content:center; margin-bottom:30px;">📅 Lihat Arsip Hari Sebelumnya</div>
                
                <hr style="border:0; border-top:2px dashed #ddd; margin-bottom:20px;">

                <div style="background:#fff9e6; padding:15px; border-radius:10px; border:2px solid #f1c40f; margin-bottom:15px;">
                    <h3 style="margin:0 0 10px 0; color:#d35400; border-bottom:1px solid #ccc; padding-bottom:5px;">C. UANG TOTAL BULANAN</h3>
                    <div style="font-size:14px; margin-bottom:10px; font-weight:bold;">
                        Pendapatan Kotor: Rp ${formatRp(b.uang)}<br>
                        <span style="color:var(--red)">Total Pengeluaran: Rp ${formatRp(b.keluar)}</span>
                    </div>
                    <div class="btn-mewah" onclick="klikMenu('RESET_BULANAN')" style="color:var(--red); font-weight:700; justify-content:center; border: 1px solid var(--red); padding:10px; margin-bottom:0;">⚠️ Reset Uang Bulanan</div>
                </div>

                <div class="btn-mewah" onclick="pindahHalaman('ALL_INFO_MASTER')" style="justify-content:center; margin-top:20px;">🔙 Kembali ke ALL INFO</div>
            </div>`;
        }
        else if (state === "ALL_INFO_ARSIP") {
            out += `<div class="card"><span class="section-title">🗄️ 2. Info Tamu Check-Out Permanen</span><div style="overflow-x:auto;"><table class="arsip-table" style="width:100%;"><tr><th>Nama</th><th>No Bill</th><th>In</th><th>Out</th><th>Vit</th><th>Denda</th></tr>`;
            arsipTamu.slice().reverse().forEach(a => { out += `<tr><td>${a.nama}</td><td>${a.inv}</td><td>${a.jam_in}</td><td>${a.jam_out}</td><td>${a.vit}</td><td style="${a.charge!=='-'?'color:red;font-weight:bold':''}">${a.charge}</td></tr>`; });
            out += `</table></div><div class="btn-mewah" onclick="pindahHalaman('ALL_INFO_MASTER')" style="margin-top:15px; justify-content:center;">🔙 Kembali</div></div>`;
        }
        else if (state === "ALL_INFO_BILL") {
            let bp = bukuKas.harian.billPagi, bm = bukuKas.harian.billMalam;
            out += `<div class="card"><span class="section-title">🧾 3. Info Bill / Kamar Laku</span>
                <div style="text-align:center; padding:20px; background:#eafaf1; border-radius:10px; margin-bottom:10px; border:1px solid #2ecc71;">LAKU HARI INI: <b style="font-size:30px; color:#27ae60;">${bukuKas.harian.kamar}</b> Kamar</div>
                <div style="text-align:center; padding:20px; background:#fafafa; border-radius:10px; margin-bottom:20px; border:1px solid #ddd;">LAKU BULAN INI: <b style="font-size:30px; color:var(--primary);">${bukuKas.bulanan.kamar}</b> Kamar</div>
                
                <div style="background:#f9f9f9; padding:15px; border-radius:8px; border:1px dashed #ccc;">
                    <b>Data Kertas Bill Terpakai Hari Ini:</b><br><br>
                    ☀️ <b>Shift Pagi:</b> ${bp.count > 0 ? `${bp.awal} s/d ${bp.akhir} (${bp.count} Bill)` : "Belum ada"}<br>
                    🌙 <b>Shift Malam:</b> ${bm.count > 0 ? `${bm.awal} s/d ${bm.akhir} (${bm.count} Bill)` : "Belum ada"}
                </div>
                <div class="btn-mewah" onclick="pindahHalaman('ALL_INFO_MASTER')" style="justify-content:center; margin-top:20px;">🔙 Kembali</div></div>`;
        }
        else if (state === "ALL_INFO_KAMAR") {
            out += `<div class="card" style="padding:15px 10px;"><span class="section-title" style="margin-left:10px;">📊 4. Status Ringkasan Kamar</span>
                <div style="font-size:10px; text-align:center; margin-bottom:15px;">🟩 Kosong | <span style="color:var(--red); font-weight:bold;">🟥 Terisi (Klik u/ Info)</span> | 🟧 Rusak</div>
                <div class="room-grid">`;
            dataHotel.forEach(k => {
                k.nomor.forEach(no => {
                    let isIsi = tamuIn.some(t => t.room === no);
                    let colorClass = isIsi ? 'status-red' : (kamarRusak.includes(no) ? 'status-orange' : 'status-green');
                    out += `<div class="room-box ${colorClass}" onclick="${isIsi ? `lihatDetailKamar('${no}')` : `alert('Kamar ${no} Kosong')`}">
                        <div class="rb-no">${no}</div>
                        <div class="rb-tipe">${k.kelas} ${k.tipe}</div>
                    </div>`;
                });
            });
            out += `</div><div class="btn-mewah" onclick="pindahHalaman('ALL_INFO_MASTER')" style="justify-content:center; margin-top:20px;">🔙 Kembali</div></div>`;
        }
        else if (state === "DAFTAR_TAMU") {
            out += `<div class="card"><span class="section-title">👥 Monitoring Tamu & Edit Tagihan</span>
                    <div style="display:flex; gap:10px; margin-bottom:20px;">
                        <div style="flex:1; background:#fff9e6; color:#d35400; padding:15px 5px; border-radius:10px; text-align:center; border:1px solid #f1c40f;">
                            <b style="font-size:26px;">${tamuIn.length}</b><br><span style="font-size:11px; font-weight:700;">Kamar Terisi</span>
                        </div>
                        <div style="flex:1; background:#eafaf1; color:#27ae60; padding:15px 5px; border-radius:10px; text-align:center; border:1px solid #2ecc71;">
                            <b style="font-size:26px;">${tamuOut.length}</b><br><span style="font-size:11px; font-weight:700;">Sudah Check-Out</span>
                        </div>
                    </div>`;
            tamuIn.forEach((t, i) => { 
                let infoDep = (t.deposit_tipe && t.deposit_tipe !== "-") ? `<div style="font-size:10px; margin-top:5px; background:#fff3cd; padding:4px 8px; border-radius:4px; border:1px dashed #ffeeba; color:#856404; display:inline-block; font-weight:bold;">📌 Dep: ${t.deposit_tipe} ${t.deposit!=="-"?"("+t.deposit+")":""}</div>` : "";
                let stylePend = t.bayar === "PENDING" ? `background:#ffeaa7; border:2px dashed #d35400; padding:10px; border-radius:8px;` : `border-bottom:1px solid #eee; padding-bottom:10px;`;
                let bayarText = t.bayar === "PENDING" ? `<span style="color:var(--red); font-weight:900;">⚠️ PENDING (BELUM BAYAR)</span>` : `<span style="color:var(--green); font-weight:bold;">LUNAS (${t.bayar})</span>`;
                
                out += `<div style="margin-bottom:15px; ${stylePend}">
                            <div style="display:flex;justify-content:space-between; align-items:flex-start;">
                                <div style="flex:1;">
                                    <b style="font-size:15px; color:var(--primary);">🚪 ${t.room} - ${t.nama}</b>
                                    <div style="font-size:10px;color:#777; margin-top:2px;">In: ${t.tgl} | Out: ${t.tgl_out}</div>
                                    <div style="font-size:11px; margin-top:3px;">Status: ${bayarText}</div>
                                    ${infoDep}
                                </div>
                                <div style="text-align:right; width:110px;">
                                    <button onclick="editPembayaran(${i})" style="background:#f1c40f; border:none; border-radius:4px; font-weight:bold; padding:6px 10px; cursor:pointer; margin-bottom:5px; display:block; width:100%; font-size:11px;">✏️ Ubah/Bayar</button>
                                    <button onclick="editKamar(${i})" style="background:var(--blue); color:white; border:none; border-radius:4px; font-weight:bold; padding:6px 10px; cursor:pointer; margin-bottom:5px; display:block; width:100%; font-size:11px;">🔄 Pindah</button>
                                    <button onclick="prosesCheckOut(${i})" style="background:#ecf0f1; border:1px solid #bdc3c7; border-radius:4px; font-weight:bold; padding:6px 10px; cursor:pointer; display:block; width:100%; font-size:11px;">🏃 C-Out</button>
                                </div>
                            </div>
                        </div>`; 
            });
            out += `<br><span class="section-title">🕒 Riwayat Out Hari Ini</span>`;
            tamuOut.forEach((t, i) => { out += `<div style="font-size:11px;opacity:0.8; margin-bottom:8px; border-bottom:1px dashed #ccc; padding-bottom:8px;"><b>🚪 ${t.room} co ${t.vit} - ${t.nama}</b> [#${t.inv}] <br> <span style="color:#2980b9">(In: ${t.tgl} | Out: ${t.jam_out_aktual})</span> <button onclick="hapusRiwayat(${i})" style="float:right;">Hapus</button></div>`; });
            out += `<div class="btn-mewah" onclick="pindahHalaman('MENU')" style="justify-content:center; margin-top:20px;">🔙 Kembali</div></div>`;
        }
        else if (state === "PILIH_KELAS") {
            out += `<div class="card"><span class="section-title">🏨 Pilih Kelas Kamar</span>`;
            ["Standard", "Deluxe", "Suite", "VIP"].forEach((c, i) => { out += `<div class="btn-mewah" onclick="isJualBillMode=false; klikMenu('KLS_${i+1}')">💎 ${c}</div>`; });
            out += `<div class="btn-mewah" onclick="isJualBillMode=true; alert('Mode Jual Bill Aktif');" style="background:#f1c40f">🏷️ Beli Bill (100k)</div><div class="btn-mewah" onclick="pindahHalaman('MENU')" style="justify-content:center;">🔙 Batal</div></div>`;
        }
        else if (state === "PILIH_BED") {
            out += `<div class="card"><span class="section-title">🛏️ Pilih Tipe Kasur</span><div class="btn-mewah" onclick="klikMenu('BED_1')">Single Bed</div><div class="btn-mewah" onclick="klikMenu('BED_2')">Twin Bed</div><div class="btn-mewah" onclick="pindahHalaman('PILIH_KELAS')" style="justify-content:center;">🔙 Kembali</div></div>`;
        }
        else if (state === "PILIH_KAMAR") {
            out += `<div class="card"><span class="section-title">🔑 Pilih Nomor Kamar</span><div class="room-grid">`;
            let cur = dataHotel.find(k => k.tipe === tempBed && k.kelas === tempKelas).nomor;
            cur.forEach(no => { 
                let isIsi = tamuIn.some(t => t.room === no);
                let colorClass = isIsi ? "status-red" : "status-green"; 
                out += `<div class="room-box ${colorClass}" onclick="${isIsi ? `alert('Kamar Terisi!')` : `klikMenu('ROOM_${no}')`}"><div class="rb-no">${no}</div></div>`; 
            });
            out += `</div><div class="btn-mewah" onclick="pindahHalaman('MENU')" style="justify-content:center; margin-top:20px;">🔙 Batal</div></div>`;
        }
        else if (state === "FORM_CHECKIN") {
            out += `<div class="card"><span class="section-title">📝 Check-In Kamar ${tempRoom}</span>
                <div class="form-group"><label class="form-label">Nama Lengkap</label><input type="text" id="f_nama" class="form-control" placeholder="Nama Tamu"></div>
                <div class="form-group"><label class="form-label">Nomor HP</label><input type="tel" id="f_hp" class="form-control" placeholder="08xx"></div>
                <div class="form-group"><label class="form-label">Alamat / Catatan Kamar Nyambung</label><input type="text" id="f_alamat" class="form-control" placeholder="Contoh: Nyambung dgn Kamar 2A"></div>
                <div class="form-group"><label class="form-label">Malam</label><input type="number" id="f_malam" class="form-control" value="1"></div>
                <div class="form-group"><label class="form-label">Extra Bed</label><select id="f_extrabed" class="form-control"><option value="0">0</option><option value="1">1</option><option value="2">2</option></select></div>
                
                <div class="form-group" style="background:#fff3cd; padding:10px; border-radius:8px; border:1px solid #ffeeba;">
                    <label class="form-label" style="color:#d35400;">📌 Opsi Titipan Deposit (Aman, Tidak Masuk Kas)</label>
                    <select id="f_deposit_tipe" class="form-control" style="margin-bottom:5px;" onchange="document.getElementById('f_deposit_text').style.display = this.value === 'Ketik Disini' ? 'block' : 'none'">
                        <option value="-">Tanpa Deposit</option>
                        <option value="Cash">Uang Cash</option>
                        <option value="Transfer">Uang Transfer</option>
                        <option value="Debit">Uang Debit</option>
                        <option value="KTP/SIM">KTP/SIM/Identitas</option>
                        <option value="Ketik Disini">Lainnya (Ketik Manual)...</option>
                    </select>
                    <input type="text" id="f_deposit_text" class="form-control" placeholder="Ketik keterangan (Contoh: Kunci Motor, Uang 50k)" style="display:none; border-color:var(--orange);">
                </div>

                <div class="form-group"><label class="form-label">Pembayaran Tagihan via</label>
                    <select id="f_bayar" class="form-control" style="font-weight:bold; border:2px solid var(--primary);">
                        <option value="CASH">CASH (Lunas)</option>
                        <option value="TRANSFER">TRANSFER (Lunas)</option>
                        <option value="DEBIT">DEBIT (Lunas)</option>
                        <option value="PENDING" style="color:var(--red);">PENDING / Nanti Saja (Uang Tidak Dihitung)</option>
                    </select>
                </div>
                <button class="btn-submit" onclick="prosesFormCheckIn()">✔️ Selesaikan Check-In</button>
                <div class="btn-mewah" onclick="pindahHalaman('MENU')" style="justify-content:center; margin-top:10px;">🔙 Batal</div></div>`;
        }
        else if (state === "PESAN_SUKSES") {
            out += `<div class="card" style="text-align:center"><h2>✅ Berhasil!</h2><button class="btn-submit" onclick="window.siapkanInvoice(); window.print(); pindahHalaman('MENU')">🖨️ Cetak & Selesai</button></div>`;
        }
        else if (state === "FORM_PENGELUARAN") {
            out += `<div class="card"><span class="section-title">📉 Catat Pengeluaran</span><input type="text" id="p_item" class="form-control" placeholder="Barang..."><input type="tel" id="p_harga" class="form-control" placeholder="Harga..."><button class="btn-submit" style="background:var(--red)" onclick="prosesPengeluaran()">💾 Simpan</button><div class="btn-mewah" onclick="pindahHalaman('MENU')" style="margin-top:10px; justify-content:center;">🔙 Batal</div></div>`;
        }
        else if (state === "CATATAN") {
            out += `<div class="card"><span class="section-title">📝 Catatan Jaga Shift</span><textarea id="txt_catatan" class="form-control" style="height:250px;">${catatanHotel}</textarea><button class="btn-submit" onclick="simpanCatatan()">💾 Simpan</button><div class="btn-mewah" onclick="sinkronHariIni()" style="background:var(--blue); color:white; justify-content:center; margin-top:20px;">🔄 Sesuaikan Seluruh Uang & Kamar</div><div class="btn-mewah" onclick="pindahHalaman('MENU')" style="margin-top:10px; justify-content:center;">🔙 Kembali</div></div>`;
        }
        else if (state === "RIWAYAT_HARIAN") {
            out += `<div class="card"><span class="section-title">📅 Arsip Pembukuan Harian</span>`;
            riwayatHarian.slice().reverse().forEach(r => {
                out += `<div style="border:1px solid #ddd; padding:12px; border-radius:10px; margin-bottom:12px; background:#fafafa;"><b style="color:var(--primary); display:block; margin-bottom:5px;">🗓️ ${r.tgl}</b><div style="font-size:11px;">Kamar: ${r.kamar} | Kotor: Rp ${formatRp(r.uang)} | Keluar: Rp ${formatRp(r.keluar)}</div><div style="display:flex; gap:10px; margin-top:5px;"><div style="flex:1; font-size:9px; background:#eafaf1; padding:5px;">☀️ Pagi: Rp ${formatRp(r.pagi?.cash||0)}</div><div style="flex:1; font-size:9px; background:#f4f6f7; padding:5px;">🌙 Malam: Rp ${formatRp(r.malam?.cash||0)}</div></div></div>`;
            });
            out += `<div class="btn-mewah" onclick="pindahHalaman('ALL_INFO_KEUANGAN')" style="justify-content:center;">🔙 Kembali</div></div>`;
        }
        document.getElementById('screen').innerHTML = out;
    };

    window.klikMenu = function(val) {
        if (val.startsWith("KLS_")) { tempKelas = (val==="KLS_1"?"Standard":val==="KLS_2"?"Deluxe":val==="KLS_3"?"Suite":"VIP"); pindahHalaman("PILIH_BED"); }
        else if (val.startsWith("BED_")) { tempBed = (val==="BED_1"?"Single":"Twin"); pindahHalaman("PILIH_KAMAR"); }
        else if (val.startsWith("ROOM_")) { tempRoom = val.replace("ROOM_", ""); pindahHalaman("FORM_CHECKIN"); }
        else if (val === "RESET_HARIAN") { 
            if(prompt("Sandi untuk Tutup Buku:") === sandiMaster) { 
                riwayatHarian.push({ tgl: bukuKas.harian.tgl, uang: bukuKas.harian.uang, keluar: bukuKas.harian.keluar, kamar: bukuKas.harian.kamar, pagi: bukuKas.harian.pagi, malam: bukuKas.harian.malam });
                if(riwayatHarian.length > 60) riwayatHarian.shift();
                bukuKas.harian = { tgl: getTanggalHarian(), uang:0, uangCash:0, uangTransfer:0, uangDebit:0, keluar:0, rincianKeluar: [], kamar:0, pagi:{cash:0,tf:0,db:0,keluar:0}, malam:{cash:0,tf:0,db:0,keluar:0}, jualBill:[], last_reset: new Date().getTime() }; 
                simpanKeCloud(); renderScreen(); alert("✅ Sistem Harian di-Reset ke 0.");
            } else { alert("❌ Sandi Salah!"); }
        }
        else if (val === "RESET_BULANAN") {
            if(prompt("Sandi MASTER Reset Bulanan:") === sandiMaster) {
                bukuKas.bulanan = { bln: getTanggalBulanan(), uang: 0, kamar: 0, keluar: 0, uangCash: 0, uangTransfer: 0, uangDebit: 0, rincianBulanan: [] };
                simpanKeCloud(); renderScreen(); alert("✅ BOOM! Data Bulanan Bersih!");
            } else { alert("Akses Ditolak."); }
        }
    };

    window.prosesFormCheckIn = function() {
        let fdepTipe = document.getElementById('f_deposit_tipe').value;
        let fdepText = document.getElementById('f_deposit_text').value;
        let finalDepTipe = fdepTipe === "Ketik Disini" ? "Lainnya" : fdepTipe;
        let finalDepIsi = fdepTipe === "Ketik Disini" ? fdepText : "-";

        d = { 
            nama: document.getElementById('f_nama').value || "-", hp: document.getElementById('f_hp').value || "-", 
            alamat: document.getElementById('f_alamat').value || "-", warga: "WNI", 
            malam: document.getElementById('f_malam').value || "1", extrabed: document.getElementById('f_extrabed').value || "0",
            bayar: document.getElementById('f_bayar').value || "CASH", 
            deposit_tipe: finalDepTipe, deposit: finalDepIsi, timestamp: new Date().getTime() 
        };
        
        let jam = new Date().getHours(); d.shift = (jam >= 7 && jam < 17) ? "Pagi" : "Malam";
        d.tgl = getTanggalSekarang(); lastInv++; d.inv = String(lastInv).padStart(4, '0');
        
        let dateOut = new Date(); if (jam < 7) { dateOut.setDate(dateOut.getDate() - 1); }
        dateOut.setDate(dateOut.getDate() + parseInt(d.malam)); d.tgl_out = dateOut.toLocaleDateString('id-ID', { day: '2-digit', month: 'short', year: 'numeric' });
        
        if(d.bayar !== "PENDING") {
            let hrg = isJualBillMode ? 100000 : ((getHarga(tempRoom) * parseInt(d.malam)) + (parseInt(d.extrabed)*150000));
            bukuKas.harian.uang += hrg; bukuKas.bulanan.uang += hrg;
            if(d.bayar === "CASH") { bukuKas.harian.uangCash += hrg; bukuKas.bulanan.uangCash += hrg; bukuKas.harian[d.shift.toLowerCase()].cash += hrg; }
            else if(d.bayar === "TRANSFER") { bukuKas.harian.uangTransfer += hrg; bukuKas.bulanan.uangTransfer += hrg; bukuKas.harian[d.shift.toLowerCase()].tf += hrg; }
            else if(d.bayar === "DEBIT") { bukuKas.harian.uangDebit += hrg; bukuKas.bulanan.uangDebit += hrg; bukuKas.harian[d.shift.toLowerCase()].db += hrg; }
        }

        bukuKas.harian.kamar++; bukuKas.bulanan.kamar++;
        tamuIn.push({ ...d, room: tempRoom }); isJualBillMode = false; simpanKeCloud(); pindahHalaman("PESAN_SUKSES");
    };

    window.simpanCatatan = function() { catatanHotel = document.getElementById('txt_catatan').value; simpanKeCloud(); alert("✅ Catatan disimpan!"); pindahHalaman('MENU'); };

    window.onpopstate = function(event) {
    if (event.state && event.state.state) {
        state = event.state.state; // Kembali ke state sebelumnya
    } else {
        state = "MENU"; // Jika riwayat habis, balik ke Menu Utama
    }
    renderScreen();
};

    window.onload = function() {
    // Mencatat state awal agar tombol back tidak langsung keluar aplikasi
    history.replaceState({ state: "MENU" }, "MENU", "");
    renderScreen();
};

</script>
</body>
</html>
