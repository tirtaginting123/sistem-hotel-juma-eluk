    function simpanKeCloud() { 
        document.getElementById('loadingBar').style.display = "block";

    function getHarga(noKmr) { for (var i=0; i<dataHotel.length; i++) { if (dataHotel[i].nomor.indexOf(noKmr) !== -1) return dataHotel[i].harga; } return 0; }
    function formatRp(angka) { return new Intl.NumberFormat('id-ID').format(angka); }
    function getTanggalSekarang() { return new Date().toLocaleDateString('id-ID', { day: '2-digit', month: 'short', year: 'numeric', hour: '2-digit', minute:'2-digit' }); }
            function getTanggalHarian() { 
        var d = new Date(); 
        if (d.getHours() < 7) { d.setDate(d.getDate() - 1); } 
        return d.toLocaleDateString('id-ID', { day: '2-digit', month: 'short', year: 'numeric' }); 
    }

    function getTanggalBulanan() { return new Date().toLocaleDateString('id-ID', { month: 'long', year: 'numeric' }); }
    function pindahHalaman(newState) { state = newState; history.pushState({ page: newState }, "", ""); renderScreen(); }

    window.tampilkanInfoTamu = function(noKamar) {

    window.updateTotalCheckIn = function() {

        var eb = parseInt(document.getElementById('f_extrabed').value) || 0;
        var baseHarga = getHarga(tempRoom);
        var sub = (baseHarga * m) + (eb * 150000);

        var e_chk = document.getElementById('f_early');
        if(e_chk && e_chk.checked) sub += 100000;

        var pdg = window.isCheckInNormal ? null : tamuPending.find(function(t) { return t.room === tempRoom; });
        var dp = pdg ? (pdg.dp || 0) : 0;
        var tot = sub - dp; if(tot < 0) tot = 0;

        var elTotal = document.getElementById('f_total');
        if(elTotal) { elTotal.value = tot; document.getElementById('f_dibayar').value = tot; }
    };
                window.sinkronHariIni = function() {
        var conf = confirm("🚨 REPAIR TOTAL (KAS & RESTO) 🚨\nSistem akan menghitung ulang semua uang laci dan transaksi Resto. Lanjut?");
        if (!conf) return;

        bukuKas.harian.uang = 0; bukuKas.harian.uangCash = 0; bukuKas.harian.uangTransfer = 0; bukuKas.harian.uangDebit = 0; bukuKas.harian.keluar = 0;
        bukuKas.harian.kamar = 0; 
        var defShift = { cash:0, tf:0, db:0, keluar:0, room_cash:0, room_tf:0, room_db:0, resto_cash:0, resto_tf:0, resto_db:0, charge_cash:0, charge_tf:0, charge_db:0, panjar_cash:0, panjar_tf:0, panjar_db:0, jual_bill_cash:0, kamar_in:0, extrabed_in:0 };
        bukuKas.harian.pagi = Object.assign({}, defShift); bukuKas.harian.malam = Object.assign({}, defShift);

        function cekWaktu(tglStr) {
            if (!tglStr || tglStr === "-") return false;
            var d = new Date(); if (d.getHours() < 7) d.setDate(d.getDate() - 1);
            var dd = String(d.getDate()).padStart(2, '0');
            var mmmArr = ["Jan", "Feb", "Mar", "Apr", "Mei", "Jun", "Jul", "Agt", "Sep", "Okt", "Nov", "Des"];
            var target = dd + "-" + mmmArr[d.getMonth()] + "-" + d.getFullYear();
            var parts = tglStr.split(", ");
            if (parts.length < 2) return parts[0] === target;
            var hour = 12; if(parts[1]) hour = parseInt(parts[1].split(".")[0]);
            if (parts[0] === target && hour >= 7) return true;
            var dNext = new Date(d); dNext.setDate(dNext.getDate() + 1);
            var targetNext = String(dNext.getDate()).padStart(2, '0') + "-" + mmmArr[dNext.getMonth()] + "-" + dNext.getFullYear();
            if (parts[0] === targetNext && hour < 7) return true;
            return false;
        }

        function tambahKeLaci(nom, via, bs, jenis) {
            if(nom <= 0 || via === "BELUM BAYAR" || via === "LUNAS LAMA" || via === "D.PENDING") return;
            bukuKas.harian.uang += nom;
            if(via === "CASH") { bukuKas.harian.uangCash += nom; bukuKas.harian[bs].cash += nom; bukuKas.harian[bs][jenis+"_cash"] += nom; }
            else if(via === "TRANSFER") { bukuKas.harian.uangTransfer += nom; bukuKas.harian[bs].tf += nom; bukuKas.harian[bs][jenis+"_tf"] += nom; }
            else if(via === "DEBIT") { bukuKas.harian.uangDebit += nom; bukuKas.harian[bs].db += nom; bukuKas.harian[bs][jenis+"_db"] += nom; }
        }

        // --- REPAIR DATA KAMAR ---
        var semuaKamar = [];
        dataHotel.forEach(function(k) { k.nomor.forEach(function(no) { semuaKamar.push(no); }); });

        var jamSekarang = new Date().getHours();
        tamuIn.concat(tamuOut).forEach(function(tamu) {
            var isBaru = cekWaktu(tamu.tgl_hotel || tamu.tgl);
            var adaPay = false;
            if (tamu.history_bayar) tamu.history_bayar.forEach(h => { if(cekWaktu(h.tgl)) adaPay = true; });
            var outToday = tamu.jam_out_aktual && cekWaktu(tamu.jam_out_aktual);
            
            var masuk = false; var bs = (tamu.shift || "pagi").toLowerCase();
            if (isBaru) masuk = true;
            else if (jamSekarang >= 12 || adaPay || outToday) { masuk = true; bs = "pagi"; }

            if (masuk) {
                bukuKas.harian.kamar++;
                bukuKas.harian[bs].kamar_in++;
                if (tamu.history_bayar) {

                function generateLaporanShift(shiftLabel, bucketObj, isForArsip = false, customDate = null) {

        var dOp = customDate ? new Date(customDate.getTime()) : new Date(); 
        if (!customDate && dOp.getHours() < 7) dOp.setDate(dOp.getDate() - 1);

        function isKamarBaru(tglStr) {
            if (!tglStr || tglStr === "-") return false;
            var dd = String(dOp.getDate()).padStart(2, '0');
            var blnArr = ["Jan", "Feb", "Mar", "Apr", "Mei", "Jun", "Jul", "Agt", "Sep", "Okt", "Nov", "Des"];
            var target = dd + "-" + blnArr[dOp.getMonth()] + "-" + dOp.getFullYear();
            
            var parts = tglStr.split(",");
            var tglBersih = parts[0].trim().replace(/ /g, '-').replace(/\//g, '-'); 
            var jam = 12; 
            if (parts.length >= 2) jam = parseInt(parts[1].trim().replace(':', '.').split(".")[0]);
            
            if (tglBersih === target && jam >= 7) return true;
            var dN = new Date(dOp); dN.setDate(dN.getDate() + 1);
            var targetN = String(dN.getDate()).padStart(2, '0') + "-" + blnArr[dN.getMonth()] + "-" + dN.getFullYear();
            if (tglBersih === targetN && jam < 7) return true;

        }

        var tStr = String(dOp.getDate()).padStart(2, '0') + " " + ["Jan", "Feb", "Mar", "Apr", "Mei", "Jun", "Jul", "Agt", "Sep", "Okt", "Nov", "Des"][dOp.getMonth()] + " " + dOp.getFullYear();

        var listMerah = []; var listUngu = []; var listAbu = []; var kamarBB = [];

        var safeTamuIn = (typeof tamuIn !== 'undefined' && tamuIn) ? tamuIn : [];
