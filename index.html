            lastInv = cloudData.last_inv || 0; lastRestoInv = cloudData.last_resto_inv || 0; riwayatHarian = toArr(cloudData.riwayatHarian);

        var d = new Date();

    window.updateTotalCheckIn = function() {

        var eb = parseInt(document.getElementById('f_extrabed').value) || 0;

        if(e_chk && e_chk.checked) sub += 100000;
        
        var pdg = window.isCheckInNormal ? null : tamuPending.find(function(t) { return t.room === tempRoom; });
        var dp = pdg ? (pdg.dp || 0) : 0;
        var tot = sub - dp; if(tot < 0) tot = 0;
        
        var elTotal = document.getElementById('f_total');
        if(elTotal) { elTotal.value = tot; document.getElementById('f_dibayar').value = tot; }

    window.prosesFormCheckIn = function() {
        d.nama = document.getElementById('f_nama').value || "-"; 
        d.alamat = document.getElementById('f_alamat').value || "-"; 
        d.warga = document.getElementById('f_warga').value || "-"; 
        d.ktp = document.getElementById('f_ktp').value || "-"; 
        d.hp = document.getElementById('f_hp').value || "-";
        d.malam = document.getElementById('f_malam').value || "1"; 
        d.extrabed = document.getElementById('f_extrabed').value || "0";
        d.transport = document.getElementById('f_transport').value || "-"; 
        d.trip = document.getElementById('f_trip').value || "-";
        
        // --- AMBIL JAM & TANGGAL DARI INPUT KALENDER ---
        var inputTglIn = document.getElementById('f_tgl_in');
        var dateObj = new Date(); // Default jam asli saat ini
        if (inputTglIn && inputTglIn.value) { dateObj = new Date(inputTglIn.value); }

        var jam = dateObj.getHours(); 
        d.shift = (jam >= 7 && jam < 17) ? "Pagi" : "Malam"; 
        var bucketShift = d.shift.toLowerCase();
        
        // --- FORMAT RAPI: 24-Apr-2026, 09.01 ---
        var tglHari = String(dateObj.getDate()).padStart(2, '0');
        var bulanArr = ["Jan", "Feb", "Mar", "Apr", "Mei", "Jun", "Jul", "Agt", "Sep", "Okt", "Nov", "Des"];
        var tglBln = bulanArr[dateObj.getMonth()];
        var tglThn = dateObj.getFullYear();
        var tglJam = String(dateObj.getHours()).padStart(2, '0');
        var tglMnt = String(dateObj.getMinutes()).padStart(2, '0');
        
        d.tgl = tglHari + "-" + tglBln + "-" + tglThn + ", " + tglJam + "." + tglMnt;
        
        lastInv++; d.inv = String(lastInv).padStart(4, '0');

        // --- TANGGAL KELUAR MENGIKUTI TANGGAL YANG DIEDIT ---
        var dateOut = new Date(dateObj); 
        if (jam >= 0 && jam < 7) { dateOut.setDate(dateOut.getDate() - 1); }
        dateOut.setDate(dateOut.getDate() + parseInt(d.malam)); 
        d.tgl_out = dateOut.toLocaleDateString('id-ID', { day: '2-digit', month: 'short', year: 'numeric' });

        
        if(d.shift === "Pagi") { if(!bukuKas.harian.billPagi.awal) bukuKas.harian.billPagi.awal = d.inv; bukuKas.harian.billPagi.akhir = d.inv; bukuKas.harian.billPagi.count++; } 
        else { if(!bukuKas.harian.billMalam.awal) bukuKas.harian.billMalam.awal = d.inv; bukuKas.harian.billMalam.akhir = d.inv; bukuKas.harian.billMalam.count++; }

        var pdg = window.isCheckInNormal ? null : tamuPending.find(function(t) { return t.room === tempRoom; });
        var dpPending = pdg ? (pdg.dp || 0) : 0;
        var baseHarga = getHarga(tempRoom);
        var sub = (baseHarga * parseInt(d.malam)) + (parseInt(d.extrabed)*150000);
        var e_chk = document.getElementById('f_early'); if(e_chk && e_chk.checked) sub += 100000;
        var tagihanNormal = sub - dpPending; if(tagihanNormal < 0) tagihanNormal = 0;

        var isAdvanced = document.getElementById('ui_adv_pay').style.display === 'block';
        var metodeSetoran = ""; var setoranLaporanKas = 0;

        if (isAdvanced) {
            d.total_tagihan = parseInt(document.getElementById('f_total').value) || 0;
            d.sudah_dibayar = parseInt(document.getElementById('f_dibayar').value) || 0;
            var met = document.getElementById('f_metode_adv').value;
            
            if (met === "BELUM BAYAR" || d.sudah_dibayar === 0) { 
                d.sudah_dibayar = 0; d.bayar = "D.Pending"; metodeSetoran = "BELUM BAYAR"; setoranLaporanKas = 0; 
            } else if (met === "LUNAS LAMA") {
                d.bayar = "LUNAS LAMA"; metodeSetoran = "LUNAS LAMA"; setoranLaporanKas = 0; 
            } else { 
                if (d.sudah_dibayar >= d.total_tagihan) d.bayar = met; else d.bayar = "D.Pending"; metodeSetoran = met; setoranLaporanKas = d.sudah_dibayar; 
            }
        } else {
            d.total_tagihan = tagihanNormal; d.sudah_dibayar = tagihanNormal;
            d.bayar = document.getElementById('f_bayar_basic').value;
            metodeSetoran = d.bayar; setoranLaporanKas = tagihanNormal;
            if(d.bayar === "LUNAS LAMA") { setoranLaporanKas = 0; }
        }

        if(isJualBillMode) {
            setoranLaporanKas = (metodeSetoran === "BELUM BAYAR" || d.sudah_dibayar === 0 || metodeSetoran === "LUNAS LAMA") ? 0 : 100000;
            d.total_tagihan = 100000; d.sudah_dibayar = setoranLaporanKas;
            if(!bukuKas.harian.jualBill) bukuKas.harian.jualBill = []; bukuKas.harian.jualBill.push({ kamar: tempRoom, inv: d.inv, shift: d.shift });
        }

        if(setoranLaporanKas > 0 && metodeSetoran !== "BELUM BAYAR" && metodeSetoran !== "LUNAS LAMA") {
            bukuKas.harian.uang += setoranLaporanKas; bukuKas.bulanan.uang += setoranLaporanKas;
            if(metodeSetoran === "CASH") { bukuKas.harian.uangCash += setoranLaporanKas; bukuKas.bulanan.uangCash += setoranLaporanKas; bukuKas.harian[bucketShift].cash += setoranLaporanKas; }
            else if(metodeSetoran === "TRANSFER") { bukuKas.harian.uangTransfer += setoranLaporanKas; bukuKas.bulanan.uangTransfer += setoranLaporanKas; bukuKas.harian[bucketShift].tf += setoranLaporanKas; }
            else if(metodeSetoran === "DEBIT") { bukuKas.harian.uangDebit += setoranLaporanKas; bukuKas.bulanan.uangDebit += setoranLaporanKas; bukuKas.harian[bucketShift].db += setoranLaporanKas; }

            if(isJualBillMode) { 
                if(metodeSetoran === "CASH") { bukuKas.harian[bucketShift].jual_bill_cash = (bukuKas.harian[bucketShift].jual_bill_cash||0) + setoranLaporanKas; bukuKas.bulanan.jual_bill_cash = (bukuKas.bulanan.jual_bill_cash||0) + setoranLaporanKas; } 
            } else {
                 if(metodeSetoran === "CASH") { bukuKas.harian[bucketShift].room_cash = (bukuKas.harian[bucketShift].room_cash||0) + setoranLaporanKas; bukuKas.bulanan.room_cash = (bukuKas.bulanan.room_cash||0) + setoranLaporanKas; }
                 else if(metodeSetoran === "TRANSFER") { bukuKas.harian[bucketShift].room_tf = (bukuKas.harian[bucketShift].room_tf||0) + setoranLaporanKas; bukuKas.bulanan.room_tf = (bukuKas.bulanan.room_tf||0) + setoranLaporanKas; }
                 else if(metodeSetoran === "DEBIT") { bukuKas.harian[bucketShift].room_db = (bukuKas.harian[bucketShift].room_db||0) + setoranLaporanKas; bukuKas.bulanan.room_db = (bukuKas.bulanan.room_db||0) + setoranLaporanKas; }
            }
        }

        if(metodeSetoran !== "LUNAS LAMA") {
            bukuKas.harian[bucketShift].kamar_in = (bukuKas.harian[bucketShift].kamar_in || 0) + 1;
            bukuKas.harian[bucketShift].extrabed_in = (bukuKas.harian[bucketShift].extrabed_in || 0) + parseInt(d.extrabed || 0);
        }
        
        kamarKotor = kamarKotor.filter(function(k) { return k !== tempRoom; }); 
        d.jenis_deposit = "Uang 100k"; d.dilaporkan = false;
        
        tamuIn.push(Object.assign({}, d, { room: tempRoom })); 
        if(pdg) { tamuPending = tamuPending.filter(function(t) { return t.room !== tempRoom; }); }
        
        if(metodeSetoran !== "LUNAS LAMA") {
            bukuKas.harian.kamar = (bukuKas.harian.kamar||0) + 1;
            bukuKas.bulanan.kamar = (bukuKas.bulanan.kamar||0) + 1;
        }

        isJualBillMode = false; window.isCheckInNormal = true; simpanKeCloud(); pindahHalaman("PESAN_SUKSES");
    }

    window.setMintaBersih = function(roomNo, isMinta) {
        var idx = tamuIn.findIndex(function(t) { return t.room === roomNo; });
        if(idx !== -1) {
            tamuIn[idx].minta_bersih = isMinta;

    window.onload = function() { history.replaceState({ page: "MENU" }, "", ""); renderScreen(); };
    function generateLaporanShift(shiftLabel, bucketObj) {
        var s = shiftLabel.toLowerCase();
        var tStr = getTanggalHarian(); 
        
        var dCek = new Date(); if (dCek.getHours() < 7) { dCek.setDate(dCek.getDate() - 1); }
        var tglPad = String(dCek.getDate()).padStart(2, '0');
        var tglHariIni = String(dCek.getDate());
        
        function cekHariIni(tglStr) {
            if(!tglStr) return false;
            return tglStr.startsWith(tglPad + " ") || tglStr.startsWith(tglPad + "/") || tglStr.startsWith(tglPad + "-") ||
                   tglStr.startsWith(tglHariIni + " ") || tglStr.startsWith(tglHariIni + "/") || tglStr.startsWith(tglHariIni + "-");
        }

           var daftarKamar = []; var kamarAktif = []; var kamarBB = []; var outVD = [];       

        tamuIn.forEach(function(t) {
            var isBaru = cekHariIni(t.tgl_hotel) || cekHariIni(t.tgl);
            var isLama = !isBaru;
            var sIn = (t.shift || "pagi").toLowerCase();
            
            // Ikon mempertahankan asal usul tamu, ditambah jabat tangan (nyambung) jika sudah beda hari
            var ikon = isLama ? (sIn === "pagi" ? "🤝🌞" : "🤝🌙") : (sIn === "pagi" ? "🌞" : "🌙");

            // Kedua shift akan melaporkan TAMU LAMA sebagai bukti kamar tersebut aman (sedang dihuni)
            if (s === "pagi") {
                if (sIn === "pagi" || isLama) { 
                    daftarKamar.push(t.room + ikon); kamarAktif.push(t.room);
                    if (t.bayar === "BELUM BAYAR" || t.bayar === "BB" || t.bayar === "D.Pending") kamarBB.push(t.room);
                }
            } else {
                if (sIn === "malam" || isLama) { 
                    daftarKamar.push(t.room + ikon); kamarAktif.push(t.room);
                    if (t.bayar === "BELUM BAYAR" || t.bayar === "BB" || t.bayar === "D.Pending") kamarBB.push(t.room);
                }
            }
        });


        tamuOut.forEach(function(t) {
            if (cekHariIni(t.jam_out_aktual)) {
                var isBaru = cekHariIni(t.tgl_hotel) || cekHariIni(t.tgl);
                var shiftIn = (t.shift || "Pagi").toLowerCase();
                if (s === "pagi" && (!isBaru || shiftIn === "pagi")) { daftarKamar.push(t.room + "🌞(OUT)"); outVD.push(t.room); }
                else if (s === "malam" && isBaru && shiftIn === "malam") { daftarKamar.push(t.room + "🌙(OUT)"); outVD.push(t.room); }
            }
        });

        if(typeof kamarKotor !== 'undefined' && typeof arsipTamu !== 'undefined') {
            kamarKotor.forEach(function(kmr) {
                if (outVD.indexOf(kmr) === -1 && kamarAktif.indexOf(kmr) === -1) {
                    var arsip = arsipTamu.slice().reverse().find(function(a) { return String(a.room) === String(kmr); });
                    if (arsip && cekHariIni(arsip.jam_out)) { daftarKamar.push(kmr + "🌞(OUT)"); outVD.push(kmr); }
                }
            });
        }

        var uangExtBed = (bucketObj.extrabed_in || 0) * 150000;
        var rCash = bucketObj.room_cash || 0; var rTf = bucketObj.room_tf || 0; var rDb = bucketObj.room_db || 0;
        var resto = (bucketObj.resto_cash || 0) + (bucketObj.resto_tf || 0) + (bucketObj.resto_db || 0);
        var jBill = bucketObj.jual_bill_cash || bucketObj.jual_bill || 0;
        var charge = (bucketObj.charge_cash || 0) + (bucketObj.charge_tf || 0) + (bucketObj.charge_db || 0);
        var pnjr = (bucketObj.panjar_cash || 0) + (bucketObj.panjar_tf || 0) + (bucketObj.panjar_db || 0);
        var dep = bucketObj.deposit || bucketObj.jaminan || 0; var depPend = bucketObj.deposit_pending || 0;
        var bBB = bucketObj.bayar_bb || bucketObj.pelunasan_bb || 0;
        var totalUangCash = bucketObj.cash || 0; var uangKeluarShift = 0; var teksKeluarShift = "";
        
        if(bukuKas.harian.rincianKeluar) {
            bukuKas.harian.rincianKeluar.forEach(function(r) {
                if(r.shift && r.shift.toLowerCase() === s) { uangKeluarShift += r.nominal; teksKeluarShift += "- " + r.ket + " (Rp " + formatRp(r.nominal) + ")<br>"; }
            });
        }
        
        var sisaLaci = totalUangCash - uangKeluarShift;
        var noBillLast = s === "pagi" ? (bukuKas.harian.billPagi ? bukuKas.harian.billPagi.akhir : "-") : (bukuKas.harian.billMalam ? bukuKas.harian.billMalam.akhir : "-");
        var restoThisShift = bukuKas.harian.transaksiResto ? bukuKas.harian.transaksiResto.filter(function(r) { return r.shift && r.shift.toLowerCase() === s; }) : [];
        var noBillRestoLast = restoThisShift.length > 0 ? restoThisShift[restoThisShift.length-1].inv : "-";
        var kamarStr = daftarKamar.length > 0 ? daftarKamar.join(", ") : "-"; var bbStr = kamarBB.length > 0 ? kamarBB.join(", ") : "-";

        var textBlock = "laporan tgl " + tStr.split(" ")[0] + " shf " + shiftLabel.toLowerCase() + "<br><br>LAPORAN SHIFT " + shiftLabel.toUpperCase() + "<br>Tanggal: " + tStr + "<br><br>Kamar Terjual/Dijaga: " + kamarStr + "<br><br>total room c in 👉🏽" + kamarAktif.length + "<br>room c out yg vd 👉🏽" + outVD.length + "<br>room c out yg vr👉🏽0<br>total uang extrabat 👉🏽Rp " + formatRp(uangExtBed) + "<br>room yg bb👉🏽" + bbStr + "<br>total uang room cash👉🏽Rp " + formatRp(rCash) + "<br>ttl uang room tf👉🏽Rp " + formatRp(rTf) + "<br>ttl uang room debit👉🏽Rp " + formatRp(rDb) + "<br>ttl uang resto👉🏽Rp " + formatRp(resto) + "<br>ttl uang jual bill👉🏽Rp " + formatRp(jBill) + "<br>ttl uang charge👉🏽Rp " + formatRp(charge) + "<br>ttl uang deposit/jaminan👉🏽Rp 0<br>ttl uang deposit pending/<br>Belum di ambil👉🏽Rp 0<br>ttl uang panjar👉🏽Rp " + formatRp(pnjr) + "<br>ttl pembayaran bb👉🏽Rp " + formatRp(bBB) + "<br><br>- *TOTAL UANG CASH :* Rp " + formatRp(totalUangCash) + "<br><br>ttl uang keluar👉🏽Rp " + formatRp(uangKeluarShift) + "<br>Jenis uang keluar:<br>" + (teksKeluarShift || "-") + "<br>sisa stor uang cash 👉🏽Rp " + formatRp(sisaLaci) + "<br>no bill terakhir 👉🏽" + noBillLast + "<br>no bill resto terakhir👉🏽" + noBillRestoLast;
        return `<div style="background:#fef9e7; padding:15px; border-radius:10px; border:2px solid #27ae60; font-family:monospace; font-size:13px; line-height: 1.6; margin-bottom:20px; box-shadow: 0px 4px 6px rgba(0,0,0,0.1);"><button onclick="navigator.clipboard.writeText(this.nextElementSibling.innerText.replace(/<br>/g, '\\n')); alert('✅ Laporan berhasil di-copy! Silakan Paste di WhatsApp.')" style="margin-bottom:15px; padding:12px; background:#25D366; color:#fff; border:none; border-radius:8px; font-weight:bold; font-size:16px; cursor:pointer; width:100%;">📋 COPY KE WHATSAPP</button><div style="user-select:all; word-wrap:break-word;">${textBlock}</div></div>`;
    }
